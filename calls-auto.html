<style>
  :root{--ink:#12110d;--fluor:#e8dcc0;--screen:#e0a43c;--night:#3a5680;--mug:#c8783a;--red:#d2342a;--bone:#efe8d8;--mut:#8d8878;--line:rgba(255,255,255,.1);}

  #stage{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1;}
  #app::after{content:"";position:absolute;inset:0;z-index:4;pointer-events:none;background:radial-gradient(135% 115% at 50% 42%,transparent 56%,rgba(4,6,9,.72));}
  #flash{position:absolute;inset:0;z-index:7;background:#fff;opacity:0;pointer-events:none;}
  #slug{position:absolute;top:0;left:0;right:0;z-index:6;display:flex;align-items:center;gap:9px;padding:14px 16px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--bone);text-shadow:0 1px 10px rgba(0,0,0,.95);pointer-events:none;transition:opacity .5s;opacity:.85;}

  #cap{position:absolute;left:0;right:0;bottom:0;z-index:6;padding:0 26px calc(54px + env(safe-area-inset-bottom));display:flex;flex-direction:column;justify-content:flex-end;gap:9px;min-height:32%;background:linear-gradient(180deg,transparent,rgba(8,11,14,.32) 44%,rgba(8,11,14,.92));pointer-events:none;}
  .blk{opacity:0;transform:translateY(8px);animation:rise .55s cubic-bezier(.2,.8,.3,1) forwards;}
  @keyframes rise{to{opacity:1;transform:none;}}
  .narr{font-style:italic;font-size:17.5px;line-height:1.5;color:#d6d2c6;text-shadow:0 2px 16px rgba(0,0,0,.95);max-width:30em;}
  .line{font-size:18px;line-height:1.38;color:var(--bone);text-shadow:0 2px 16px rgba(0,0,0,.95);max-width:30em;}
  .line .who{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:2px;opacity:.9;}
  .line.dotty .who{color:#e6b36a;} .line.jason .who{color:#7fc0d8;}
  .line.vo{font-family:'IBM Plex Mono',monospace;font-size:16px;padding-left:11px;border-left:2px solid var(--mut);}
  .line.vo .who{display:flex;align-items:center;gap:7px;}
  .line.edison{color:#f0d9b0;} .line.edison .who{color:#e6b36a;}
  .line.toby{color:#d8cdaa;} .line.toby .who{color:#c2b06a;}
  .line.joy{color:#d9cce4;} .line.joy .who{color:#b79ad0;}
  .line.vo .who::before{content:"";width:16px;height:9px;background:currentColor;clip-path:polygon(0 50%,10% 30%,20% 60%,30% 12%,40% 78%,50% 38%,60% 64%,70% 22%,80% 70%,90% 46%,100% 50%);}
  #hint{position:absolute;left:0;right:0;bottom:calc(20px + env(safe-area-inset-bottom));z-index:6;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--mut);pointer-events:none;animation:hb 2.1s ease-in-out infinite;}
  @keyframes hb{0%,100%{opacity:.32;}50%{opacity:.8;}}
  #hint.hide{display:none;} #hint.call{color:var(--screen);}
  .screen{position:absolute;inset:0;z-index:8;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:34px 28px;}
  .screen.hide{display:none;}
  .kick{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--screen);margin-bottom:14px;opacity:0;animation:rise .8s .3s forwards;}
  .ttl{font-family:'Big Shoulders Display',sans-serif;font-size:clamp(80px,26vw,160px);line-height:.86;letter-spacing:3px;color:var(--bone);text-shadow:0 6px 40px rgba(0,0,0,.6);opacity:0;animation:rise 1s .2s forwards;}
  .ttl .dot{color:var(--screen);}
  .sub{font-family:'IBM Plex Mono',monospace;font-style:italic;font-size:14px;color:var(--mut);margin-top:4px;opacity:0;animation:rise .9s .7s forwards;}
  .by{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-top:24px;opacity:0;animation:rise .9s 1s forwards;} .by b{color:#c6bba6;font-weight:400;}
  .epi{font-style:italic;font-size:16px;color:#d4cabb;max-width:25em;margin-top:6px;line-height:1.5;opacity:0;animation:rise .9s .6s forwards;}
  .start{margin-top:30px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--screen);opacity:0;animation:rise .9s 1.4s forwards;} .start .p{animation:hb 2.1s ease-in-out infinite;display:inline-block;}
  .replay{margin-top:26px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);border:1px solid var(--line);border-radius:30px;padding:11px 22px;background:rgba(255,255,255,.03);pointer-events:auto;cursor:pointer;opacity:0;animation:rise .9s 1.6s forwards;}
  .replay:active{transform:scale(.97);}
  #mute{position:absolute;top:12px;right:14px;z-index:9;cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:14px;border-radius:50%;background:rgba(14,17,20,.7);border:1px solid var(--line);backdrop-filter:blur(5px);pointer-events:auto;}
  #prog{position:absolute;top:0;left:0;right:0;height:3px;z-index:9;background:rgba(255,255,255,.07);pointer-events:none;}
  #progfill{height:100%;width:0;background:linear-gradient(90deg,var(--screen),#e6b36a);box-shadow:0 0 8px rgba(79,208,200,.6);transition:width .18s linear;}
  body.paused #progfill{box-shadow:none;opacity:.5;}
  @media (prefers-reduced-motion: reduce){.blk,.kick,.by,.epi,.sub,.start,.replay,.ttl{animation-duration:.01s;}#hint,.start .p,.line.vo .who::before{animation:none;}}

  .tipline{margin-top:14px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.4px;color:#b6ab98;}
  .tipline a{color:#e8a24c;text-decoration:none;border-bottom:1px solid rgba(232,162,76,.4);padding-bottom:1px;pointer-events:auto;}
  .tipline a:active{opacity:.7;}
</style>
</head>

function buildGrain(){grainCv=document.createElement('canvas');grainCv.width=150;grainCv.height=150;const g=grainCv.getContext('2d');const im=g.createImageData(150,150);for(let i=0;i<im.data.length;i+=4){const v=128+(Math.random()*2-1)*52;im.data[i]=im.data[i+1]=im.data[i+2]=v;im.data[i+3]=255;}g.putImageData(im,0,0);}

/* ---------- audio ---------- */
let AC=null,master=null,muted=false,beds={};
function audioInit(){if(AC)return;try{AC=new (window.AudioContext||window.webkitAudioContext)();master=AC.createGain();master.gain.value=0.9;master.connect(AC.destination);}catch(e){AC=null;}}
function now(){return AC?AC.currentTime:0;}
function nbuf(d){const sr=AC.sampleRate,b=AC.createBuffer(1,Math.floor(sr*d),sr),x=b.getChannelData(0);for(let i=0;i<x.length;i++)x[i]=Math.random()*2-1;return b;}
function tone(f,t,dur,amp,type){const o=AC.createOscillator();o.type=type||'sine';o.frequency.value=f;const g=AC.createGain();g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(amp,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g);g.connect(master);o.start(t);o.stop(t+dur+0.02);}
function ringOffice(){if(!AC||muted)return;const t=now();for(let r=0;r<2;r++){const t0=t+r*0.4;tone(1100,t0,0.16,0.1,'square');tone(1400,t0,0.16,0.08,'square');tone(1100,t0+0.2,0.16,0.1,'square');tone(1400,t0+0.2,0.16,0.08,'square');}}
function ringMobile(){if(!AC||muted)return;const t=now();[0,0.18,0.36].forEach(o=>{tone(1320,t+o,0.1,0.08,'triangle');tone(1760,t+o+0.05,0.1,0.06,'triangle');});}
function ringHead(){if(!AC||muted)return;const t=now();tone(900,t,0.12,0.08,'sine');tone(900,t+0.2,0.12,0.08,'sine');}

  ctx.strokeStyle='#05070a';ctx.lineWidth=5;ctx.strokeRect(W*0.04,H*0.16,W*0.34,H*0.66);
  // desk + smashed mugs
  const deskY=H*0.66;ctx.fillStyle='#161a1d';ctx.fillRect(0,deskY,W,H*0.06);ctx.fillStyle='#0f1316';ctx.fillRect(0,deskY+H*0.06,W,H*0.28);
  smashedMugs(W*0.5,H*0.9,H*0.032);
  // Jason turned to the door, horror
  const r=person(W*0.66,deskY+H*0.02,H*0.5,'sit',{skin:MAT.jasonSkin,hair:MAT.jasonHair,cloth:MAT.jasonCloth},L,{dir:1,el,seated:true,worry:true,sweat:true,beard:true,beardCol:[48,40,36]});jasonCollar(r,L);headset(r.hx,r.hy,r.hr,r.dir,L);
  // red dread vignette
  const rv=ctx.createRadialGradient(W*0.5,H*0.5,H*0.2,W*0.5,H*0.5,H*0.8);rv.addColorStop(0,'rgba(0,0,0,0)');rv.addColorStop(1,rgba([180,40,30],0.3));ctx.fillStyle=rv;ctx.fillRect(0,0,W,H);
  vign();}
function vign(){if(dread){ctx.fillStyle='rgba(60,20,16,0.12)';ctx.fillRect(0,0,W,H);}}
const BG={office:bgOffice,door:bgDoor};

/* ---------- runner ---------- */
let idx=-1,sceneT0=0,running=false,shakeEnd=0,finishing=false,toBlack=false,transStart=0,camDir=1;
let auto=true,paused=false,dwell=13,prevTs=0;const progFill=$("progfill");
function renderText(s){cap.innerHTML='';s.text.forEach((b,i)=>{const el=document.createElement('div');el.className='blk';el.style.animationDelay=(0.15+i*0.5)+'s';
  if(b.k==='narr'){const p=document.createElement('p');p.className='narr';p.textContent=b.s;el.appendChild(p);}
  else{const p=document.createElement('p');p.className='line'+(b.cls?' '+b.cls:'');p.innerHTML='<span class="who">'+esc(b.who)+'</span>'+esc(b.s);el.appendChild(p);}
  cap.appendChild(el);});}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function playCaller(c){const v=callers[c]&&callers[c].voice;if(v==='edison')voxEdison();else if(v==='toby')voxToby();else if(v==='joy')voxJoy();}
const STAGE_IDX=['dottyIntro','dottyCall','swap','banter','jasonCall','dottyCall2','dottyCall2','dottyCall2','twoPhones','jasonToby','jasonToby','jasonToby','wry','window','joyCall','joyCall','turn','near','nearMugs','laughHorror','smash'];
const DE_IDX=['smile','smile','deadpan','deadpan',null,'neutral','neutral','deadpan',null,null,null,null,'neutral',null,'smile','eyeRoll','neutral','laugh','smile','laugh','worry'];
const JE_IDX=[null,null,null,'neutral','eyeRoll',null,null,null,'smile','worry','neutral','wry','wry','neutral',null,null,'neutral','worry','worry','worry','worry'];
function enter(i){idx=i;const s=SCENES[i];if(s.set==='office'){s.p.stage=STAGE_IDX[i]||'banter';if(DE_IDX[i])s.p.dE=DE_IDX[i];if(JE_IDX[i])s.p.jE=JE_IDX[i];}curSet=s.set;dread=(s.bed&&s.bed.indexOf('dread')>=0)||s.set==='door';transStart=performance.now();camDir=(i%2)?1:-1;
  slug.classList.remove('dim');slug.innerHTML='<span class="no">'+s.slug[0]+'</span> &middot; '+s.slug[1];
  renderText(s);sceneT0=performance.now();
  if(s.shake)shakeEnd=performance.now()+700;
  if(s.sfx){if(s.sfx==='vox')playCaller(s.p.caller);else if(SFX[s.sfx])SFX[s.sfx]();}
  else if(s.p&&s.p.caller&&!s.sfx){/* no auto */}
  startBeds(s.bed||[]);
  dwell=calcDwell(s);if(progFill)progFill.style.width='0%';paused=false;document.body.classList.remove('paused');
  hint.classList.remove('hide');hint.classList.toggle('call',!!s.p.caller);hint.textContent='\u23f8 tap to pause';}
function calcDwell(s){let words=0;const n=s.text.length;s.text.forEach(b=>{words+=((b.s||'').split(/\s+/).filter(Boolean)).length;});const appear=0.45+0.15+n*0.5+0.5;const read=words*0.3;return Math.max(10,Math.min(16,appear+read+2));}
function togglePause(){if(idx<0||finishing)return;paused=!paused;document.body.classList.toggle('paused',paused);hint.textContent=paused?'\u25b6 tap to resume':'\u23f8 tap to pause';}
function advance(){if(finishing)return;if(idx>=SCENES.length-1){finalSequence();return;}enter(idx+1);}
function finalSequence(){finishing=true;hint.classList.add('hide');cap.innerHTML='';slug.classList.add('dim');tickFade();setTimeout(()=>{flashScreen(0.12);toBlack=true;},700);setTimeout(()=>{stopAllBeds();$('endScr').classList.remove('hide');},1700);}
function flashScreen(a){flashEl.style.transition='none';flashEl.style.opacity=a;requestAnimationFrame(()=>{flashEl.style.transition='opacity .4s';flashEl.style.opacity=0;});}
function start(){$('titleScr').classList.add('hide');$('endScr').classList.add('hide');audioInit();if(AC&&AC.state==='suspended')AC.resume();toBlack=false;finishing=false;dread=false;enter(0);if(!running){running=true;requestAnimationFrame(frame);}}
function frame(ts){if(!running)return;const dt=ts-(prevTs||ts);prevTs=ts;if(paused&&idx>=0){sceneT0+=dt;transStart+=dt;shakeEnd+=dt;}const el=(ts-sceneT0)/1000;if(auto&&!paused&&!finishing&&idx>=0&&!toBlack){if(progFill)progFill.style.width=(Math.min(1,el/dwell)*100)+'%';if(el>=dwell)advance();}
  ctx.save();
  /* camera locked: every beat is its own staged tableau */
  if(ts<shakeEnd&&!reduceMotion){const k=(shakeEnd-ts)/700;const m=6*k;ctx.translate((Math.random()-0.5)*m,(Math.random()-0.5)*m);}
  if(toBlack){ctx.fillStyle='#06080b';ctx.fillRect(-60,-60,W+120,H+120);}
  else if(idx<0){curSet='office';dread=false;bgOffice({dotty:'sit',jason:'sit'},el);}
  else{const s=SCENES[idx];if(s)(BG[s.set]||bgOffice)(s.p,el);}
  ctx.restore();
  if(grainCv&&!toBlack){ctx.save();ctx.globalAlpha=0.05;ctx.globalCompositeOperation='overlay';const ox=reduceMotion?0:(Math.random()*150)|0,oy=reduceMotion?0:(Math.random()*150)|0;for(let yy=-oy;yy<H;yy+=150)for(let xx=-ox;xx<W;xx+=150)ctx.drawImage(grainCv,xx,yy);ctx.restore();}
  if(!toBlack){const tr=Math.max(0,1-(ts-transStart)/450);if(tr>0){ctx.save();ctx.globalAlpha=tr*tr;ctx.fillStyle='#06080b';ctx.fillRect(0,0,W,H);ctx.restore();}}
  requestAnimationFrame(frame);}

app.addEventListener('click',(e)=>{if(e.target.id==='mute'||e.target.id==='replayBtn')return;if(!$('titleScr').classList.contains('hide')){start();return;}if(!$('endScr').classList.contains('hide'))return;togglePause();});
document.addEventListener('keydown',(e)=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();if(!$('titleScr').classList.contains('hide'))start();else if($('endScr').classList.contains('hide'))togglePause();}});
$('replayBtn').addEventListener('click',(e)=>{e.stopPropagation();start();});
$('mute').addEventListener('click',(e)=>{e.stopPropagation();muted=!muted;$('mute').innerHTML=muted?'&#128263;':'&#128266;';if(master)master.gain.value=muted?0:0.9;if(!muted&&AC&&AC.state==='suspended')AC.resume();});
resize();curSet='office';transStart=performance.now();running=true;requestAnimationFrame(frame);
</script>
</body>
