<head>

<title>(Un)Civility</title>
<link href="https://fonts.googleapis.com/css2?family=Staatliches&family=Work+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Chivo+Mono:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0e0d0a;--dust:#b8a98c;--olive:#8a9457;--bulb:#e8c25c;--blood:#a8302a;--sky:#7d94ae;--bone:#eae4d6;--mut:#8a8274;--line:rgba(255,255,255,.1);}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:'Work Sans',system-ui,sans-serif;color:var(--bone);background:#060505;display:flex;align-items:center;justify-content:center;min-height:100%;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
  #app{position:relative;width:100%;max-width:540px;height:100dvh;max-height:920px;overflow:hidden;background:#0a0908;cursor:pointer;}
  #stage{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1;}
  #app::after{content:"";position:absolute;inset:0;z-index:4;pointer-events:none;background:radial-gradient(130% 110% at 50% 42%,transparent 54%,rgba(4,3,3,.76));}
  #flash{position:absolute;inset:0;z-index:7;background:#fff;opacity:0;pointer-events:none;}
  #slug{position:absolute;top:0;left:0;right:0;z-index:6;display:flex;align-items:center;gap:9px;padding:14px 16px;font-family:'Chivo Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--bone);text-shadow:0 1px 10px rgba(0,0,0,.95);pointer-events:none;transition:opacity .5s;opacity:.85;}
  #slug .no{color:rgba(255,255,255,.45);}
  #slug.dim{opacity:0;}
  #cap{position:absolute;left:0;right:0;bottom:0;z-index:6;padding:0 26px calc(52px + env(safe-area-inset-bottom));display:flex;flex-direction:column;justify-content:flex-end;gap:9px;min-height:31%;background:linear-gradient(180deg,transparent,rgba(6,5,4,.32) 44%,rgba(6,5,4,.93));pointer-events:none;}
  .blk{opacity:0;transform:translateY(8px);animation:rise .5s cubic-bezier(.2,.8,.3,1) forwards;}
  @keyframes rise{to{opacity:1;transform:none;}}
  .narr{font-style:italic;font-size:17px;line-height:1.5;color:#d4cdbd;text-shadow:0 2px 16px rgba(0,0,0,.95);max-width:30em;}
  .line{font-size:18px;line-height:1.36;color:var(--bone);text-shadow:0 2px 16px rgba(0,0,0,.95);max-width:30em;}
  .line .who{font-family:'Chivo Mono',monospace;font-weight:600;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:2px;opacity:.9;}
  .line.harper .who{color:#a9b56f;} .line.grace .who{color:#9fb6cf;}
  .line.radio{font-family:'Chivo Mono',monospace;font-size:15px;padding-left:11px;border-left:2px solid var(--mut);color:#e3cf9e;}
  .line.radio .who{color:#d8ab4e;display:flex;align-items:center;gap:7px;}
  .line.radio .who::before{content:"";width:16px;height:9px;background:currentColor;clip-path:polygon(0 50%,10% 30%,20% 60%,30% 12%,40% 78%,50% 38%,60% 64%,70% 22%,80% 70%,90% 46%,100% 50%);}
  #hint{position:absolute;left:0;right:0;bottom:calc(20px + env(safe-area-inset-bottom));z-index:6;text-align:center;font-family:'Chivo Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--mut);pointer-events:none;animation:hb 2.1s ease-in-out infinite;}
  @keyframes hb{0%,100%{opacity:.3;}50%{opacity:.8;}}
  #hint.hide{display:none;} #hint.hard{color:var(--blood);}
  .screen{position:absolute;inset:0;z-index:8;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:34px 26px;}
  .screen.hide{display:none;}
  .kick{font-family:'Chivo Mono',monospace;font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--dust);margin-bottom:16px;opacity:0;animation:rise .8s .3s forwards;}
  .ttl{font-family:'Staatliches',sans-serif;font-size:clamp(58px,17vw,104px);line-height:.94;letter-spacing:2px;color:var(--bone);text-shadow:0 6px 40px rgba(0,0,0,.6);opacity:0;animation:rise 1s .2s forwards;}
  .ttl .un{color:var(--bulb);animation:flick 3.4s steps(1) infinite;}
  @keyframes flick{0%,100%{opacity:1;}7%{opacity:.35;}9%{opacity:1;}48%{opacity:1;}51%{opacity:.3;}53%{opacity:.95;}54%{opacity:.5;}56%{opacity:1;}}
  .sub{font-family:'Chivo Mono',monospace;font-style:italic;font-size:13px;color:var(--mut);margin-top:12px;opacity:0;animation:rise .9s .7s forwards;}
  .by{font-family:'Chivo Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-top:22px;opacity:0;animation:rise .9s 1s forwards;} .by b{color:#c6bba6;font-weight:400;}
  .epi{font-style:italic;font-size:16px;color:#d2c9b8;max-width:24em;margin-top:8px;line-height:1.5;opacity:0;animation:rise .9s .6s forwards;}
  .start{margin-top:28px;font-family:'Chivo Mono',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--bulb);opacity:0;animation:rise .9s 1.4s forwards;} .start .p{animation:hb 2.1s ease-in-out infinite;display:inline-block;}
  .replay{margin-top:24px;font-family:'Chivo Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);border:1px solid var(--line);border-radius:30px;padding:11px 22px;background:rgba(255,255,255,.03);pointer-events:auto;cursor:pointer;opacity:0;animation:rise .9s 1.6s forwards;}
  .replay:active{transform:scale(.97);}
  #mute{position:absolute;top:12px;right:14px;z-index:9;cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:14px;border-radius:50%;background:rgba(12,11,9,.7);border:1px solid var(--line);backdrop-filter:blur(5px);pointer-events:auto;}

  #progfill{height:100%;width:0;background:linear-gradient(90deg,var(--bulb),var(--blood));box-shadow:0 0 8px rgba(232,194,92,.5);transition:width .18s linear;}
  body.paused #progfill{box-shadow:none;opacity:.5;}
  @media (prefers-reduced-motion: reduce){.blk,.kick,.by,.epi,.sub,.start,.replay,.ttl{animation-duration:.01s;}#hint,.start .p,.ttl .un{animation:none;}}
</style>

<body>
<div id="app">
  <canvas id="stage"></canvas>

    <div class="sub">nine months into the unrest</div>
    <div class="by">Written by <b>Lanre Ajayi</b></div>

    <div class="by" style="animation-delay:.9s">Written by <b>Lanre Ajayi</b></div>

  </div>
</div>
<script>
"use strict";
const $=id=>document.getElementById(id);
const reduceMotion=matchMedia('(prefers-reduced-motion: reduce)').matches;
const app=$('app'),cv=$('stage'),ctx=cv.getContext('2d');
const cap=$('cap'),slug=$('slug'),hint=$('hint'),flashEl=$('flash');
let W=0,H=0,DPR=1;
function resize(){const r=app.getBoundingClientRect();W=r.width;H=r.height;DPR=Math.min(2,window.devicePixelRatio||1);cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);buildGrain();}
window.addEventListener('resize',resize);
let grainCv=null;
function buildGrain(){grainCv=document.createElement('canvas');grainCv.width=150;grainCv.height=150;const g=grainCv.getContext('2d');const im=g.createImageData(150,150);for(let i=0;i<im.data.length;i+=4){const v=128+(Math.random()*2-1)*52;im.data[i]=im.data[i+1]=im.data[i+2]=v;im.data[i+3]=255;}g.putImageData(im,0,0);}

const N=s=>({k:'narr',s});
const D=(who,s,cls)=>({k:'line',who,s,cls});

/* ================= SCENES ================= */
const SCENES=[
 {p:{stage:'room',radioOn:1},bed:['war','buzz'],sfx:'radiovox',
  text:[N("A place beyond rundown. Liveable once \u2014 not for a long time. It nearly masks the distant gunfire. Somewhere in the room, a radio."),
        D("News reader","\u201c(V/O) \u2026the Prime Minister has astounded Parliament and agreed to publicly meet the self-styled \u2018civil leader\u2019 known as \u2018Ambrose\u2019\u2026\u201d","radio")]},
 {p:{stage:'enter',radioOn:1},bed:['war','buzz'],sfx:'radiovox',
  text:[N("Private Marco Harper comes through the doorframe. No door. No uniform either \u2014 just a dark green T-shirt, a yellow crest, HARPER beneath it. His right hand, wrapped in a dirty, bloodied bandage, grips his gun. He pats his combat belt, as if guarding it."),
        D("News reader","\u201c(V/O) \u2026the first time the figure, who has largely existed online, will be seen in public \u2014 and could address tensions stemming from the controversial Repatriation Act\u2026\u201d","radio"),
        N("A light flickers overhead. He doesn\u2019t notice it.")]},
 {p:{stage:'radio',radioOn:1},bed:['war','buzz'],sfx:'radioclick',
  text:[N("The radio is here \u2014 portable, battery-run, on the ground. He picks it up and clicks it off."),
        N("In the split-second quiet: a sound. Unidentifiable.")]},
 {p:{stage:'listen'},bed:['war','buzz'],
  text:[N("He sets the radio down slowly, so as to listen to the rest of the room. Crouched. Nothing but the muffled gunfire. He rises, and starts to move away.")]},
 {p:{stage:'turn'},bed:['war','buzz','unease'],sfx:'groan',
  text:[N("The sound again \u2014 and this time, a groan with it. His grip tightens. The gun comes up."),
        N("He slows his breathing. Concentrates his footsteps. The sound is behind him. His unseen radio crackles \u2014 static \u2014 then nothing at all.")]},
 {p:{stage:'pile'},bed:['war','buzz','unease'],sfx:'groan',
  text:[N("He turns. A pile of papers and boxes. Another groan."),
        N("He edges towards his discovery, his unbandaged left hand reaching for the box in front of him.")]},
 {p:{stage:'hair'},bed:['war','buzz','unease'],
  text:[N("The box comes away. Dark hair, unkempt. Another box \u2014 a face, turned to its side. A dark cap nearly on the ground."),
        N("Is that a woman?")]},
 {p:{stage:'reveal',ge:'down'},bed:['buzz','unease'],
  text:[N("The next boxes are off before he realises it. A woman \u2014 on the ground, squinting against the light. Her eyes adjust, open, and turn to him. Pale, but not enough to hide the tan. Distressed, but not enough to hide the striking features."),
        N("Her name is Grace. He doesn\u2019t know that yet. What he knows is that her breathing is laboured.")]},
 {p:{stage:'duo',hp:'stand',ge:'down',he:'neutral'},bed:['buzz','unease'],
  text:[N("They stare at one another. No attempt at talking \u2014 eyes flickering with helplessness and confusion. She swallows hard, parts her lips. A long breath in. The attempt at words fails.")]},
 {p:{stage:'duo',hp:'stand',cap:1,he:'fierce',ge:'down'},bed:['buzz','dread'],
  text:[N("He starts towards her \u2014 and freezes. A blue cap by her head, a black mockingbird emblazoned on it. A tear on her dirty blue shirt, right where a logo would be."),
        N("It\u2019s enough. He straightens up.")]},
 {p:{stage:'duo',hp:'stand',gunLow:1,he:'fierce',ge:'worry'},bed:['buzz','dread'],
  text:[D("Harper","\u201cIs there anyone else here?\u201d","harper"),
        N("Her head turns left, then right. Left, then right \u2014 a shake, slow and with huge effort. His eyes harden. The gun rises slightly. Training taking hold."),
        N("She sees the steel in his eyes, takes one stilted breath, and closes hers. Tears building. The bulb flickers on.")]},
 {p:{stage:'duo',hp:'stand',bottleLap:1,he:'neutral',ge:'shock'},bed:['buzz'],sfx:'bottle',
  text:[N("Something lands in her lap. Her eyes snap open. It takes her a couple of seconds to remember the present sitting there: a bottle of water."),
        N("When she looks up, the gun is lowered at his side.")]},
 {p:{stage:'duo',hp:'crouch',pray:1,drink:1,he:'neutral',ge:'down'},bed:['buzz'],
  text:[N("He holsters the gun, presses his bandaged hands to his cheeks \u2014 bloodying one \u2014 then clasps them, as if in prayer, his mouth behind the gesture."),
        D("Harper","\u201cDrink!\u201d","harper"),
        N("She almost can\u2019t comprehend the act. Then she drinks \u2014 slow, grateful, water spilling from her mouth. No room for embarrassment.")]},
 {p:{stage:'duo',hp:'crouch',bottleSpill:1,he:'neutral',ge:'down'},bed:['buzz'],sfx:'spill',
  text:[N("Re-sealing the bottle is beyond her shaking hands. It falls. Water pours out across the floor."),
        N("Despair flickers over her face \u2014 then resignation. Her gaze comes back to him, and his steel inspires an attempt at her own."),
        D("Grace","\u201cGracias.\u201d","grace")]},
 {p:{stage:'duo',hp:'stand',he:'neutral',ge:'neutral'},bed:['buzz'],
  text:[N("As he stands contemplating, his eyes make their first, subtle acknowledgment of the flickering bulb. Then back to her."),
        D("Harper","\u201cName?\u201d","harper"),
        D("Grace","\u201c\u00bfQue?\u201d","grace"),
        N("The reply doesn\u2019t match the flash of alertness in her eyes \u2014 and he catches it."),
        D("Harper","\u201cI know you understand me. What is your name?\u201d","harper"),
        D("Grace","\u201cGrace.\u201d","grace")]},
 {p:{stage:'duo',hp:'stand',handHolster:1,he:'neutral',ge:'soft'},bed:['buzz'],
  text:[N("The light flickers again. His eyes try to follow it without his head moving. His hand finds the holstered gun."),
        D("Grace","\u201cIt is annoying. After two days it really is\u2026 but the darkness is worse. I just want my daughter.\u201d","grace"),
        N("That stops whatever he was going to say.")]},
 {p:{stage:'duo',hp:'stand',blood:1,he:'down',ge:'soft'},bed:['buzz','grief'],
  text:[N("He just observes now. The blood coming from under the one box still covering her leg. The anguish. The struggled breathing."),
        N("His assessment is clocked. She manages an improbable smile."),
        D("Grace","\u201cI used to hate it when you men looked at me like that.\u201d","grace"),
        D("Harper","\u201cLike what?\u201d","harper")]},
 {p:{stage:'duo',hp:'crouch',blood:1,he:'neutral',ge:'down'},bed:['buzz','grief'],
  text:[D("Harper","\u201cWhat happened?\u201d","harper"),
        D("Grace","\u201cI drew a line at taking lives. I wasn\u2019t useful anymore.\u201d","grace"),
        D("Harper","\u201cYour own people?\u201d","harper"),
        N("A weak nod."),
        D("Grace","\u201cTo think, we felt part of a community. Like we finally belonged.\u201d","grace")]},
 {p:{stage:'duo',hp:'crouch',blood:1,he:'worry',ge:'worry'},bed:['buzz','grief'],
  text:[N("She winces \u2014 and still will not look at her leg."),
        D("Grace","\u201cI haven\u2019t seen it\u2026 I just can\u2019t. How bad is it?\u201d","grace"),
        N("He looks under the box. Breathes out, puffing his cheeks."),
        D("Harper","\u201cVery. You\u2019re bleeding out. You don\u2019t have long.\u201d","harper"),
        D("Grace","\u201cSi. How long?\u201d","grace"),
        D("Harper","\u201cI don\u2019t know.\u201d","harper"),
        D("Grace","\u201cThat\u2019s too long!\u201d","grace")]},
 {p:{stage:'duo',hp:'stand',point:1,he:'shock',ge:'down'},bed:['buzz','dread'],
  text:[N("Before he can process it, she is pointing. He follows her finger \u2014 and freezes. It is pointing at the gun. He shakes his head almost without realising, and touches his combat belt again."),
        D("Harper","\u201cNo. I can\u2019t do it\u2026\u201d","harper"),
        D("Grace","(weakly) \u201cPlease\u2026\u201d","grace"),
        D("Harper","\u201cI\u2019ve got to find my colleagues\u2026 I shouldn\u2019t still be here\u2014\u201d","harper"),
        D("Grace","\u201cPlease!!\u201d","grace")]},
 {p:{stage:'aim',he:'worry'},bed:['dread','buzz'],last_hard:1,
  text:[N("The tears and the desperation reach him. He starts to raise the gun. It seems to take an eternity to aim. The flickering becomes more pronounced \u2014 and he notices his hands shaking profusely."),
        N("His finger finds the trigger. He looks at her. She looks at peace. Ready."),
        N("The shaking subsides. And just as he is about to pull \u2014 he sees something in her face.")]},
 {p:{stage:'ceiling'},bed:['dread'],sfx:'shot_glass',shake:1,flash:0.85,
  text:[N("He pulls the trigger \u2014 but the gun is raised. Fired into the ceiling."),
        N("A loud BANG. A little sound of glass. Then silence."),
        N("The flickering light is no more.")]},
 {p:{stage:'duo',hp:'crouch',blood:1,he:'soft',ge:'shock'},bed:['grief'],
  text:[N("He takes a breath and looks at her \u2014 shocked, inquisitive, through the draining energy."),
        D("Grace","\u201cWhy?\u201d","grace"),
        D("Harper","\u201cThink about your daughter. Let her be with you at the end.\u201d","harper"),
        N("She nods, and offers the most genuine smile so far."),
        D("Grace","\u201cMija. My baby. All I wanted was to be her role model. Her hero.\u201d","grace")]},
 {p:{stage:'duo',hp:'crouch',bandUp:1,he:'smile',ge:'smile'},bed:['grief'],
  text:[N("He holds up the bandaged hand."),
        D("Harper","\u201cI\u2019m doing all this for my son. Maybe they can be friends after all of this.\u201d","harper"),
        D("Grace","\u201cMaybe. Thank you\u2026 You didn\u2019t tell me your name.\u201d","grace"),
        D("Harper","\u201cPrivate Harper\u2026 Marco.\u201d","harper"),
        N("She looks the most content she has in two days. The smile she shares is heartfelt."),
        D("Grace","\u201cAre you going to stay with me? I don\u2019t want to go alone.\u201d","grace")]},
 {p:{stage:'duo',hp:'stand',urgent:1,he:'shock',ge:'shock'},bed:['dread'],sfx:'static',
  text:[N("His unseen radio crackles. The smile is gone. Full concentration."),
        D("Harper","\u201cI\u2019m sorry, I can\u2019t.\u201d","harper"),
        N("He stands up quickly."),
        D("Harper","\u201cI just found out \u2014 the meeting between the Prime Minister and that Ambrose fella is a trap!\u201d","harper"),
        N("He hasn\u2019t noticed that Grace looks totally terrified. Absolutely horrified.")]},
 {p:{stage:'scramble',he:'neutral',ge:'fierce'},bed:['dread'],
  text:[D("Harper","\u201cIf my colleagues and the PM go where they\u2019ve been told, Ambrose\u2019s group will ambush them \u2014 this turns into full civil war!\u201d","harper"),
        D("Grace","\u201cNo\u2026\u201d","grace"),
        N("She is barely moving, but her motions are those of a desperate person \u2014 a hand at her side, scrambling under the screwed-up newspapers. It appears to stop."),
        D("Harper","\u201cMy intel says Ambrose and his rogue army are hidden under the Council Hall \u2014 if I can get to\u2014\u201d","harper")]},
 {p:{stage:'shot'},bed:['dread'],sfx:'gunshot',shake:1,flash:0.7,
  text:[N("BANG!!!"),
        N("He stops in his tracks. Looks at her, horrified \u2014 then looks down to confirm what he already knows. Blood, coming from his stomach."),
        N("Grace has a pistol in her shaking hands.")]},
 {p:{stage:'knees',he:'down',ge:'down'},bed:['grief'],
  text:[N("His legs give way. He falls to his knees \u2014 nearly level with her now. Both have tears in their eyes."),
        D("Grace","\u201cI\u2019m sorry, Marco.\u201d","grace"),
        D("Grace","\u201cBut I\u2019ve got to protect my daughter. My people have her. She\u2019s safe with them. You would do the same for your son.\u201d","grace"),
        N("A weak nod of his own, in acknowledgment.")]},
 {p:{stage:'knees',he:'soft',ge:'soft',closer:1},bed:['grief'],last:1,
  text:[D("Grace","\u201cThe country is headed to a better place. Me and you won\u2019t be going alone. And I get to be a hero to my daughter after all.\u201d","grace"),
        N("He nods again."),
        D("Grace","\u201cGracias, Private Harper\u2026\u201d","grace"),
        N("Private Marco Harper closes his eyes. With her last energy, she aims at her target \u2014 and closes hers.")]}
];

/* ================= AUDIO ================= */
let AC=null,master=null,muted=false,beds={};
function audioInit(){if(AC)return;try{AC=new (window.AudioContext||window.webkitAudioContext)();master=AC.createGain();master.gain.value=0.9;master.connect(AC.destination);}catch(e){AC=null;}}
function now(){return AC?AC.currentTime:0;}
function nbuf(d){const sr=AC.sampleRate,b=AC.createBuffer(1,Math.floor(sr*d),sr),x=b.getChannelData(0);for(let i=0;i<x.length;i++)x[i]=Math.random()*2-1;return b;}
function tone(f,t,dur,amp,type){const o=AC.createOscillator();o.type=type||'sine';o.frequency.value=f;const g=AC.createGain();g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(amp,t+0.012);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g);g.connect(master);o.start(t);o.stop(t+dur+0.02);}
function radiovoxS(){if(!AC||muted)return;const t=now();for(let i=0;i<6;i++){const tt=t+i*0.22;const o=AC.createOscillator();o.type='sawtooth';o.frequency.value=170+((i*37)%60);const bp=AC.createBiquadFilter();bp.type='bandpass';bp.frequency.value=900;bp.Q.value=3;const g=AC.createGain();g.gain.setValueAtTime(0.0001,tt);g.gain.linearRampToValueAtTime(0.05,tt+0.03);g.gain.exponentialRampToValueAtTime(0.0001,tt+0.18);o.connect(bp);bp.connect(g);g.connect(master);o.start(tt);o.stop(tt+0.2);}}
function radioclickS(){if(!AC||muted)return;const t=now();tone(2200,t,0.03,0.08,'square');}

  else{const p=document.createElement('p');p.className='line'+(b.cls?' '+b.cls:'');p.innerHTML='<span class="who">'+esc(b.who)+'</span>'+esc(b.s);el.appendChild(p);}
  cap.appendChild(el);});}
function enter(i){idx=i;const s=SCENES[i];transStart=performance.now();
  bulbDead=(i>=21);
  slug.classList.remove('dim');slug.innerHTML='<span class="no">INT. UNNAMED LOCATION</span> &middot; DAY';
  renderText(s);sceneT0=performance.now();
  if(s.shake)shakeEnd=performance.now()+700;

  dwell=calcDwell(s);if(progFill)progFill.style.width='0%';paused=false;document.body.classList.remove('paused');
  hint.classList.remove('hide');hint.classList.toggle('hard',!!s.last_hard);hint.textContent='\u23f8 tap to pause';}
function calcDwell(s){let words=0;const n=s.text.length;s.text.forEach(b=>{words+=((b.s||'').split(/\s+/).filter(Boolean)).length;});const appear=0.42+0.12+n*0.5+0.5;const read=words*0.32;return Math.max(11,Math.min(18,appear+read+2.2));}

function finalSequence(){finishing=true;hint.classList.add('hide');cap.innerHTML='';slug.classList.add('dim');
  setTimeout(()=>{gunshotS();flashScreen(0.95);toBlack=true;},900);
  setTimeout(()=>{stopAllBeds();$('endScr').classList.remove('hide');},2300);}
function flashScreen(a){flashEl.style.transition='none';flashEl.style.opacity=a;requestAnimationFrame(()=>{flashEl.style.transition='opacity .5s';flashEl.style.opacity=0;});}
function start(){$('titleScr').classList.add('hide');$('endScr').classList.add('hide');audioInit();if(AC&&AC.state==='suspended')AC.resume();toBlack=false;finishing=false;bulbDead=false;enter(0);if(!running){running=true;requestAnimationFrame(frame);}}
function frame(ts){if(!running)return;const dt=ts-(prevTs||ts);prevTs=ts;if(paused&&idx>=0){sceneT0+=dt;transStart+=dt;shakeEnd+=dt;}const el=(ts-sceneT0)/1000;if(auto&&!paused&&!finishing&&idx>=0&&!toBlack){if(progFill)progFill.style.width=(Math.min(1,el/dwell)*100)+'%';if(el>=dwell)advance();}
  try{
    ctx.save();
    if(ts<shakeEnd&&!reduceMotion){const k=(shakeEnd-ts)/700;const m=7*k;ctx.translate((Math.random()-0.5)*m,(Math.random()-0.5)*m);}
    if(toBlack){ctx.fillStyle='#050404';ctx.fillRect(-40,-40,W+80,H+80);}
    else if(idx<0){curFlick=flick(el);room(el);radioBox(W*0.62,H*0.72,H*0.05,false,el);}
    else{const s=SCENES[idx];if(s)bgRoom(s.p,el);}
    ctx.restore();
  }catch(e){}
  if(grainCv&&!toBlack){ctx.save();ctx.globalAlpha=0.05;ctx.globalCompositeOperation='overlay';const ox=reduceMotion?0:(Math.random()*150)|0,oy=reduceMotion?0:(Math.random()*150)|0;for(let yy=-oy;yy<H;yy+=150)for(let xx=-ox;xx<W;xx+=150)ctx.drawImage(grainCv,xx,yy);ctx.restore();}
  if(!toBlack){const tr=Math.max(0,1-(ts-transStart)/420);if(tr>0){ctx.save();ctx.globalAlpha=tr*tr;ctx.fillStyle='#060505';ctx.fillRect(0,0,W,H);ctx.restore();}}
  requestAnimationFrame(frame);}

app.addEventListener('click',(e)=>{if(e.target.id==='mute'||e.target.id==='replayBtn')return;if(!$('titleScr').classList.contains('hide')){start();return;}if(!$('endScr').classList.contains('hide'))return;togglePause();});
document.addEventListener('keydown',(e)=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();if(!$('titleScr').classList.contains('hide'))start();else if($('endScr').classList.contains('hide'))togglePause();}});
$('replayBtn').addEventListener('click',(e)=>{e.stopPropagation();start();});
$('mute').addEventListener('click',(e)=>{e.stopPropagation();muted=!muted;$('mute').innerHTML=muted?'&#128263;':'&#128266;';if(master)master.gain.value=muted?0:0.9;if(!muted&&AC&&AC.state==='suspended')AC.resume();});
resize();transStart=performance.now();running=true;requestAnimationFrame(frame);
</script>
</body>
