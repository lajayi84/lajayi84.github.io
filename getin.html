let AC=null,master=null,muted=false,beds={};
function audioInit(){if(AC)return;try{AC=new (window.AudioContext||window.webkitAudioContext)();master=AC.createGain();master.gain.value=0.9;master.connect(AC.destination);}catch(e){AC=null;}}
function now(){return AC?AC.currentTime:0;}
function nbuf(d){const sr=AC.sampleRate,b=AC.createBuffer(1,Math.floor(sr*d),sr),x=b.getChannelData(0);for(let i=0;i<x.length;i++)x[i]=Math.random()*2-1;return b;}
function tone(f,t,dur,amp,type){const o=AC.createOscillator();o.type=type||'sine';o.frequency.value=f;const g=AC.createGain();g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(amp,t+0.012);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g);g.connect(master);o.start(t);o.stop(t+dur+0.02);}
function chord(freqs,t,dur,amp,type){freqs.forEach(f=>tone(f,t,dur,amp,type));}
function cardoorS(){if(!AC||muted)return;const t=now();const o=AC.createOscillator();o.type='sine';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(60,t+0.16);const g=AC.createGain();g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.2);o.connect(g);g.connect(master);o.start(t);o.stop(t+0.22);const s=AC.createBufferSource();s.buffer=nbuf(0.05);const g2=AC.createGain();g2.gain.setValueAtTime(0.18,t);g2.gain.exponentialRampToValueAtTime(0.0001,t+0.06);s.connect(g2);g2.connect(master);s.start(t);s.stop(t+0.06);}
function thudS(){if(!AC||muted)return;const t=now();const o=AC.createOscillator();o.type='sine';o.frequency.setValueAtTime(110,t);o.frequency.exponentialRampToValueAtTime(48,t+0.18);const g=AC.createGain();g.gain.setValueAtTime(0.26,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.24);o.connect(g);g.connect(master);o.start(t);o.stop(t+0.26);}
function clinkS(){if(!AC||muted)return;const t=now();tone(1900,t,0.06,0.04,'triangle');tone(2500,t+0.03,0.05,0.03,'triangle');}
function stepsS(){if(!AC||muted)return;const t=now();for(let i=0;i<4;i++){const tt=t+i*0.34;const s=AC.createBufferSource();s.buffer=nbuf(0.04);const bp=AC.createBiquadFilter();bp.type='lowpass';bp.frequency.value=300;const g=AC.createGain();g.gain.setValueAtTime(0.12,tt);g.gain.exponentialRampToValueAtTime(0.0001,tt+0.08);s.connect(bp);bp.connect(g);g.connect(master);s.start(tt);s.stop(tt+0.09);}}

function startBeds(list){Object.keys(beds).forEach(k=>{if(list.indexOf(k)<0)stopBed(k);});list.forEach(k=>{if(!beds[k])beds[k]=makeBed(k);});}

function makeBed(kind){let timer=null,alive=true,nodes=[];

  if(kind==='tension'){drone([55,82],0.05,'sawtooth',260);pulse(1500,110);}
  else if(kind==='dark'){drone([44,58,66],0.07,'sawtooth',200);}
  else if(kind==='party'){/* brief, handled by burst sfx */ drone([262,330],0.03,'triangle',1200);}
  else if(kind==='wake'){drone([98,131,146],0.06,'sine',300);}
  else if(kind==='chase'){drone([65,98],0.06,'sawtooth',400);pulse(300,160);}
  else if(kind==='after'){drone([49,73],0.05,'sine',240);}

}

    // scattered silly string settling
    ctx.strokeStyle='rgba(230,150,80,0.5)';ctx.lineWidth=2;for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(W*(0.3+i*0.1),H*0.5);ctx.quadraticCurveTo(W*(0.32+i*0.1),H*0.56,W*(0.29+i*0.1),H*0.62);ctx.stroke();}}
  else if(stage==='wake'){clown(W*0.34,baseY,H*0.52,'peta',{mask:1},L);clown(W*0.66,baseY,H*0.52,'elijah',{mask:1},L);}
  else if(stage==='masksoff'){clown(W*0.34,baseY,H*0.52,'peta',{mask:0},L);clown(W*0.66,baseY,H*0.52,'elijah',{mask:0},L);
    // two men stepping forward (menacing silhouettes)
    mourner(W*0.44,H*0.72,H*0.5,L,150);mourner(W*0.56,H*0.72,H*0.5,L,110);}
  vign(0.16);}
function bgChase(p,el){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#20262b');g.addColorStop(1,'#0c0f12');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);const L=lightAt();
  // motion-streaked hallway
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=2;for(let i=0;i<10;i++){const y=H*0.2+i*H*0.06;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y+H*0.02);ctx.stroke();}
  // clowns running (backs, coats half-on over costumes)
  const baseY=H*0.9;
  clown(W*0.4,baseY,H*0.5,'peta',{mask:0},L);clown(W*0.58,baseY,H*0.5,'elijah',{mask:0},L);
  // swing doors ahead
  ctx.fillStyle='#0a0d10';ctx.fillRect(W*0.44,H*0.28,W*0.12,H*0.4);
  // two men pulling up behind (small)
  mourner(W*0.2,H*0.7,H*0.34,L,150);mourner(W*0.8,H*0.7,H*0.34,L,110);
  vign(0.2);}
const BG={car:bgCar,carempty:bgCarEmpty,titlecard:bgTitle,hallway:bgHallway,corridor:bgCorridor,reveal:bgReveal,chase:bgChase};

/* ================= RUNNER (no camera zoom/push) ================= */
let idx=-1,sceneT0=0,running=false,shakeEnd=0,finishing=false,toBlack=false,transStart=0,transCol='#06070a';
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderText(s){cap.innerHTML='';s.text.forEach((b,i)=>{const el=document.createElement('div');el.className='blk';el.style.animationDelay=(0.12+i*0.5)+'s';
  if(b.k==='narr'){const p=document.createElement('p');p.className='narr';p.textContent=b.s;el.appendChild(p);}
  else{const p=document.createElement('p');p.className='line'+(b.cls?' '+b.cls:'');p.innerHTML='<span class="who">'+esc(b.who)+'</span>'+esc(b.s);el.appendChild(p);}
  cap.appendChild(el);});}
function enter(i){idx=i;const s=SCENES[i];curSet=s.set;transStart=performance.now();
  slug.classList.remove('dim');if(s.set==='titlecard'){slug.innerHTML='';}else{slug.innerHTML='<span class="no">'+s.slug[0]+'</span>'+(s.slug[1]?' &middot; '+s.slug[1]:'');}
  renderText(s);sceneT0=performance.now();
  if(s.shake)shakeEnd=performance.now()+700;
  if(s.flash==='white'){flashScreen(0.9);} 
  if(s.sfx&&SFX[s.sfx])SFX[s.sfx]();
  startBeds(s.bed||[]);
  hint.classList.remove('hide');hint.classList.toggle('go',!!s.last_go);
  hint.textContent=s.last?'tap to end':(s.last_go?'tap to GO':(s.set==='titlecard'?'tap to continue':'tap to continue'));}
function advance(){if(finishing)return;if(idx>=SCENES.length-1){finalSequence();return;}enter(idx+1);}
function finalSequence(){finishing=true;hint.classList.add('hide');cap.innerHTML='';slug.classList.add('dim');const t=now();if(AC&&!muted){tone(70,t,0.4,0.12,'sine');}setTimeout(()=>{toBlack=true;},400);setTimeout(()=>{stopAllBeds();$('endScr').classList.remove('hide');},1500);}
function flashScreen(a){flashEl.style.transition='none';flashEl.style.opacity=a;requestAnimationFrame(()=>{flashEl.style.transition='opacity .5s';flashEl.style.opacity=0;});}
function start(){$('titleScr').classList.add('hide');$('endScr').classList.add('hide');audioInit();if(AC&&AC.state==='suspended')AC.resume();toBlack=false;finishing=false;enter(0);if(!running){running=true;requestAnimationFrame(frame);}}
function frame(ts){if(!running)return;const el=(ts-sceneT0)/1000;
  try{
    ctx.save();
    if(ts<shakeEnd&&!reduceMotion){const k=(shakeEnd-ts)/700;const m=7*k;ctx.translate((Math.random()-0.5)*m,(Math.random()-0.5)*m);}
    if(toBlack){ctx.fillStyle='#050608';ctx.fillRect(-40,-40,W+80,H+80);}
    else if(idx<0){curSet='titlecard';bgTitle({},el);}
    else{const s=SCENES[idx];if(s)(BG[s.set]||bgCar)(s.p,el);}
    ctx.restore();
  }catch(e){/* never let a draw error kill the loop */}
  if(grainCv&&!toBlack){ctx.save();ctx.globalAlpha=0.05;ctx.globalCompositeOperation='overlay';const ox=reduceMotion?0:(Math.random()*150)|0,oy=reduceMotion?0:(Math.random()*150)|0;for(let yy=-oy;yy<H;yy+=150)for(let xx=-ox;xx<W;xx+=150)ctx.drawImage(grainCv,xx,yy);ctx.restore();}
  if(!toBlack){const tr=Math.max(0,1-(ts-transStart)/420);if(tr>0){ctx.save();ctx.globalAlpha=tr*tr;ctx.fillStyle=transCol;ctx.fillRect(0,0,W,H);ctx.restore();}}
  requestAnimationFrame(frame);}

app.addEventListener('click',(e)=>{if(e.target.id==='mute'||e.target.id==='replayBtn')return;if(!$('titleScr').classList.contains('hide')){start();return;}if(!$('endScr').classList.contains('hide'))return;advance();});
document.addEventListener('keydown',(e)=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();if(!$('titleScr').classList.contains('hide'))start();else if($('endScr').classList.contains('hide'))advance();}});
$('replayBtn').addEventListener('click',(e)=>{e.stopPropagation();start();});
$('mute').addEventListener('click',(e)=>{e.stopPropagation();muted=!muted;$('mute').innerHTML=muted?'&#128263;':'&#128266;';if(master)master.gain.value=muted?0:0.9;if(!muted&&AC&&AC.state==='suspended')AC.resume();});
resize();curSet='titlecard';transStart=performance.now();running=true;requestAnimationFrame(frame);
</script>
