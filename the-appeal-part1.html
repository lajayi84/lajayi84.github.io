<title>The Appeal — Part One</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Spectral:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{ --page:#e7e0d2; --ink:#2a251f; --ink-soft:#6b6357; --accent:#b07a4e; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{background:#050506;color:var(--ink);font-family:'Spectral',Georgia,serif;
    display:flex;align-items:center;justify-content:center;min-height:100%;overflow:hidden;
    user-select:none;-webkit-user-select:none;touch-action:manipulation;}
  #app{position:relative;width:100%;max-width:520px;height:100dvh;max-height:920px;overflow:hidden;
    background:#050506;display:flex;flex-direction:column;cursor:pointer;}

  #window{position:relative;flex:0 1 56%;min-height:44%;overflow:hidden;background:#000;}
  #scene{position:absolute;inset:0;width:100%;height:100%;display:block;}
  #window::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:5;
    background:
      radial-gradient(120% 92% at 58% 45%, transparent 45%, rgba(5,5,8,.5) 80%, rgba(5,5,8,.8)),
      linear-gradient(180deg, rgba(5,6,10,.4), transparent 20%, transparent 80%, rgba(5,6,10,.5));}
  #grain{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:.05;mix-blend-mode:overlay;}
  #eyebrow{position:absolute;top:20px;left:24px;z-index:6;
    font-family:'Fraunces',serif;font-weight:500;font-size:10.5px;letter-spacing:.3em;
    text-transform:uppercase;color:rgba(231,224,210,.5);}
  #eyebrow b{display:block;font-size:9px;letter-spacing:.26em;color:rgba(231,224,210,.28);font-weight:400;margin-top:4px;}
  /* fade layer for scene transitions */
  #fade{position:absolute;inset:0;z-index:7;background:#050506;opacity:0;pointer-events:none;}

  #band{flex:1 1 auto;background:var(--page);position:relative;
    padding:26px 30px 0;overflow:hidden;display:flex;flex-direction:column;min-height:0;
    box-shadow:0 -40px 80px rgba(0,0,0,.55);}
  #band::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,rgba(42,37,31,.16) 18%,rgba(42,37,31,.16) 82%,transparent);}
  #prose{font-size:15.5px;line-height:1.56;color:var(--ink);max-width:33em;
    flex:1 1 auto;overflow-y:auto;overflow-x:hidden;padding-bottom:46px;
    scrollbar-width:none;-webkit-overflow-scrolling:touch;}
  #prose::-webkit-scrollbar{display:none;}
  #prose p{margin-bottom:.66em;opacity:0;transform:translateY(7px);animation:rise 1s cubic-bezier(.2,.7,.25,1) forwards;}
  #prose p:nth-child(2){animation-delay:.55s;}
  #prose p:nth-child(3){animation-delay:1.0s;}
  #prose.first p:first-child::first-letter{font-family:'Fraunces',serif;font-weight:500;font-size:3.1em;line-height:.78;
    float:left;margin:.05em .12em 0 0;color:#332c22;}
  #prose em{font-style:italic;color:#463c30;}
  #prose .dlg{color:#3a3025;}
  @keyframes rise{to{opacity:1;transform:none;}}

  #foot{position:absolute;left:0;right:0;bottom:0;z-index:3;
    padding:10px 0 calc(12px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;
    background:linear-gradient(180deg,rgba(231,224,210,0),var(--page) 42%);}
  #bar{width:64%;max-width:280px;height:2px;background:rgba(42,37,31,.14);border-radius:2px;overflow:hidden;}
  #barfill{height:100%;width:0;background:var(--accent);transition:width .25s linear;}
  body.paused #barfill{opacity:.4;}
  #hint{font-family:'Fraunces',serif;font-size:9px;letter-spacing:.26em;text-transform:uppercase;
    color:var(--ink-soft);opacity:.5;animation:hb 2.8s ease-in-out infinite;}
  @keyframes hb{0%,100%{opacity:.28;}50%{opacity:.58;}}
  #hint.hide{display:none;}

  #mute{position:absolute;top:16px;right:18px;z-index:8;width:30px;height:30px;display:flex;align-items:center;
    justify-content:center;font-size:13px;border-radius:50%;background:rgba(10,10,14,.4);
    border:1px solid rgba(231,224,210,.18);color:rgba(231,224,210,.7);pointer-events:auto;cursor:pointer;}

  .screen{position:absolute;inset:0;z-index:20;background:#070708;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:40px;transition:opacity 1.1s;}
  .screen.gone{opacity:0;pointer-events:none;}
  .k{font-family:'Fraunces',serif;font-size:10.5px;letter-spacing:.34em;text-transform:uppercase;
    color:rgba(231,224,210,.48);margin-bottom:22px;}
  .ttl{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(44px,13vw,72px);color:#e7e0d2;
    line-height:.96;letter-spacing:-.01em;}
  .ttl em{font-style:italic;color:#c9a27a;}
  .sub{font-family:'Spectral',serif;font-style:italic;font-size:14.5px;color:rgba(231,224,210,.5);
    margin-top:20px;max-width:24em;line-height:1.55;}
  .btns{display:flex;gap:12px;margin-top:34px;}
  .go{font-family:'Fraunces',serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    padding:14px 26px;border-radius:2px;border:1px solid #c9a27a;background:#c9a27a;color:#0a0908;
    cursor:pointer;pointer-events:auto;}
  .go.ghost{background:transparent;color:#c9a27a;}
  .go:active{transform:scale(.97);}
  #endScr .ttl{font-size:clamp(30px,8vw,46px);}
  #endScr .epi{font-family:'Spectral',serif;font-style:italic;font-size:15px;color:rgba(231,224,210,.62);
    max-width:22em;margin-top:18px;line-height:1.6;}
  #endScr .part{font-family:'Fraunces',serif;font-size:11px;letter-spacing:.28em;text-transform:uppercase;
    color:rgba(231,224,210,.4);margin-top:26px;}
  @media (prefers-reduced-motion:reduce){#prose p{animation-duration:.01s;}#hint{animation:none;}}
</style>

<body>
<div id="app">
  <div id="window">
    <canvas id="scene"></canvas>
    <canvas id="grain"></canvas>
    <div id="eyebrow">The Appeal<b>Part One · The Crossing</b></div>
    <div id="fade"></div>
  </div>
  <div id="mute">&#9835;</div>
  <div id="band">
    <div id="prose"></div>
    <div id="foot"><div id="bar"><div id="barfill"></div></div><div id="hint">tap to continue</div></div>
  </div>
  <div class="screen" id="titleScr">
    <div class="k">A film in four parts</div>
    <div class="ttl">The <em>Appeal</em></div>
    <div class="sub">Part One — The Crossing</div>
    <div class="btns"><button class="go" id="btnRead">Read</button><button class="go ghost" id="btnAuto">Play to me</button></div>
  </div>
  <div class="screen gone" id="endScr">
    <div class="k">End of Part One</div>
    <div class="ttl">The <em>Appeal</em></div>
    <div class="epi">"That's him," JJ said. "That's — Mo, that's my dad."</div>
    <div class="part">Part Two — The Save</div>
    <div class="endbtns" style="margin-top:28px;display:flex;gap:12px;"><a class="go" id="btnNext" href="the-appeal-part2.html">Continue &#8594;</a><button class="go ghost" id="btnReplay">Read again</button></div>
  </div>
</div>

<script>
/* ===== THE APPEAL · Part One — engine ===== */
const $=id=>document.getElementById(id);
const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
const cv=$('scene'),ctx=cv.getContext('2d');
const gcv=$('grain'),gx=gcv.getContext('2d');
let W=0,H=0,DPR=1,grainTiles=[];

function size(){const r=$('window').getBoundingClientRect();
  W=r.width;H=r.height;DPR=Math.min(2,window.devicePixelRatio||1);
  cv.width=W*DPR;cv.height=H*DPR;gcv.width=W*DPR;gcv.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);gx.setTransform(DPR,0,0,DPR,0,0);buildGrain();}
window.addEventListener('resize',size);

function buildGrain(){grainTiles=[];
  for(let k=0;k<3;k++){const c=document.createElement('canvas');c.width=160;c.height=160;
    const g=c.getContext('2d'),id=g.createImageData(160,160),d=id.data;
    for(let i=0;i<d.length;i+=4){const v=128+(Math.random()*2-1)*42;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;}
    g.putImageData(id,0,0);grainTiles.push(c);}}
function drawGrain(){if(!grainTiles.length||reduce)return;
  gx.clearRect(0,0,W,H);const tile=grainTiles[(Math.random()*grainTiles.length)|0];
  const ox=-(Math.random()*160)|0,oy=-(Math.random()*160)|0;
  for(let y=oy;y<H;y+=160)for(let x=ox;x<W;x+=160)gx.drawImage(tile,x,y);}

/* ---- colour + light helpers ---- */
function lerp(a,b,t){return a+(b-a)*t;}
function rgba(r,g,b,a){return `rgba(${r|0},${g|0},${b|0},${a})`;}
function vgrad(y0,y1,stops){const g=ctx.createLinearGradient(0,y0,0,y1);stops.forEach(s=>g.addColorStop(s[0],s[1]));return g;}
function radial(x,y,r0,r1,stops){const g=ctx.createRadialGradient(x,y,r0,x,y,r1);stops.forEach(s=>g.addColorStop(s[0],s[1]));return g;}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
/* soft glow blob */
function glow(x,y,r,col,a){ctx.fillStyle=radial(x,y,2,r,[[0,rgba(col[0],col[1],col[2],a)],[1,rgba(col[0],col[1],col[2],0)]]);ctx.fillRect(0,0,W,H);}
/* a backlit human silhouette — presence via posture, no features. lean: -1 forward-left..+1 back */
function figure(x,groundY,scale,opt){opt=opt||{};
  const a=opt.a==null?.66:opt.a;const col=opt.col||[26,16,12];const lean=opt.lean||0;
  ctx.save();ctx.translate(x,groundY);ctx.rotate(lean*0.12);
  ctx.fillStyle=rgba(col[0],col[1],col[2],a);
  // torso
  ctx.beginPath();ctx.ellipse(0,-scale*0.9,scale*0.42,scale*0.95,0,0,7);ctx.fill();
  // head
  ctx.beginPath();ctx.arc(0,-scale*1.95,scale*0.32,0,7);ctx.fill();
  // shoulders hint
  ctx.beginPath();ctx.ellipse(0,-scale*1.5,scale*0.55,scale*0.3,0,0,7);ctx.fill();
  ctx.restore();}
/* rim light on a silhouette edge */
function rim(x,y,r,col,a){ctx.save();ctx.globalCompositeOperation='lighter';
  ctx.fillStyle=radial(x,y,1,r,[[0,rgba(col[0],col[1],col[2],a)],[1,rgba(col[0],col[1],col[2],0)]]);
  ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill();ctx.restore();}

/* ---- parallax rain ---- */
let rain=[];
function initRain(intensity){rain=[];intensity=intensity||1;
  const layers=[{n:Math.round(60*intensity),sp:2.5,ln:22,w:1.4,a:.16},
                {n:Math.round(80*intensity),sp:1.5,ln:14,w:1.0,a:.10},
                {n:Math.round(110*intensity),sp:.85,ln:9,w:.7,a:.055}];
  layers.forEach(L=>{for(let i=0;i<L.n;i++)rain.push({x:Math.random(),y:Math.random(),L});});}
function drawRain(wind,warmX,warmY){if(reduce){return;}
  wind=wind||1.5;
  for(const p of rain){p.y+=p.L.sp/H;if(p.y>1.05){p.y=-.05;p.x=Math.random();}
    const x=p.x*W,y=p.y*H;
    ctx.strokeStyle=rgba(200,212,232,p.L.a);ctx.lineWidth=p.L.w;
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-wind,y+p.L.ln);ctx.stroke();}
  // a few streaks catch warm light near a source
  if(warmX!=null){ctx.strokeStyle='rgba(250,210,150,.10)';ctx.lineWidth=1;
    for(let i=0;i<8;i++){const x=warmX+(Math.random()-.5)*W*0.3,y=warmY+((performance.now()*.2+i*80)%(H*0.4));
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-1,y+10);ctx.stroke();}}}

/* wet road with a reflected light pool */
function wetRoad(topY,lightX,lightCol){
  ctx.fillStyle=vgrad(topY,H,[[0,'#15171b'],[1,'#0a0b0e']]);ctx.fillRect(0,topY,W,H-topY);
  if(lightX!=null){const rg=ctx.createLinearGradient(lightX,topY,lightX,H);
    rg.addColorStop(0,rgba(lightCol[0],lightCol[1],lightCol[2],.16));rg.addColorStop(1,rgba(lightCol[0],lightCol[1],lightCol[2],0));
    ctx.save();ctx.globalCompositeOperation='lighter';ctx.fillStyle=rg;
    ctx.fillRect(lightX-W*0.12,topY,W*0.24,H-topY);ctx.restore();}}

/* sodium streetlamp */
function streetlamp(x,topY,poolY){
  glow(x,topY+H*0.02,W*0.5,[235,170,90],.22);
  ctx.strokeStyle='#2c2820';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(x,topY);ctx.lineTo(x,poolY);ctx.stroke();
  ctx.fillStyle='rgba(255,214,150,.95)';ctx.beginPath();ctx.arc(x,topY,7,0,7);ctx.fill();
  rim(x,topY,26,[255,220,150],.5);}

/* a street figure with sodium rim-light so it reads as a form, not a blob */
function streetFigure(x,groundY,scale,lampX,opt){opt=opt||{};
  figure(x,groundY,scale,{col:opt.col||[16,18,24],a:opt.a==null?.95:opt.a,lean:opt.lean||0});
  // warm rim on the lamp-facing side
  const side=lampX<x?-1:1;
  ctx.save();ctx.globalCompositeOperation='lighter';
  ctx.fillStyle=radial(x+side*scale*0.3,groundY-scale*1.2,2,scale*1.4,[[0,'rgba(240,180,100,.28)'],[1,'rgba(240,180,100,0)']]);
  ctx.beginPath();ctx.ellipse(x+side*scale*0.28,groundY-scale*1.1,scale*0.5,scale*1.2,0,0,7);ctx.fill();ctx.restore();
  // cool fill on the shadow side (sky bounce)
  ctx.save();ctx.globalCompositeOperation='lighter';
  ctx.fillStyle=radial(x-side*scale*0.3,groundY-scale*1.0,2,scale*1.0,[[0,'rgba(90,120,160,.10)'],[1,'rgba(90,120,160,0)']]);
  ctx.beginPath();ctx.ellipse(x-side*scale*0.28,groundY-scale*1.0,scale*0.4,scale*1.0,0,0,7);ctx.fill();ctx.restore();}


/* ===== THE APPEAL · Part One — 12 scene painters ===== */
/* Each scene: paint(t) where t = ms since scene entered. Composed to the ceiling standard. */

/* shared: the warm room seen through the window (used 1) and interior variants */
function roomWindow(t,opt){opt=opt||{};
  // blue dusk sky + wall
  ctx.fillStyle=vgrad(0,H,[[0,'#0e1830'],[.42,'#1a2740'],[.72,'#243247'],[1,'#2a2836']]);ctx.fillRect(0,0,W,H);
  ctx.fillStyle=radial(W*.5,H*.92,10,W*.9,[[0,'rgba(120,110,120,.10)'],[1,'rgba(120,110,120,0)']]);ctx.fillRect(0,0,W,H);
  const wallTop=H*.10;
  ctx.fillStyle=vgrad(wallTop,H,[[0,'#161320'],[1,'#0c0a12']]);ctx.fillRect(0,wallTop,W,H-wallTop);
  ctx.strokeStyle='rgba(255,255,255,.012)';ctx.lineWidth=1;
  for(let y=wallTop+8;y<H;y+=11){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const wx=W*.40,wy=H*.30,ww=W*.42,wh=H*.40;
  // spill
  ctx.save();ctx.globalCompositeOperation='lighter';
  ctx.fillStyle=radial(wx+ww*.5,wy+wh*.5,10,ww*1.9,[[0,'rgba(247,196,110,.28)'],[.35,'rgba(240,170,90,.15)'],[1,'rgba(240,170,90,0)']]);
  ctx.fillRect(0,0,W,H);ctx.restore();
  ctx.fillStyle='rgba(0,0,0,.5)';rr(wx-6,wy-6,ww+12,wh+12,3);ctx.fill();
  ctx.fillStyle=vgrad(wy,wy+wh,[[0,'#f7d089'],[.5,'#eeb765'],[1,'#d99a4a']]);rr(wx,wy,ww,wh,2);ctx.fill();
  ctx.save();rr(wx,wy,ww,wh,2);ctx.clip();
  ctx.fillStyle=radial(wx+ww*.30,wy+wh*.42,4,ww*.7,[[0,'rgba(255,240,200,.9)'],[1,'rgba(255,240,200,0)']]);ctx.fillRect(wx,wy,ww,wh);
  const flick=.5+.35*Math.sin(t*.006)+.12*Math.sin(t*.021)+.06*Math.sin(t*.05);
  ctx.fillStyle=radial(wx+ww*.60,wy+wh*.72,4,ww*.6,[[0,rgba(150,185,225,.16+flick*.14)],[1,'rgba(150,185,225,0)']]);ctx.fillRect(wx,wy,ww,wh);
  // two figures on sofa, close
  ctx.fillStyle='rgba(30,18,14,.62)';
  ctx.beginPath();ctx.ellipse(wx+ww*.40,wy+wh*.74,ww*.085,wh*.20,0,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(wx+ww*.40,wy+wh*.55,ww*.055,0,7);ctx.fill();
  ctx.beginPath();ctx.ellipse(wx+ww*.60,wy+wh*.76,ww*.09,wh*.19,-.1,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(wx+ww*.60,wy+wh*.57,ww*.058,0,7);ctx.fill();
  ctx.fillStyle=rgba(150,185,225,.10+flick*.08);ctx.beginPath();ctx.ellipse(wx+ww*.62,wy+wh*.68,ww*.03,wh*.06,0,0,7);ctx.fill();
  ctx.restore();
  // muntins
  ctx.strokeStyle='rgba(15,11,16,.72)';ctx.lineWidth=3.5;rr(wx,wy,ww,wh,2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(wx+ww*.5,wy);ctx.lineTo(wx+ww*.5,wy+wh);ctx.moveTo(wx,wy+wh*.46);ctx.lineTo(wx+ww,wy+wh*.46);ctx.stroke();
  ctx.strokeStyle='rgba(255,220,150,.18)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(wx+ww*.5+2,wy);ctx.lineTo(wx+ww*.5+2,wy+wh);ctx.stroke();
  ctx.fillStyle=vgrad(wy+wh,wy+wh+24,[[0,'rgba(240,180,100,.26)'],[1,'rgba(240,180,100,0)']]);ctx.fillRect(wx-4,wy+wh,ww+8,26);
  return {wx,wy,ww,wh,flick};
}

/* interior of the room, close on the two of them + TV — warm, lamplit */
function roomInterior(t,mode){
  // warm dim interior
  ctx.fillStyle=vgrad(0,H,[[0,'#2a1d12'],[1,'#140c08']]);ctx.fillRect(0,0,W,H);
  // lamp source upper-left
  ctx.save();ctx.globalCompositeOperation='lighter';
  ctx.fillStyle=radial(W*.2,H*.2,10,W*.7,[[0,'rgba(255,210,140,.3)'],[1,'rgba(255,210,140,0)']]);ctx.fillRect(0,0,W,H);
  ctx.restore();
  // the TV — cool light source, lower right, flickering
  const flick=.5+.35*Math.sin(t*.006)+.14*Math.sin(t*.021)+.06*Math.sin(t*.05);
  const tvx=W*.80,tvy=H*.5;
  ctx.fillStyle='#0c1016';rr(tvx-W*.14,tvy-H*.1,W*.2,H*.16,4);ctx.fill();
  ctx.save();rr(tvx-W*.14,tvy-H*.1,W*.2,H*.16,4);ctx.clip();
  ctx.fillStyle=rgba(140,180,225,.5+flick*.4);ctx.fillRect(tvx-W*.14,tvy-H*.1,W*.2,H*.16);
  // scanlines
  ctx.fillStyle='rgba(255,255,255,.05)';for(let y=(t*.3)%5;y<H;y+=5)ctx.fillRect(tvx-W*.14,tvy-H*.1+y%(H*.16),W*.2,1);
  ctx.restore();
  ctx.save();ctx.globalCompositeOperation='lighter';
  ctx.fillStyle=radial(tvx-W*.04,tvy,10,W*.55,[[0,rgba(140,180,225,.14+flick*.12)],[1,'rgba(140,180,225,0)']]);ctx.fillRect(0,0,W,H);ctx.restore();
  // sofa (dark mass, foreground)
  ctx.fillStyle='#1c1208';rr(W*.05,H*.62,W*.9,H*.5,20);ctx.fill();
  // two figures: Mo (leaning toward TV, right), JJ (left)
  // Mo — leaning IN toward the TV light, cool-lit on his right side
  figure(W*.58,H*.82,H*.16,{lean:-1.2,col:[20,14,10],a:.9});
  rim(W*.63,H*.62,40,[140,180,225],.35*(0.6+flick*0.5)); // cool TV rim on Mo
  // JJ — upright, warmer lamp side
  figure(W*.34,H*.84,H*.15,{lean:.1,col:[24,16,10],a:.9});
  rim(W*.29,H*.6,34,[255,210,140],.3); // warm lamp rim on JJ
  // paperback on sofa arm (tiny lurid detail)
  if(mode==='book'){ctx.fillStyle='#b23';ctx.save();ctx.translate(W*.16,H*.66);ctx.rotate(-.3);ctx.fillRect(0,0,W*.07,H*.03);ctx.restore();}
  return {tvx,tvy,flick};
}

/* the broadcast/reconstruction — cold 4:3, grain, a man on wet tarmac */
function broadcast(t,opt){opt=opt||{};const warp=opt.warp||0;
  ctx.fillStyle='#050608';ctx.fillRect(0,0,W,H);
  // 4:3 frame inset (swells with warp)
  const inset=lerp(W*.08,0,warp);const fx=inset,fy=H*.08*(1-warp),fw=W-inset*2,fh=H-fy*2;
  ctx.save();ctx.beginPath();ctx.rect(fx,fy,fw,fh);ctx.clip();
  // cold night
  ctx.fillStyle=vgrad(fy,fy+fh,[[0,'#20242a'],[1,'#0d0f12']]);ctx.fillRect(fx,fy,fw,fh);
  wetRoad(fy+fh*.6,null,null);
  const lx=fx+fw*.66;
  streetlamp(lx,fy+fh*.2,fy+fh*.62);
  wetRoad(fy+fh*.6,lx,[235,170,90]);
  // the man (father) — small silhouette walking, known by coat
  const mx=fx+fw*.42+Math.sin(t*.0005)*2,my=fy+fh*.6;
  figure(mx,my,fh*.09,{col:[8,10,13],a:1,lean:-.15});
  // scanlines + VHS chroma bleed
  ctx.fillStyle=rgba(255,255,255,.03*(1-warp));for(let y=(t*.4)%6;y<fh;y+=6)ctx.fillRect(fx,fy+y,fw,1);
  ctx.save();ctx.globalCompositeOperation='lighter';ctx.globalAlpha=.04*(1-warp);
  ctx.fillStyle='#f33';ctx.fillRect(fx+1.5,fy,fw,fh);ctx.fillStyle='#33aaff';ctx.fillRect(fx-1.5,fy,fw,fh);ctx.restore();
  ctx.restore();
  return {fx,fy,fw,fh,lx};
}

/* the street — real 1996, after the crossing. wet, sodium-lit, a car at the kerb */
function street(t,opt){opt=opt||{};
  ctx.fillStyle=vgrad(0,H,[[0,'#131c2e'],[.5,'#1a2331'],[1,'#0e1218']]);ctx.fillRect(0,0,W,H);
  // far buildings
  ctx.fillStyle='#0a0d14';ctx.fillRect(0,H*.3,W,H*.35);
  for(let i=0;i<6;i++){const bx=i*W*.18;ctx.fillStyle=i%2?'#0c1018':'#090c12';ctx.fillRect(bx,H*.3-((i*37)%40),W*.14,H*.4);
    // a few lit windows
    if(i%2){ctx.fillStyle='rgba(230,190,110,.25)';ctx.fillRect(bx+W*.03,H*.34,6,8);}}
  const lx=opt.lx!=null?opt.lx:W*.72;
  streetlamp(lx,H*.16,H*.6);
  wetRoad(H*.62,lx,[235,170,90]);
  // car at the kerb (period silhouette)
  if(opt.car!==false){ctx.fillStyle='#0b0e13';const cx=W*.16,cy=H*.66;
    rr(cx,cy,W*.28,H*.06,8);ctx.fill();rr(cx+W*.04,cy-H*.035,W*.18,H*.045,10);ctx.fill();
    ctx.fillStyle='rgba(235,170,90,.15)';ctx.beginPath();ctx.arc(cx+W*.27,cy+H*.03,4,0,7);ctx.fill();}
  return {lx};
}

/* rain re-init helper for the hinge (raises count as warp grows) */
let _rainWarp=-1;
function initRainIf(warp){const step=Math.round(warp*4);if(step!==_rainWarp){_rainWarp=step;initRain(1+warp*1.6);}}

/* ===== THE APPEAL · Part One — runner ===== */
let idx=-1,auto=false,paused=false,fin=false,running=false;
let sceneT0=0,transT0=0,prevTs=0,dwell=9;
let muted=false;

/* ---- audio: ambient bed + rain + tv hum + crossing drone ---- */
let AC=null,master=null,bedNodes=[],drone=null;
function aInit(){if(AC)return;try{AC=new(window.AudioContext||window.webkitAudioContext)();
  master=AC.createGain();master.gain.value=muted?0:0.8;master.connect(AC.destination);}catch(e){AC=null;}}
function nbuf(d){const sr=AC.sampleRate,b=AC.createBuffer(1,sr*d,sr),x=b.getChannelData(0);
  for(let i=0;i<x.length;i++)x[i]=Math.random()*2-1;return b;}
function startBed(){if(!AC)return;
  // low room tone
  const o=AC.createOscillator();o.type='sine';o.frequency.value=54;const g=AC.createGain();g.gain.value=.0001;
  g.gain.linearRampToValueAtTime(.05,AC.currentTime+3);o.connect(g);g.connect(master);o.start();bedNodes.push(o,g);}
function rainSound(on){if(!AC)return;
  if(on&&!rainSound._n){const s=AC.createBufferSource();s.buffer=nbuf(3);s.loop=true;
    const bp=AC.createBiquadFilter();bp.type='bandpass';bp.frequency.value=2200;bp.Q.value=.5;
    const hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=800;
    const g=AC.createGain();g.gain.value=.0001;g.gain.linearRampToValueAtTime(.06,AC.currentTime+1.5);
    s.connect(hp);hp.connect(bp);bp.connect(g);g.connect(master);s.start();rainSound._n={s,g};}
  else if(!on&&rainSound._n){const n=rainSound._n;n.g.gain.linearRampToValueAtTime(.0001,AC.currentTime+1);
    setTimeout(()=>{try{n.s.stop();}catch(e){}},1200);rainSound._n=null;}}
function tvHum(on){if(!AC)return;
  if(on&&!tvHum._n){const o=AC.createOscillator();o.type='sawtooth';o.frequency.value=120;
    const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=400;
    const g=AC.createGain();g.gain.value=.0001;g.gain.linearRampToValueAtTime(.018,AC.currentTime+.5);
    o.connect(lp);lp.connect(g);g.connect(master);o.start();tvHum._n={o,g};}
  else if(!on&&tvHum._n){const n=tvHum._n;n.g.gain.linearRampToValueAtTime(.0001,AC.currentTime+.6);
    setTimeout(()=>{try{n.o.stop();}catch(e){}},700);tvHum._n=null;}}
function crossingDrone(){if(!AC||muted)return;const t=AC.currentTime;
  const o=AC.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(70,t);
  o.frequency.exponentialRampToValueAtTime(30,t+4);
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=180;
  const g=AC.createGain();g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(.12,t+2.5);
  g.gain.linearRampToValueAtTime(.0001,t+6);o.connect(lp);lp.connect(g);g.connect(master);o.start(t);o.stop(t+6.2);}
function stopAll(){if(!AC)return;bedNodes.forEach(n=>{if(n.gain)try{n.gain.linearRampToValueAtTime(.0001,AC.currentTime+.5);}catch(e){}});
  rainSound(false);tvHum(false);}

/* ---- text band ---- */
function renderProse(sc){const el=$('prose');el.className=sc.first?'first':'';
  el.innerHTML=sc.prose.map(p=>`<${p[0]}>${p[1]}</${p[0]}>`).join('');}
function wordCount(sc){return sc.prose.reduce((n,p)=>n+p[1].replace(/<[^>]+>/g,'').split(/\s+/).length,0);}
function calcDwell(sc){return Math.max(7,Math.min(16,3+wordCount(sc)*0.32));}

/* ---- scene control ---- */
function enter(i){idx=i;const sc=SCENES[i];sceneT0=performance.now();transT0=performance.now();
  renderProse(sc);dwell=calcDwell(sc);_rainWarp=-1;
  if(sc.rain)initRain(sc.rain);
  // audio moods
  rainSound(!!sc.rain);
  tvHum([1,2,3,4,5,6,7].includes(i+1)); // TV on during the flat scenes
  if(sc.hinge)crossingDrone();
  const bf=$('barfill');if(bf)bf.style.width='0%';
  paused=false;document.body.classList.remove('paused');
  const hint=$('hint');hint.classList.remove('hide');
  hint.textContent=auto?(sc.last?'':'tap to pause'):(sc.last?'tap to finish':'tap to continue');}
function advance(){if(fin)return;if(idx>=SCENES.length-1){finish();return;}enter(idx+1);}
function finish(){fin=true;$('hint').classList.add('hide');stopAll();
  const f=$('fade');f.style.transition='opacity 1.4s';f.style.opacity='1';
  setTimeout(()=>{$('endScr').classList.remove('gone');},1500);}
function start(a){auto=!!a;$('titleScr').classList.add('gone');$('endScr').classList.add('gone');
  aInit();if(AC&&AC.state==='suspended')AC.resume();startBed();
  fin=false;$('fade').style.opacity='0';enter(0);
  if(!running){running=true;requestAnimationFrame(loop);}}
function togglePause(){if(idx<0||fin||!auto)return;paused=!paused;
  document.body.classList.toggle('paused',paused);
  $('hint').textContent=paused?'tap to resume':'tap to pause';}

/* ---- main loop ---- */
function loop(now){if(!running)return;const dt=now-(prevTs||now);prevTs=now;
  if(paused&&idx>=0)sceneT0+=dt;
  const t=now-sceneT0;const sc=idx>=0?SCENES[idx]:null;
  // paint
  try{ctx.clearRect(0,0,W,H);if(sc)sc.paint(t);}catch(e){}
  drawGrain();
  // scene crossfade (fade layer quick dip on enter)
  const tr=Math.max(0,1-(now-transT0)/650);
  if(tr>0&&!fin){$('fade').style.opacity=(tr*tr*0.9).toFixed(3);}else if(!fin){$('fade').style.opacity='0';}
  // auto advance
  if(auto&&!paused&&!fin&&idx>=0){const bf=$('barfill');if(bf)bf.style.width=(Math.min(1,t/(dwell*1000))*100)+'%';
    if(t>=dwell*1000)advance();}
  requestAnimationFrame(loop);}

/* ---- input ---- */
$('app').addEventListener('click',e=>{const id=e.target.id;
  if(['btnRead','btnAuto','btnReplay','btnNext','mute'].includes(id))return;
  if(!$('titleScr').classList.contains('gone'))return;
  if(!$('endScr').classList.contains('gone'))return;
  if(auto)togglePause();else advance();});
$('btnRead').addEventListener('click',e=>{e.stopPropagation();start(false);});
$('btnAuto').addEventListener('click',e=>{e.stopPropagation();start(true);});
$('btnReplay').addEventListener('click',e=>{e.stopPropagation();start(auto);});
$('mute').addEventListener('click',e=>{e.stopPropagation();muted=!muted;
  $('mute').innerHTML=muted?'&#128263;':'&#9835;';if(master)master.gain.value=muted?0:0.8;
  if(!muted&&AC&&AC.state==='suspended')AC.resume();});
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();
  if(!$('titleScr').classList.contains('gone'))start(false);
  else if($('endScr').classList.contains('gone')){if(auto)togglePause();else advance();}}});

size();running=true;requestAnimationFrame(loop);

</script></body></html>
