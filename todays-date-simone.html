/* ===== TODAY'S DATE (SIMONE) — engine core (pass 2) ===== */
const MAT={
  simone:{skin:{lit:[236,200,178],shadow:[140,96,84]},hair:{lit:[196,86,42],shadow:[104,40,22]},cloth:{lit:[42,58,72],shadow:[16,24,32]}},

};
function rgb(c){return 'rgb('+(c[0]|0)+','+(c[1]|0)+','+(c[2]|0)+')';}

function mix(a,b,t){return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];}
/* cool light model: slate default; warm only for Gloria/date; dread cold at the end */
let curLight='cool';
function lightAt(){
  if(curLight==='warm') return {x:W*0.4,y:H*0.16,c:[236,196,140],i:0.6};
  if(curLight==='screen') return {x:W*0.5,y:H*0.5,c:[150,190,220],i:0.56};
  if(curLight==='dread') return {x:W*0.5,y:H*0.15,c:[120,150,190],i:0.4};
  if(curLight==='flash') return {x:W*0.4,y:H*0.12,c:[210,215,225],i:0.6};
  return {x:W*0.42,y:H*0.14,c:[176,200,224],i:0.52}; // cool slate
}

function hairMass(hx,hy,r,dir,L,col){const lc=mix(col.lit,L.c,0.2);ctx.save();ctx.beginPath();ctx.arc(hx-dir*r*0.05,hy-r*0.12,r*1.18,0,7);ctx.fillStyle=rgb(col.shadow);ctx.fill();ctx.clip();const g=ctx.createLinearGradient(hx,hy-r,hx,hy+r);g.addColorStop(0,rgba(lc,0.55*L.i));g.addColorStop(1,rgba(lc,0));ctx.fillStyle=g;ctx.fillRect(hx-r*2,hy-r*2,r*4,r*4);ctx.restore();}
function paintFace(hx,hy,r,dir,skin,L,opts){opts=opts||{};const lc=mix(skin.lit,L.c,0.26);const fcx=hx+dir*r*0.16,fcy=hy+r*0.04;const dx=L.x-hx,dy=L.y-hy,d=Math.hypot(dx,dy)||1,ux=dx/d,uy=dy/d;const cs=Math.sign(ux)||dir;ctx.save();ctx.beginPath();ctx.ellipse(fcx,fcy,r*0.82,r*0.98,0,0,7);ctx.clip();ctx.fillStyle=rgb(skin.shadow);ctx.fillRect(hx-r*2,hy-r*2,r*4,r*4);const g=ctx.createLinearGradient(fcx+ux*r*1.2,fcy+uy*r*1.2,fcx-ux*r,fcy-uy*r);g.addColorStop(0,rgba(lc,0.95*L.i));g.addColorStop(0.6,rgba(lc,0.14*L.i));g.addColorStop(1,rgba(lc,0));ctx.fillStyle=g;ctx.fillRect(hx-r*2,hy-r*2,r*4,r*4);const hi=mix(lc,[255,255,255],0.22);ctx.fillStyle=rgba(hi,0.4*L.i);ctx.beginPath();ctx.ellipse(fcx+cs*r*0.24,fcy+r*0.2,r*0.26,r*0.18,0,0,7);ctx.fill();ctx.beginPath();ctx.ellipse(fcx+cs*r*0.04,fcy-r*0.4,r*0.3,r*0.16,0,0,7);ctx.fill();
const eyeY=fcy-r*0.02;const E=opts.expr||'neutral';const wide=(E==='fear'||E==='shock');

let AC=null,master=null,muted=false,beds={};
function audioInit(){if(AC)return;try{AC=new (window.AudioContext||window.webkitAudioContext)();master=AC.createGain();master.gain.value=0.85;master.connect(AC.destination);}catch(e){AC=null;}}

function popS(){if(!AC||muted)return;const t=now();const o=AC.createOscillator();o.type='sine';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(720,t+0.06);const g=AC.createGain();g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.13);o.connect(g);g.connect(master);o.start(t);o.stop(t+0.15);}
function replyS(){if(!AC||muted)return;const t=now();tone(560,t,0.1,0.09,'sine');tone(760,t+0.05,0.12,0.06,'sine');}
function sendS(){if(!AC||muted)return;const t=now();tone(700,t,0.09,0.09,'triangle');tone(1040,t+0.04,0.1,0.06,'triangle');}
function connectS(){if(!AC||muted)return;const t=now();[494,659,784].forEach((f,i)=>tone(f,t+i*0.1,0.4,0.07,'sine'));}
function phonebuzzS(){if(!AC||muted)return;const t=now();for(let k=0;k<2;k++){const tt=t+k*0.3;tone(180,tt,0.18,0.08,'square');}}
function stingS(){if(!AC||muted)return;const t=now();const o=AC.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(48,t+0.7);const g=AC.createGain();g.gain.setValueAtTime(0.16,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.9);const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=600;o.connect(lp);lp.connect(g);g.connect(master);o.start(t);o.stop(t+0.92);}

function startBeds(list){Object.keys(beds).forEach(k=>{if(list.indexOf(k)<0)stopBed(k);});list.forEach(k=>{if(!beds[k])beds[k]=makeBed(k);});}
function stopBed(k){if(beds[k]){beds[k].stop();delete beds[k];}}
function stopAllBeds(){Object.keys(beds).forEach(stopBed);}
function makeBed(kind){let timer=null,alive=true,nodes=[];
  function pad(freqs,amp,type,lp){const g=AC.createGain();g.gain.value=0.0001;g.gain.linearRampToValueAtTime(muted?0.0001:amp,now()+1.4);const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=lp||700;freqs.forEach(fr=>{const o=AC.createOscillator();o.type=type||'sine';o.frequency.value=fr;o.connect(f);o.start();nodes.push(o);});f.connect(g);g.connect(master);nodes.push(g);}
  function pluck(interval,notes){let n=0;const step=()=>{if(!alive)return;if(AC&&!muted){tone(notes[n%notes.length],now(),0.4,0.045,'triangle');n++;}timer=setTimeout(step,interval);};timer=setTimeout(step,interval);}
  if(kind==='sparse'){pad([196,262],0.04,'sine',500);pluck(1500,[330,392,294,349]);}
  else if(kind==='home'){pad([220,330],0.04,'sine',600);pluck(1700,[349,440,392]);}
  else if(kind==='flash'){pad([262,392],0.035,'sine',800);}

  if(b.k==='punch'){b.lines.forEach((ln,j)=>{const el=document.createElement('div');el.className='blk';el.style.animationDelay=dly.toFixed(2)+'s';dly+=0.34;const p=document.createElement('p');p.className='punch'+(b.big?' big':'');p.textContent=ln;el.appendChild(p);cap.appendChild(el);});}
  else{const el=document.createElement('div');el.className='blk';el.style.animationDelay=dly.toFixed(2)+'s';dly+=0.5;
    if(b.k==='prose'){const p=document.createElement('p');p.className='prose';p.textContent=b.s;el.appendChild(p);}
    else if(b.k==='chat'){const p=document.createElement('p');p.className='line';p.innerHTML='<span class="who">'+esc(b.from)+'</span>'+esc(b.t);el.appendChild(p);}
    else{const p=document.createElement('p');p.className='line'+(b.cls?' '+b.cls:'');p.innerHTML='<span class="who">'+esc(b.who)+'</span>'+esc(b.s);el.appendChild(p);}
    cap.appendChild(el);}
});}
function enter(i){idx=i;const s=SCENES[i];transStart=performance.now();
  slug.classList.remove('dim');
  const st=s.stage;let slugTxt='INT. SIMONE\u2019S FLAT';
  if(st==='doorstep-dog'||st==='doorstep-jon'||st==='doorstep-walk')slugTxt='EXT. THE DOORSTEP';
  else if(st==='the-walk')slugTxt='EXT. THE ROAD';
  else if(st==='junction')slugTxt='EXT. THE JUNCTION';
  else if(st==='flashback'||st==='chat-old'||st==='chat-bob')slugTxt='INT. FLAT \u00b7 WEEKS EARLIER';
  slug.innerHTML='<span class="no">'+slugTxt+'</span>';
  renderText(s);sceneT0=performance.now();
  if(s.sfx&&SFX[s.sfx])SFX[s.sfx]();
  startBeds((s.bed||[]).filter(b=>b!=='clap'));
  hint.classList.remove('hide');hint.classList.toggle('cold',!!s.last);
  hint.textContent=s.last?'tap to end':'tap for the verdict';}
function advance(){if(finishing)return;if(idx>=SCENES.length-1){finalSequence();return;}enter(idx+1);}
function finalSequence(){finishing=true;hint.classList.add('hide');cap.innerHTML='';slug.classList.add('dim');
  if(AC&&!muted)stingS();
  setTimeout(()=>{toEnd=true;stopAllBeds();},1400);
  setTimeout(()=>{$('endScr').classList.remove('hide');},2600);}
function start(){$('titleScr').classList.add('hide');$('endScr').classList.add('hide');audioInit();if(AC&&AC.state==='suspended')AC.resume();toEnd=false;finishing=false;enter(0);if(!running){running=true;requestAnimationFrame(frame);}}
function frame(ts){if(!running)return;const el=(ts-sceneT0)/1000;
  try{
    if(toEnd){ctx.fillStyle='#10151e';ctx.fillRect(0,0,W,H);}
    else if(idx<0){curLight='cool';flatBase(el);}
    else{const s=SCENES[idx];if(s&&BG[s.stage])BG[s.stage](s.p,el,lightAt());}
  }catch(e){}
  if(grainCv&&!toEnd){ctx.save();ctx.globalAlpha=0.045;ctx.globalCompositeOperation='overlay';const ox=reduceMotion?0:(Math.random()*140)|0,oy=reduceMotion?0:(Math.random()*140)|0;for(let yy=-oy;yy<H;yy+=140)for(let xx=-ox;xx<W;xx+=140)ctx.drawImage(grainCv,xx,yy);ctx.restore();}
  if(!toEnd){const tr=Math.max(0,1-(ts-transStart)/440);if(tr>0){ctx.save();ctx.globalAlpha=tr*tr;ctx.fillStyle='#141c28';ctx.fillRect(0,0,W,H);ctx.restore();}}
  requestAnimationFrame(frame);}
app.addEventListener('click',(e)=>{if(e.target.id==='mute'||e.target.id==='replayBtn')return;if(!$('titleScr').classList.contains('hide')){start();return;}if(!$('endScr').classList.contains('hide'))return;advance();});
document.addEventListener('keydown',(e)=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();if(!$('titleScr').classList.contains('hide'))start();else if($('endScr').classList.contains('hide'))advance();}});
$('replayBtn').addEventListener('click',(e)=>{e.preventDefault();e.stopPropagation();start();});
$('mute').addEventListener('click',(e)=>{e.stopPropagation();muted=!muted;$('mute').innerHTML=muted?'&#128263;':'&#128266;';if(master)master.gain.value=muted?0:0.85;if(!muted&&AC&&AC.state==='suspended')AC.resume();});
resize();transStart=performance.now();running=true;requestAnimationFrame(frame);
</script></body></html>
