<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>House Call</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Mulish:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#cfe0e2; --field:#8a9d57; --stone:#e6d6b4; --warm:#eab771; --amber:#d98a3e;
    --shadow:#241f19; --bone:#f3ecdd; --ink:#2a251d; --steel:#5a7d96; --blood:#b23a2e; --mut:#9a8f7d;
    --line:rgba(255,255,255,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:'Mulish',system-ui,sans-serif;color:var(--bone);background:#000;
    display:flex;align-items:center;justify-content:center;min-height:100%;overflow:hidden;
    user-select:none;-webkit-user-select:none;touch-action:manipulation;}
  #app{position:relative;width:100%;max-width:540px;height:100dvh;max-height:900px;overflow:hidden;
    background:#0c0e0c;cursor:pointer;}
  #stage{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1;}
  #app::after{content:"";position:absolute;inset:0;z-index:4;pointer-events:none;
    background:radial-gradient(135% 110% at 50% 40%,transparent 54%,rgba(0,0,0,.62));}
  #flash{position:absolute;inset:0;z-index:7;background:#fff;opacity:0;pointer-events:none;}

  #slug{position:absolute;top:0;left:0;right:0;z-index:6;display:flex;align-items:center;gap:9px;
    padding:14px 16px;font-family:'DM Mono',monospace;font-size:10.5px;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--bone);text-shadow:0 1px 10px rgba(0,0,0,.95);
    pointer-events:none;transition:opacity .5s;opacity:.92;}
  #slug .no{color:rgba(255,255,255,.55);}
  #slug.dim{opacity:0;}

  #cap{position:absolute;left:0;right:0;bottom:0;z-index:6;
    padding:0 26px calc(54px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;justify-content:flex-end;gap:11px;min-height:42%;
    background:linear-gradient(180deg,transparent,rgba(8,8,6,.45) 32%,rgba(8,8,6,.9));pointer-events:none;}
  .blk{opacity:0;transform:translateY(8px);animation:rise .6s cubic-bezier(.2,.8,.3,1) forwards;}
  @keyframes rise{to{opacity:1;transform:none;}}
  .narr{font-family:'Fraunces',serif;font-style:italic;font-size:18px;line-height:1.5;color:#e6dccb;
    text-shadow:0 2px 16px rgba(0,0,0,.95);max-width:30em;}
  .line{font-size:18px;line-height:1.42;color:var(--bone);text-shadow:0 2px 16px rgba(0,0,0,.95);max-width:30em;font-weight:400;}
  .line .who{font-family:'DM Mono',monospace;font-weight:500;font-size:11px;letter-spacing:1.5px;
    text-transform:uppercase;display:block;margin-bottom:2px;opacity:.9;}
  .line.man .who{color:var(--warm);}
  .line.mara .who{color:#e7a9b0;}
  .line.arthur .who{color:#bcd0c4;}
  .line.voice{font-family:'DM Mono',monospace;font-size:15px;color:#cdd8de;}
  .line.voice .who{color:var(--steel);}

  #hint{position:absolute;left:0;right:0;bottom:calc(20px + env(safe-area-inset-bottom));z-index:6;
    text-align:center;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;
    text-transform:uppercase;color:var(--mut);pointer-events:none;animation:hb 2.1s ease-in-out infinite;}
  @keyframes hb{0%,100%{opacity:.32;}50%{opacity:.8;}}
  #hint.hide{display:none;}
  #hint.answer{color:var(--warm);}

  /* phone overlay */
  #phone{position:absolute;left:50%;top:34%;transform:translate(-50%,-50%) scale(.9);z-index:6;
    width:148px;opacity:0;transition:opacity .5s, transform .5s;pointer-events:none;}
  #phone.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
  #phone.ring{animation:buzz .5s ease-in-out infinite;}
  @keyframes buzz{0%,100%{transform:translate(-50%,-50%) rotate(-1.2deg);}50%{transform:translate(-51%,-50%) rotate(1.2deg);}}
  .phbody{background:#0c0f12;border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:18px 14px 16px;
    box-shadow:0 18px 50px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.04);}
  .phscreen{text-align:center;}
  .phstatus{font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--mut);margin-bottom:8px;}
  .phcaller{font-family:'Fraunces',serif;font-size:21px;color:#eef3f6;line-height:1.1;margin-bottom:14px;}
  .phdot{width:46px;height:46px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;
    background:var(--steel);font-size:20px;}
  #phone.incoming .phdot{background:#2e8b57;animation:pglow 1s ease-in-out infinite;}
  @keyframes pglow{0%,100%{box-shadow:0 0 0 0 rgba(46,139,87,.5);}50%{box-shadow:0 0 0 12px rgba(46,139,87,0);}}

  .screen{position:absolute;inset:0;z-index:8;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:34px 28px;}
  .screen.hide{display:none;}
  .kicker{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:5px;text-transform:uppercase;
    color:var(--amber);margin-bottom:20px;opacity:0;animation:rise .8s .3s forwards;}
  .ttl{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(52px,17vw,94px);line-height:.92;
    letter-spacing:-1px;color:var(--bone);text-shadow:0 6px 40px rgba(0,0,0,.5);}
  .ttl span{display:block;opacity:0;animation:rise .8s forwards;}
  .ttl .a{animation-delay:.15s;} .ttl .b{animation-delay:.4s;color:var(--warm);}
  .by{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--mut);margin-top:26px;opacity:0;animation:rise .9s 1s forwards;}
  .by b{color:#cbbfa9;font-weight:500;}
  .epi{font-family:'Fraunces',serif;font-style:italic;font-size:17px;color:#ddd2bf;max-width:23em;
    margin-top:6px;line-height:1.5;opacity:0;animation:rise .9s .6s forwards;}
  .start{margin-top:34px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:4px;text-transform:uppercase;
    color:var(--amber);opacity:0;animation:rise .9s 1.4s forwards;}
  .start .pulse{animation:hb 2.1s ease-in-out infinite;display:inline-block;}
  .replay{margin-top:30px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;
    color:var(--mut);border:1px solid var(--line);border-radius:30px;padding:11px 22px;background:rgba(255,255,255,.03);
    pointer-events:auto;cursor:pointer;opacity:0;animation:rise .9s 1.6s forwards;}
  .replay:active{transform:scale(.97);}

  #mute{position:absolute;top:12px;right:14px;z-index:9;cursor:pointer;width:34px;height:34px;
    display:flex;align-items:center;justify-content:center;font-size:14px;border-radius:50%;
    background:rgba(14,16,14,.7);border:1px solid var(--line);backdrop-filter:blur(5px);pointer-events:auto;}

  @media (prefers-reduced-motion: reduce){
    .blk,.kicker,.by,.epi,.start,.replay,.ttl span{animation-duration:.01s;}
    #hint,.start .pulse,#phone.ring,#phone.incoming .phdot{animation:none;}
  }

  #prog{position:absolute;top:0;left:0;right:0;height:3px;z-index:9;background:rgba(0,0,0,.14);pointer-events:none;}
  #progfill{height:100%;width:0;background:linear-gradient(90deg,var(--warm),var(--amber));box-shadow:0 0 8px rgba(217,138,62,.55);transition:width .18s linear;}
  body.paused #progfill{box-shadow:none;opacity:.5;}

  .tipline{margin-top:14px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.4px;color:#b6ab98;}
  .tipline a{color:#e8a24c;text-decoration:none;border-bottom:1px solid rgba(232,162,76,.4);padding-bottom:1px;pointer-events:auto;}
  .tipline a:active{opacity:.7;}
</style>
</head>
<body>
<div id="app">
  <canvas id="stage"></canvas>
  <div id="prog"><div id="progfill"></div></div>
  <div id="flash"></div>
  <div id="mute">🔊</div>

  <div id="slug" class="dim"></div>
  <div id="phone"><div class="phbody"><div class="phscreen">
    <div class="phstatus" id="phstatus">Incoming call</div>
    <div class="phcaller" id="phcaller">No Caller ID</div>
    <div class="phdot" id="phdot">📞</div>
  </div></div></div>
  <div id="cap"></div>
  <div id="hint" class="hide">tap to continue</div>

  <div class="screen" id="titleScr">
    <div class="kicker">A short</div>
    <div class="ttl"><span class="a">House</span><span class="b">Call</span></div>
    <div class="by">Written by <b>Lanre Ajayi</b></div>
    <div class="start"><span class="pulse">▸ tap once · then it plays itself</span></div>
  </div>

  <div class="screen hide" id="endScr">
    <div class="ttl" style="font-size:clamp(42px,13vw,72px);"><span class="a" style="animation-delay:0s">House</span><span class="b" style="animation-delay:.2s">Call</span></div>
    <div class="epi">Some visits are arranged. Some hosts are waiting.</div>
    <div class="by" style="animation-delay:.9s">Written by <b>Lanre Ajayi</b></div>
    <div class="tipline">Made by Lanre Ajayi &middot; <a href="https://ko-fi.com/lanreajayi" target="_blank" rel="noopener">leave a tip</a></div>
    <div class="replay" id="replayBtn">↺ Watch again</div>
  </div>
</div>

<script>
"use strict";
const $=id=>document.getElementById(id);
const reduceMotion=matchMedia('(prefers-reduced-motion: reduce)').matches;
const app=$('app'), cv=$('stage'), ctx=cv.getContext('2d');
const cap=$('cap'), slug=$('slug'), hint=$('hint'), flashEl=$('flash'), phoneEl=$('phone');
let W=0,H=0,DPR=1;
function resize(){ const r=app.getBoundingClientRect(); W=r.width; H=r.height;
  DPR=Math.min(2,window.devicePixelRatio||1); cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); buildScenery(); buildGrain(); }
window.addEventListener('resize',resize);
let grainCv=null;
function buildGrain(){ grainCv=document.createElement('canvas'); grainCv.width=150; grainCv.height=150;
  const g=grainCv.getContext('2d'); const img=g.createImageData(150,150);
  for(let i=0;i<img.data.length;i+=4){ const v=128+(Math.random()*2-1)*52; img.data[i]=img.data[i+1]=img.data[i+2]=v; img.data[i+3]=255; }
  g.putImageData(img,0,0); }

/* ---------- story ---------- */
const N=s=>({k:'narr',s});
const D=(who,s,cls)=>({k:'line',who,s,cls});
const SCENES=[
 // 0
 {slug:['EXT. THE HOUSE','AFTERNOON'], set:'exterior', p:{man:'far'}, bed:['day'],
  text:[ N("A road through green country, going nowhere in particular. A house waits at the end of it — cream stone, flowers at the sills."),
         N("A man comes on foot, a bag on his shoulder. He stops. He reads the house the way some people read a room: the windows, the doors, the way in.") ]},
 // 1
 {slug:['EXT. THE HOUSE','AFTERNOON'], set:'exterior', p:{man:'mid',mara:'door'}, bed:['day'],
  text:[ N("A voice. A young woman — garden gloves, hair coming loose, a smile with nothing behind it but welcome. Plain, and somehow lovely for it."),
         D("Mara","“You look lost. Or thirsty. It’s usually both, out here.”","mara"),
         D("Man","“Just passing. Walking to the next town — then on to the airport, if my legs hold.”","man"),
         D("Mara","“On foot? You’ll fall down before you get there. Come in, sit a minute.”","mara") ]},
 // 2
 {slug:['INT. KITCHEN','AFTERNOON'], set:'interior', p:{man:'sit',mara:'pour',glass:1}, bed:['room'], sfx:'pour',
  text:[ N("Cool inside. The kettle ticking. She sets a glass in front of him as if he were expected."),
         D("Mara","“Mara.”","mara"),
         D("Man","“…Tom.”","man"),
         N("A beat too quick. She doesn’t seem to notice. They talk — easy, unhurried.") ]},
 // 3
 {slug:['INT. KITCHEN','AFTERNOON'], set:'interior', p:{man:'sit',mara:'sit',glass:1}, bed:['room','warm'],
  text:[ N("He laughs at something, and looks surprised that he did. The light through the window lies across the table like a blessing."),
         N("Then something crosses his face — there and gone, a cloud over the sun. He sets the glass down.") ]},
 // 4
 {slug:['INT. KITCHEN','AFTERNOON'], set:'interior', p:{man:'stand',mara:'sit'}, bed:['room','warm'],
  text:[ D("Man","“I should go. While there’s light.”","man"),
         N("He doesn’t want to. It’s written all over him."),
         D("Man","“When I come back through — could I call you?”","man"),
         D("Mara","“I’m not really a phone-number sort of person.”","mara"),
         D("Mara","“But it’s a small place. I expect I’ll see you out and about.”","mara") ]},
 // 5
 {slug:['INT. KITCHEN','AFTERNOON'], set:'interior', p:{man:'stand',mara:'stand',arthur:'enter'}, bed:['room'], sfx:'door',
  text:[ N("A door at the back. An older man fills it — her father — surprised to find a stranger at his table."),
         D("Arthur","“Hello. And who’s this, then?”","arthur"),
         D("Mara","“A traveller, Dad. Just leaving.”","mara"),
         N("A handshake. Warm enough. The man shoulders his bag and steps back out into the gold of the afternoon.") ]},
 // 6
 {slug:['EXT. THE LANE','LATE AFTERNOON'], set:'car', p:{man:'walk'}, bed:['day','drone'],
  text:[ N("His “journey” is twenty yards. A car, parked off the lane, out of sight of the house."),
         N("His phone has been ringing. It rang the whole time he sat in that kitchen. He’d let it.") ],
  phone:{status:'Missed',caller:'No Caller ID',kind:'missed'}},
 // 7
 {slug:['EXT. THE LANE','LATE AFTERNOON'], set:'car', p:{man:'phone'}, bed:['drone'], sfx:'dial',
  text:[ N("He calls it back. A voice he knows."),
         D("Voice","“You walked in. You walked out. It’s still breathing.”","voice"),
         D("Man","“…There’s a complication.”","man"),
         D("Voice","“There’s a schedule. Finish it. Today.”","voice") ],
  phone:{status:'Calling',caller:'No Caller ID',kind:'out'}},
 // 8
 {slug:['EXT. THE LANE','LATE AFTERNOON'], set:'car', p:{man:'bag',gun:1}, bed:['drone'], sfx:'sting',
  text:[ N("He opens the bag. Inside, folded in cloth — a pistol."),
         N("The house was never a chance. He came here to kill. He just hadn’t expected to be poured a drink first.") ]},
 // 9
 {slug:['EXT. THE HOUSE','EVENING'], set:'exterior', p:{man:'return',evening:1}, bed:['day','drone'],
  text:[ N("He walks back up the path he just walked down. The smile he fixes on is heavier than the gun under his arm."),
         D("Mara","“Forget something?”","mara"),
         D("Man","“My manners. I didn’t thank you properly.”","man") ]},
 // 10
 {slug:['INT. KITCHEN','EVENING'], set:'interior', p:{man:'stand',mara:'stand',arthur:'stand',evening:1}, bed:['room','drone'],
  text:[ N("But Arthur is in the room now, and Arthur is watching. The warmth has gone out of the light."),
         D("Arthur","“Thought you were halfway to town.”","arthur"),
         D("Man","“Changed my mind. It’s a hard place to leave.”","man"),
         N("Arthur doesn’t smile back.") ]},
 // 11
 {slug:['INT. KITCHEN','EVENING'], set:'interior', p:{man:'fluster',mara:'stand',arthur:'stand',evening:1}, bed:['room','drone'],
  text:[ N("His hand drifts to the bag, and stops. Drifts, and stops. The job is simple. His hands have stopped agreeing with it."),
         D("Man","“I just — I wanted —”","man"),
         N("He can’t finish the sentence. Or the thing he came to finish.") ]},
 // 12 — the turn
 {slug:['INT. KITCHEN','EVENING'], set:'interior', p:{man:'stand',mara:'strike',arthur:'down',evening:1}, bed:['drone'], sfx:'thud', shake:1, turn:1,
  text:[ N("Mara moves first. Quick, practised — a hand, a turn, a weight shifted — and Arthur folds to the floor like a coat off a hook."),
         N("She straightens her cardigan. She isn’t out of breath.") ]},
 // 13
 {slug:['INT. KITCHEN','EVENING'], set:'interior', p:{man:'stand',mara:'phone',arthur:'down'}, bed:['cold'],
  text:[ N("From her cardigan, a phone. She thumbs a single number, unhurried, and watches him over it.") ],
  phone:{status:'Calling',caller:'No Caller ID',kind:'out'}},
 // 14 — his phone rings (answerable)
 {slug:['INT. KITCHEN','EVENING'], set:'interior', p:{man:'stand',mara:'phone',arthur:'down'}, bed:['cold','ring'], answer:1,
  text:[ N("In his pocket, his phone begins to ring."),
         N("The number on his screen — the one that hired him, that put the gun in his bag — is the number she is holding to her ear.") ],
  phone:{status:'Incoming',caller:'No Caller ID',kind:'in'}},
 // 15 — the reveal
 {slug:['INT. KITCHEN','EVENING'], set:'interior', p:{man:'stand',mara:'phone',arthur:'down'}, bed:['cold'], sfx:'reveal',
  text:[ D("Mara","“You were never very good at this part.”","mara"),
         N("The client was never a voice in a car park. She poured him a drink. She watched his hands shake."),
         D("Mara","“I don’t hand the important jobs to strangers. I only needed one in the room, holding the gun.”","mara") ]},
 // 16 — the close
 {slug:['INT. KITCHEN','EVENING'], set:'interior', p:{man:'fluster',mara:'stand',arthur:'down'}, bed:['cold'],
  text:[ N("He never had the upper hand. He had a part to play, and he played it badly."),
         D("Mara","“Don’t look so wounded. I did say —”","mara"),
         D("Mara","“— I’d see you out and about.”","mara") ],
  last:1}
];

/* ---------- audio ---------- */
let AC=null,master=null,muted=false,beds={};
function audioInit(){ if(AC) return; try{ AC=new (window.AudioContext||window.webkitAudioContext)(); master=AC.createGain(); master.gain.value=0.9; master.connect(AC.destination);}catch(e){AC=null;} }
function now(){ return AC?AC.currentTime:0; }
function nbuf(d){ const sr=AC.sampleRate,b=AC.createBuffer(1,Math.floor(sr*d),sr),x=b.getChannelData(0); for(let i=0;i<x.length;i++)x[i]=Math.random()*2-1; return b; }
function tone(f,t,dur,amp,type){ const o=AC.createOscillator(); o.type=type||'sine'; o.frequency.value=f;
  const g=AC.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(amp,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.02); }
function pourSound(){ if(!AC||muted)return; const t=now(); const s=AC.createBufferSource(); s.buffer=nbuf(1.4);
  const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.setValueAtTime(900,t); bp.frequency.linearRampToValueAtTime(1500,t+1.2); bp.Q.value=1.2;
  const g=AC.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.07,t+0.2); g.gain.setValueAtTime(0.07,t+1.0); g.gain.exponentialRampToValueAtTime(0.0001,t+1.4);
  s.connect(bp); bp.connect(g); g.connect(master); s.start(t); s.stop(t+1.4); }
function doorSound(){ if(!AC||muted)return; const t=now(); const s=AC.createBufferSource(); s.buffer=nbuf(0.18); const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=420;
  const g=AC.createGain(); g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.2); s.connect(lp); lp.connect(g); g.connect(master); s.start(t); s.stop(t+0.2); }
function dialSound(){ if(!AC||muted)return; const t=now(); [0,0.12,0.24].forEach((o,i)=>tone(880+i*120,t+o,0.08,0.12,'square')); }
function thudSound(){ if(!AC||muted)return; const t=now(); tone(70,t,0.4,0.6,'sine'); const s=AC.createBufferSource(); s.buffer=nbuf(0.25); const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=300;
  const g=AC.createGain(); g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.25); s.connect(lp); lp.connect(g); g.connect(master); s.start(t); s.stop(t+0.25); }
function stingSound(){ if(!AC||muted)return; const t=now(); const o=AC.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(70,t+0.7);
  const g=AC.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.22,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.8);
  const bp=AC.createBiquadFilter(); bp.type='lowpass'; bp.frequency.value=600; o.connect(bp); bp.connect(g); g.connect(master); o.start(t); o.stop(t+0.82); }
function revealSound(){ if(!AC||muted)return; const t=now(); tone(330,t,1.2,0.12,'sine'); tone(330*0.94,t,1.2,0.10,'sine'); /* slight beat = unease */ stingSound(); }
function ringOnce(t){ if(!AC||muted)return; for(let k=0;k<2;k++){ const t0=t+k*0.28; tone(1100,t0,0.18,0.10,'sine'); tone(1380,t0,0.18,0.08,'sine'); } }
// soft musical voice with gentle attack/decay
function note(f,t,dur,amp){ if(!AC)return; const o=AC.createOscillator(); o.type='triangle'; o.frequency.value=f;
  const o2=AC.createOscillator(); o2.type='sine'; o2.frequency.value=f*2; const g=AC.createGain();
  g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(amp,t+0.06); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  const g2=AC.createGain(); g2.gain.value=0.3; const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1800;
  o.connect(g); o2.connect(g2); g2.connect(g); g.connect(lp); lp.connect(master); o.start(t); o2.start(t); o.stop(t+dur+0.05); o2.stop(t+dur+0.05); }
// theme: a small, wistful 4-note phrase. variant 'open' (curious), 'close' (resolved-dark)
function theme(variant){ if(!AC||muted)return; const t=now()+0.05;
  const seq = variant==='close' ? [[392,0,1.0,0.09],[349,0.5,1.0,0.08],[294,1.0,1.4,0.09],[233,1.7,1.8,0.085]]
                                : [[392,0,0.8,0.08],[440,0.4,0.8,0.075],[523,0.85,1.0,0.085],[466,1.5,1.4,0.07]];
  seq.forEach(n=>note(n[0],t+n[1],n[2],n[3])); }
function coldCue(){ if(!AC||muted)return; const t=now()+0.02; note(311,t,1.6,0.10); note(208,t+0.05,1.8,0.10); stingSound(); }

function startBeds(list){ Object.keys(beds).forEach(k=>{ if(list.indexOf(k)<0) stopBed(k); }); list.forEach(k=>{ if(!beds[k]) beds[k]=makeBed(k); }); }
function stopBed(k){ if(beds[k]){ beds[k].stop(); delete beds[k]; } }
function stopAllBeds(){ Object.keys(beds).forEach(stopBed); }
function makeBed(kind){
  let timer=null, alive=true, nodes=null;
  function day(){ // birds + soft wind
    if(AC){ const s=AC.createBufferSource(); s.buffer=nbuf(2); s.loop=true; const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=500; bp.Q.value=0.4;
      const g=AC.createGain(); g.gain.value=muted?0:0.02; s.connect(bp); bp.connect(g); g.connect(master); s.start(); nodes={s,g}; }
    const chirp=()=>{ if(!alive)return; if(AC&&!muted){ const t=now(); const n=2+(Math.random()*3|0);
      for(let i=0;i<n;i++){ const tt=t+i*0.08; const o=AC.createOscillator(); o.type='sine'; const f=2200+Math.random()*1500; o.frequency.setValueAtTime(f,tt); o.frequency.linearRampToValueAtTime(f*1.2,tt+0.04);
        const g=AC.createGain(); g.gain.setValueAtTime(0.0001,tt); g.gain.linearRampToValueAtTime(0.05,tt+0.01); g.gain.exponentialRampToValueAtTime(0.0001,tt+0.08); o.connect(g); g.connect(master); o.start(tt); o.stop(tt+0.1); } }
      timer=setTimeout(chirp,1400+Math.random()*2600); }; chirp();
  }
  function room(){ if(AC){ const s=AC.createBufferSource(); s.buffer=nbuf(2); s.loop=true; const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=600;
    const g=AC.createGain(); g.gain.value=muted?0:0.025; s.connect(lp); lp.connect(g); g.connect(master); s.start(); nodes={s,g}; }
    const tick=()=>{ if(!alive)return; if(AC&&!muted){ const t=now(); const s=AC.createBufferSource(); s.buffer=nbuf(0.02); const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2400; bp.Q.value=2;
      const g=AC.createGain(); g.gain.setValueAtTime(0.06,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.03); s.connect(bp); bp.connect(g); g.connect(master); s.start(t); s.stop(t+0.03); } timer=setTimeout(tick,1000); }; tick();
  }
  function warm(){ if(!AC)return; const o=AC.createOscillator(); o.type='triangle'; o.frequency.value=174; const o2=AC.createOscillator(); o2.type='sine'; o2.frequency.value=261;
    const g=AC.createGain(); g.gain.value=0.0001; g.gain.linearRampToValueAtTime(muted?0.0001:0.03,now()+1.5); const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=900;
    o.connect(lp); o2.connect(lp); lp.connect(g); g.connect(master); o.start(); o2.start(); nodes={o,o2,g}; }
  function drone(){ if(!AC)return; const o=AC.createOscillator(); o.type='sawtooth'; o.frequency.value=55; const o2=AC.createOscillator(); o2.type='sine'; o2.frequency.value=82;
    const g=AC.createGain(); g.gain.value=0.0001; g.gain.linearRampToValueAtTime(muted?0.0001:0.07,now()+1.6); const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=240;
    o.connect(lp); o2.connect(lp); lp.connect(g); g.connect(master); o.start(); o2.start(); nodes={o,o2,g}; }
  function cold(){ if(!AC)return; const o=AC.createOscillator(); o.type='sawtooth'; o.frequency.value=49; const o2=AC.createOscillator(); o2.type='sine'; o2.frequency.value=98;
    const g=AC.createGain(); g.gain.value=0.0001; g.gain.linearRampToValueAtTime(muted?0.0001:0.085,now()+1.2); const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=200;
    o.connect(lp); o2.connect(lp); lp.connect(g); g.connect(master); o.start(); o2.start(); nodes={o,o2,g}; }
  function ring(){ const step=()=>{ if(!alive)return; ringOnce(now()); timer=setTimeout(step,2000); }; step(); }
  ({day,room,warm,drone,cold,ring})[kind]?.();
  return { stop(){ alive=false; if(timer)clearTimeout(timer);
    if(nodes){ try{ if(nodes.g) nodes.g.gain.linearRampToValueAtTime(0.0001,now()+0.3); setTimeout(()=>{ try{ nodes.o&&nodes.o.stop(); nodes.o2&&nodes.o2.stop(); nodes.s&&nodes.s.stop(); }catch(e){} },320);}catch(e){} } } };
}

/* ---------- shading helpers (shared lighting model) ---------- */
const MAT={
  manSkin:{lit:[210,170,142],shadow:[64,46,38]}, manHair:{lit:[74,60,52],shadow:[16,13,11]}, manCoat:{lit:[122,124,132],shadow:[26,28,33]},
  maraSkin:{lit:[226,188,156],shadow:[76,54,46]}, maraHair:{lit:[152,108,66],shadow:[42,28,18]}, maraCloth:{lit:[176,156,116],shadow:[46,40,30]},
  arthurSkin:{lit:[204,166,142],shadow:[62,46,40]}, arthurHair:{lit:[196,196,190],shadow:[78,78,74]}, arthurCloth:{lit:[150,122,92],shadow:[40,32,24]}
};
function rgb(c){ return 'rgb('+(c[0]|0)+','+(c[1]|0)+','+(c[2]|0)+')'; }
function rgba(c,a){ return 'rgba('+(c[0]|0)+','+(c[1]|0)+','+(c[2]|0)+','+a+')'; }
function mix(a,b,t){ return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t]; }
let curSet='exterior', turned=false, evening=false;
function lightAt(){
  if(turned) return {x:W*0.30,y:H*0.18,c:[176,196,210],i:0.5};
  if(curSet==='car') return {x:W*0.74,y:H*0.24,c:[228,206,176],i:0.62};
  if(curSet==='interior') return evening? {x:W*0.20,y:H*0.30,c:[206,196,182],i:0.55} : {x:W*0.16,y:H*0.28,c:[255,206,150],i:0.84};
  return evening? {x:W*0.74,y:H*0.30,c:[224,176,140],i:0.6} : {x:W*0.20,y:H*0.16,c:[255,214,158],i:0.88};
}
function shade(build,cx,cy,litCol,shadow,L,span){ ctx.save(); build(); ctx.clip();
  ctx.fillStyle=rgb(shadow); ctx.fillRect(cx-W,cy-H,2*W,2*H);
  const dx=L.x-cx,dy=L.y-cy,d=Math.hypot(dx,dy)||1,ux=dx/d,uy=dy/d; const lc=mix(litCol,L.c,0.28);
  const g=ctx.createLinearGradient(cx+ux*span,cy+uy*span,cx-ux*span*0.75,cy-uy*span*0.75);
  g.addColorStop(0,rgba(lc,0.96*L.i)); g.addColorStop(0.55,rgba(lc,0.16*L.i)); g.addColorStop(1,rgba(lc,0));
  ctx.fillStyle=g; ctx.fillRect(cx-W,cy-H,2*W,2*H); ctx.restore(); }
function hairMass(hx,hy,r,dir,L,col){ const lc=mix(col.lit,L.c,0.25);
  ctx.save(); ctx.beginPath(); ctx.arc(hx-dir*r*0.06,hy-r*0.08,r*1.26,0,7); ctx.fillStyle=rgb(col.shadow); ctx.fill(); ctx.clip();
  const dx=L.x-hx,dy=L.y-hy,d=Math.hypot(dx,dy)||1,ux=dx/d,uy=dy/d;
  const g=ctx.createLinearGradient(hx+ux*r,hy+uy*r,hx-ux*r,hy-uy*r); g.addColorStop(0,rgba(lc,0.55*L.i)); g.addColorStop(1,rgba(lc,0));
  ctx.fillStyle=g; ctx.fillRect(hx-r*2,hy-r*2,r*4,r*4); ctx.restore(); }
function paintFace(hx,hy,r,dir,skin,L,opts){ opts=opts||{}; const el=opts.el||0; const lc=mix(skin.lit,L.c,0.28);
  const fcx=hx+dir*r*0.20, fcy=hy+r*0.04; const dx=L.x-hx,dy=L.y-hy,d=Math.hypot(dx,dy)||1,ux=dx/d,uy=dy/d; const cs=Math.sign(ux)||dir;
  ctx.save(); ctx.beginPath(); ctx.ellipse(fcx,fcy,r*0.82,r*0.98,0,0,7); ctx.clip();
  ctx.fillStyle=rgb(skin.shadow); ctx.fillRect(hx-r*2,hy-r*2,r*4,r*4);
  const g=ctx.createLinearGradient(fcx+ux*r*1.2,fcy+uy*r*1.2,fcx-ux*r,fcy-uy*r);
  g.addColorStop(0,rgba(lc,0.95*L.i)); g.addColorStop(0.6,rgba(lc,0.14*L.i)); g.addColorStop(1,rgba(lc,0)); ctx.fillStyle=g; ctx.fillRect(hx-r*2,hy-r*2,r*4,r*4);
  const hi=mix(lc,[255,255,255],0.28); ctx.fillStyle=rgba(hi,0.5*L.i);
  ctx.beginPath(); ctx.ellipse(fcx+cs*r*0.28,fcy+r*0.18,r*0.26,r*0.18,0,0,7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(fcx+cs*r*0.08,fcy-r*0.44,r*0.30,r*0.16,0,0,7); ctx.fill();
  ctx.fillStyle=rgba(skin.shadow,0.5); ctx.fillRect(fcx-r*0.72,fcy-r*0.16,r*1.44,r*0.16);
  const eyeY=fcy-r*0.02; ctx.fillStyle='rgba(8,6,6,0.6)';
  ctx.beginPath(); ctx.ellipse(fcx-r*0.28,eyeY,r*0.17,r*0.11,0,0,7); ctx.fill(); ctx.beginPath(); ctx.ellipse(fcx+r*0.26,eyeY,r*0.15,r*0.10,0,0,7); ctx.fill();
  ctx.fillStyle=rgba([255,255,255],Math.min(0.9,0.5*L.i+0.25));
  ctx.beginPath(); ctx.arc(fcx-r*0.30+cs*r*0.05,eyeY-r*0.02,r*0.035,0,7); ctx.fill(); ctx.beginPath(); ctx.arc(fcx+r*0.23+cs*r*0.05,eyeY-r*0.02,r*0.03,0,7); ctx.fill();
  ctx.strokeStyle='rgba(8,6,6,0.36)'; ctx.lineWidth=Math.max(1,r*0.07); ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(fcx-cs*r*0.02,fcy-r*0.04); ctx.lineTo(fcx-cs*r*0.07,fcy+r*0.28); ctx.stroke();
  ctx.strokeStyle=rgba([120,60,55],0.4); ctx.lineWidth=Math.max(1,r*0.06); ctx.beginPath(); ctx.moveTo(fcx-r*0.17,fcy+r*0.5); ctx.lineTo(fcx+r*0.17,fcy+r*0.5); ctx.stroke();
  ctx.restore();
  if(opts.tears && !reduceMotion){ const tp=(el*0.22)%1; const ty=fcy+r*0.12+tp*r*0.72;
    ctx.fillStyle=rgba([205,222,240],0.5*(1-tp)*L.i+0.1); ctx.beginPath(); ctx.ellipse(fcx-r*0.30,ty,r*0.05,r*0.08,0,0,7); ctx.fill(); }
  if(opts.sweat && !reduceMotion){ const sp=(el*0.5)%1; const sy=hy-r*0.5+sp*r*1.3; ctx.fillStyle=rgba([235,238,240],0.45*(1-sp)); ctx.beginPath(); ctx.ellipse(fcx+cs*r*0.6,sy,r*0.04,r*0.07,0,0,7); ctx.fill(); }
}
function hand(hx,hy,r,skin,L,shake){ if(shake&&!reduceMotion){ hx+=(Math.random()-0.5)*shake; hy+=(Math.random()-0.5)*shake; }
  const lc=mix(skin.lit,L.c,0.28); const dx=L.x-hx,dy=L.y-hy,d=Math.hypot(dx,dy)||1,ux=dx/d,uy=dy/d;
  ctx.fillStyle=rgb(skin.shadow); ctx.beginPath(); ctx.arc(hx,hy,r,0,7); ctx.fill();
  ctx.fillStyle=rgba(lc,0.75*L.i); ctx.beginPath(); ctx.arc(hx+ux*r*0.3,hy+uy*r*0.3,r*0.72,0,7); ctx.fill(); return [hx,hy]; }
function gun(hx,hy,h,ang,L){ ctx.save(); ctx.translate(hx,hy); ctx.rotate(ang); ctx.fillStyle='#0a0b0f'; ctx.fillRect(0,-h*0.018,h*0.14,h*0.036); ctx.fillRect(-h*0.005,0,h*0.032,h*0.055);
  ctx.fillStyle=rgba(mix([140,148,162],L.c,0.3),0.55*L.i); ctx.fillRect(0,-h*0.018,h*0.14,h*0.007); ctx.restore(); }

/* generalized person */
function person(x,baseY,h,pose,M,L,opts){
  opts=opts||{}; const dir=opts.dir||-1; const el=opts.el||0; const seated=opts.seated;
  const breath=reduceMotion?0:Math.sin(el*1.5+(opts.ph||0))*h*0.012;
  const headR=h*0.11, shW=h*0.22, hipW=h*0.16;
  const shY=(seated? baseY-h*0.42 : baseY-h*0.70)+breath, hdY=(seated? baseY-h*0.58 : baseY-h*0.86)+breath, hemY=baseY-h*0.30;
  ctx.save(); ctx.globalAlpha=0.99; ctx.lineJoin='round'; ctx.lineCap='round';
  if(!seated){ const sg=ctx.createRadialGradient(x,baseY+2,0,x,baseY+2,h*0.34); sg.addColorStop(0,'rgba(0,0,0,0.30)'); sg.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=sg; ctx.beginPath(); ctx.ellipse(x,baseY+2,h*0.30,h*0.05,0,0,7); ctx.fill(); }
  const body=()=>{ ctx.beginPath();
    if(seated){ ctx.moveTo(x-shW,shY); ctx.quadraticCurveTo(x-shW*1.04,baseY-h*0.04,x-shW*0.92,baseY+h*0.03); ctx.lineTo(x+shW*0.92,baseY+h*0.03); ctx.quadraticCurveTo(x+shW*1.04,baseY-h*0.04,x+shW,shY); ctx.quadraticCurveTo(x,shY-h*0.05,x-shW,shY); ctx.closePath(); }
    else { ctx.moveTo(x-shW,shY); ctx.quadraticCurveTo(x-hipW*1.1,baseY-h*0.40,x-hipW,hemY); ctx.lineTo(x-h*0.07,baseY); ctx.lineTo(x-h*0.01,baseY); ctx.lineTo(x,hemY-h*0.10); ctx.lineTo(x+h*0.01,baseY); ctx.lineTo(x+h*0.07,baseY); ctx.lineTo(x+hipW,hemY); ctx.quadraticCurveTo(x+hipW*1.1,baseY-h*0.40,x+shW,shY); ctx.quadraticCurveTo(x,shY-h*0.055,x-shW,shY); ctx.closePath(); } };
  shade(body,x,shY+h*0.14,M.cloth.lit,M.cloth.shadow,L,h*0.5);
  ctx.fillStyle=rgb(M.skin.shadow); ctx.fillRect(x-headR*0.42,hdY+headR*0.4,headR*0.84,shY-hdY);
  hairMass(x,hdY,headR,dir,L,M.hair);
  paintFace(x,hdY,headR,dir,M.skin,L,{el,tears:opts.tears,sweat:opts.sweat});
  const sx=x+shW*0.55, sy=shY+h*0.07;
  ctx.strokeStyle=rgb(M.cloth.shadow);
  function arm(tx,ty,w){ ctx.lineWidth=w; ctx.beginPath(); ctx.moveTo(sx-shW*0.15,sy); ctx.lineTo(tx,ty); ctx.stroke(); }
  if(pose==='phone'){ const tx=x+dir*shW*0.8, ty=hdY+headR*0.7; arm(tx,ty,h*0.07); hand(tx,ty,h*0.045,M.skin,L,opts.shake||0);
    ctx.fillStyle='#14171c'; ctx.save(); ctx.translate(tx,ty-h*0.04); ctx.rotate(dir*0.2); ctx.fillRect(-h*0.018,-h*0.05,h*0.036,h*0.11); ctx.restore(); }
  else if(opts.handTo){ const ht=opts.handTo; arm(ht[0],ht[1],h*0.075); const hp=hand(ht[0],ht[1],h*0.05,M.skin,L,opts.shake||0);
    if(opts.glass){ ctx.fillStyle=rgba(mix([205,222,232],L.c,0.3),0.45*L.i+0.1); ctx.fillRect(hp[0]-h*0.018,hp[1]-h*0.02,h*0.036,h*0.07); }
    if(opts.gun){ gun(hp[0],hp[1],h,opts.gunAng||0,L); }
    // other arm at side
    arm(x-dir*shW*0.8,sy+h*0.24,h*0.07); hand(x-dir*shW*0.8,sy+h*0.24,h*0.05,M.skin,L,0); }
  else if(pose==='fluster'){ arm(x-shW*1.05,sy+h*0.16,h*0.07); hand(x-shW*1.05,sy+h*0.16,h*0.05,M.skin,L,h*0.012); arm(x+shW*1.0,sy+h*0.2,h*0.07); hand(x+shW*1.0,sy+h*0.2,h*0.05,M.skin,L,h*0.012); }
  else { arm(x-shW*0.85,sy+h*0.24,h*0.07); hand(x-shW*0.85,sy+h*0.24,h*0.05,M.skin,L,0); arm(x+shW*0.85,sy+h*0.24,h*0.07); hand(x+shW*0.85,sy+h*0.24,h*0.05,M.skin,L,0); }
  if(opts.bag){ ctx.strokeStyle='rgba(46,38,30,0.9)'; ctx.lineWidth=h*0.03; ctx.beginPath(); ctx.moveTo(x-shW*0.6,shY); ctx.lineTo(x+shW*0.7,shY+h*0.34); ctx.stroke(); ctx.fillStyle=rgb([58,48,38]); roundr(x+shW*0.46,shY+h*0.30,h*0.18,h*0.16,h*0.02); ctx.fill(); }
  ctx.strokeStyle=rgba(mix(L.c,[255,255,255],0.2),0.12+0.12*L.i); ctx.lineWidth=Math.max(1.1,h*0.012); ctx.beginPath(); ctx.arc(x,hdY,headR,-2.4,-0.6); ctx.stroke();
  ctx.restore();
}
function roundr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

/* ---------- scenery (static, built on resize) ---------- */
let grass=[], hills=[];
function buildScenery(){ grass=[]; for(let i=0;i<70;i++) grass.push({x:Math.random()*W,y:H*0.72+Math.random()*H*0.26,l:4+Math.random()*9,a:Math.random()*0.4-0.2});
  hills=[]; for(let i=0;i<4;i++) hills.push({y:H*(0.52+i*0.04),amp:H*0.03*(1+i*0.3),ph:Math.random()*6}); }

function tintWash(L){ // cool/desaturate overlay when turned
  if(turned){ ctx.fillStyle='rgba(40,55,72,0.22)'; ctx.fillRect(0,0,W,H); }
}

function bgExterior(p,el){
  const ev=p.evening||evening;
  // sky
  const g=ctx.createLinearGradient(0,0,0,H*0.7);
  if(ev){ g.addColorStop(0,'#3a4a63'); g.addColorStop(0.6,'#8a6f63'); g.addColorStop(1,'#c98f5a'); }
  else { g.addColorStop(0,'#a9c6cf'); g.addColorStop(0.6,'#d7dcc6'); g.addColorStop(1,'#f0deb0'); }
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H*0.74);
  // sun glow
  const L=lightAt(); const sg=ctx.createRadialGradient(L.x,L.y,0,L.x,L.y,H*0.7); sg.addColorStop(0,rgba(mix(L.c,[255,255,255],0.3),0.5)); sg.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);
  // hills
  for(let i=0;i<hills.length;i++){ const hl=hills[i]; ctx.fillStyle=ev?`rgba(40,55,45,${0.5+i*0.12})`:`rgba(${90-i*12},${120-i*10},${70-i*8},1)`;
    ctx.beginPath(); ctx.moveTo(0,H); for(let x=0;x<=W;x+=14){ ctx.lineTo(x,hl.y+Math.sin(x*0.01+hl.ph)*hl.amp); } ctx.lineTo(W,H); ctx.closePath(); ctx.fill(); }
  // field foreground
  ctx.fillStyle=ev?'#33402a':'#7c904e'; ctx.fillRect(0,H*0.72,W,H*0.28);
  // the house (right of center)
  const hx=W*0.52, hw=W*0.46, hy=H*0.40, hh=H*0.34;
  // shadow side cue from sun direction (sun left in day, right in evening)
  ctx.fillStyle=ev?'#6a5238':'#e6d6b4'; ctx.fillRect(hx,hy,hw,hh); // wall
  // roof
  ctx.fillStyle=ev?'#3c2f24':'#7a5a44'; ctx.beginPath(); ctx.moveTo(hx-W*0.02,hy); ctx.lineTo(hx+hw*0.5,hy-H*0.10); ctx.lineTo(hx+hw+W*0.02,hy); ctx.closePath(); ctx.fill();
  // form shadow on wall (away from sun)
  const wsg=ctx.createLinearGradient(hx,0,hx+hw,0); const dayLeft=!ev;
  wsg.addColorStop(0,dayLeft?'rgba(255,220,160,0.35)':'rgba(0,0,0,0.3)'); wsg.addColorStop(1,dayLeft?'rgba(0,0,0,0.28)':'rgba(255,180,120,0.3)');
  ctx.fillStyle=wsg; ctx.fillRect(hx,hy,hw,hh);
  // door
  ctx.fillStyle=ev?'#241c14':'#5e4632'; ctx.fillRect(hx+hw*0.42,hy+hh*0.45,hw*0.16,hh*0.55);
  // windows (warm-lit if evening/inside)
  const winLit=ev; for(const wxp of [0.12,0.74]){ const wx=hx+hw*wxp, wy=hy+hh*0.22, ww=hw*0.16, wh=hh*0.28;
    ctx.fillStyle=winLit?'rgba(255,196,120,0.92)':'rgba(120,140,150,0.55)'; ctx.fillRect(wx,wy,ww,wh);
    ctx.strokeStyle=ev?'#241c14':'#5e4632'; ctx.lineWidth=2; ctx.strokeRect(wx,wy,ww,wh); ctx.beginPath(); ctx.moveTo(wx+ww/2,wy); ctx.lineTo(wx+ww/2,wy+wh); ctx.moveTo(wx,wy+wh/2); ctx.lineTo(wx+ww,wy+wh/2); ctx.stroke();
    // flower box
    ctx.fillStyle=ev?'#2a3320':'#4a5a2e'; ctx.fillRect(wx-2,wy+wh,ww+4,hh*0.05);
    for(let f=0;f<4;f++){ ctx.fillStyle=['#d76a78','#e7b14a','#c98ad0','#e98a5a'][f%4]; ctx.beginPath(); ctx.arc(wx+ww*(0.2+f*0.22),wy+wh+hh*0.02,2.5,0,7); ctx.fill(); } }
  // path
  ctx.fillStyle=ev?'rgba(150,130,100,0.4)':'rgba(225,210,170,0.7)'; ctx.beginPath(); ctx.moveTo(hx+hw*0.5-W*0.04,hy+hh); ctx.lineTo(hx+hw*0.5+W*0.04,hy+hh); ctx.lineTo(W*0.62,H); ctx.lineTo(W*0.30,H); ctx.closePath(); ctx.fill();
  // grass blades
  ctx.strokeStyle=ev?'rgba(30,40,24,0.6)':'rgba(60,80,36,0.55)'; ctx.lineWidth=1.4;
  for(const b of grass){ ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(b.x+b.a*8,b.y-b.l); ctx.stroke(); }

  // figures
  const floorY=H*0.93;
  if(p.mara==='door'){ person(hx+hw*0.5+W*0.0, hy+hh+H*0.10, H*0.26,'stand',{skin:MAT.maraSkin,hair:MAT.maraHair,cloth:MAT.maraCloth},L,{dir:-1,el}); }
  if(p.man==='far'){ person(W*0.12, floorY, H*0.22,'stand',{skin:MAT.manSkin,hair:MAT.manHair,cloth:MAT.manCoat},L,{dir:1,el,bag:1}); }
  else if(p.man==='mid'){ person(W*0.24, floorY, H*0.26,'stand',{skin:MAT.manSkin,hair:MAT.manHair,cloth:MAT.manCoat},L,{dir:1,el,bag:1}); }
  else if(p.man==='return'){ person(W*0.30, floorY, H*0.30,'stand',{skin:MAT.manSkin,hair:MAT.manHair,cloth:MAT.manCoat},L,{dir:1,el,bag:1}); }
  tintWash(L);
}

function bgInterior(p,el){
  const ev=p.evening||evening; const L=lightAt();
  // walls
  const g=ctx.createLinearGradient(0,0,0,H); if(ev||turned){ g.addColorStop(0,'#2b3038'); g.addColorStop(1,'#1a1d22'); } else { g.addColorStop(0,'#caa978'); g.addColorStop(1,'#7c6244'); }
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // window with light (left)
  const wx=W*0.06, wy=H*0.16, ww=W*0.26, wh=H*0.34;
  ctx.fillStyle=ev?'rgba(80,96,120,0.7)':'rgba(255,232,180,0.96)'; ctx.fillRect(wx,wy,ww,wh);
  // light shaft
  if(!turned){ const sh=ctx.createLinearGradient(wx,wy,wx+W*0.5,wy+H*0.5); sh.addColorStop(0,rgba(mix(L.c,[255,255,255],0.3),ev?0.16:0.34)); sh.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=sh; ctx.beginPath(); ctx.moveTo(wx,wy); ctx.lineTo(wx+ww,wy); ctx.lineTo(W*0.7,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill(); }
  ctx.strokeStyle=ev?'#171a1f':'#5e4632'; ctx.lineWidth=4; ctx.strokeRect(wx,wy,ww,wh); ctx.beginPath(); ctx.moveTo(wx+ww/2,wy); ctx.lineTo(wx+ww/2,wy+wh); ctx.moveTo(wx,wy+wh/2); ctx.lineTo(wx+ww,wy+wh/2); ctx.stroke();
  // back door (right)
  ctx.fillStyle=ev?'#15181d':'#5a4430'; ctx.fillRect(W*0.82,H*0.18,W*0.12,H*0.52);
  // shelves hint
  ctx.fillStyle=ev?'rgba(0,0,0,0.3)':'rgba(90,70,46,0.5)'; ctx.fillRect(W*0.5,H*0.2,W*0.28,4); ctx.fillRect(W*0.55,H*0.3,W*0.22,4);

  const floorY=H*0.80, tableTop=H*0.66;
  // floor
  ctx.fillStyle=ev||turned?'#14161a':'#3a2c1c'; ctx.fillRect(0,floorY,W,H-floorY);

  // FAR figures (Arthur) drawn before table, with depth
  const aMat={skin:MAT.arthurSkin,hair:MAT.arthurHair,cloth:MAT.arthurCloth};
  if(p.arthur==='enter'){ person(W*0.87, floorY-H*0.03, H*0.27,'stand',aMat,L,{dir:-1,el,ph:1.4}); } // framed in the back doorway
  else if(p.arthur==='stand'){ person(W*0.50, floorY-H*0.05, H*0.27,'stand',aMat,L,{dir:-1,el,ph:1.4}); } // centre-back, set deeper in the room
  else if(p.arthur==='down'){ drawDown(W*0.47, floorY+H*0.035, H*0.26, aMat, L); } // fallen where he stood

  // seated/standing principals behind table
  const manSeated = p.man==='sit';
  if(p.man){ const mx=W*0.34, mby = manSeated? tableTop+H*0.02 : floorY;
    const pose = p.man==='fluster'?'fluster':'stand';
    person(mx, mby, manSeated?H*0.34:H*0.34, pose, {skin:MAT.manSkin,hair:MAT.manHair,cloth:MAT.manCoat}, L, {dir:1,el,seated:manSeated, sweat:(p.man==='fluster'), tears:false, bag:(!manSeated)}); }
  if(p.mara){ const rx=W*0.66; if(p.mara==='sit'){ person(rx,tableTop+H*0.02,H*0.32,'stand',{skin:MAT.maraSkin,hair:MAT.maraHair,cloth:MAT.maraCloth},L,{dir:-1,el,seated:true,ph:0.8}); }
    else if(p.mara==='pour'){ person(rx,floorY,H*0.34,'pour',{skin:MAT.maraSkin,hair:MAT.maraHair,cloth:MAT.maraCloth},L,{dir:-1,el,handTo:[W*0.5,tableTop-H*0.02],glass:1}); }
    else if(p.mara==='phone'){ person(rx,floorY,H*0.34,'phone',{skin:MAT.maraSkin,hair:MAT.maraHair,cloth:MAT.maraCloth},L,{dir:-1,el}); }
    else if(p.mara==='strike'){ person(rx-W*0.08,floorY,H*0.34,'reach',{skin:MAT.maraSkin,hair:MAT.maraHair,cloth:MAT.maraCloth},L,{dir:-1,el,handTo:[W*0.42,tableTop+H*0.02]}); }
    else { person(rx,floorY,H*0.34,'stand',{skin:MAT.maraSkin,hair:MAT.maraHair,cloth:MAT.maraCloth},L,{dir:-1,el}); } }

  // TABLE (occludes lower bodies)
  ctx.fillStyle=ev||turned?'#23262c':'#6e5230'; ctx.fillRect(W*0.18,tableTop,W*0.64,H*0.04);
  ctx.fillStyle=ev||turned?'#191c21':'#523c22'; ctx.fillRect(W*0.18,tableTop+H*0.04,W*0.64,H*0.10);
  // glasses
  if(p.glass){ for(const gxp of [0.40,0.58]){ ctx.fillStyle=rgba(mix([210,225,235],L.c,0.3),0.4*L.i+0.15); ctx.fillRect(W*gxp,tableTop-H*0.035,W*0.03,H*0.035); ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fillRect(W*gxp+2,tableTop-H*0.03,2,H*0.025); } }
  // kettle on a counter far left
  ctx.fillStyle=ev||turned?'#2a2d33':'#caa06a'; roundr(W*0.04,tableTop-H*0.06,W*0.07,H*0.06,4); ctx.fill();
  if(!ev && !turned && !reduceMotion){ ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=2; const t=el; ctx.beginPath(); ctx.moveTo(W*0.075,tableTop-H*0.06); for(let s=0;s<5;s++){ ctx.lineTo(W*0.075+Math.sin(t*3+s)*6, tableTop-H*0.06-s*H*0.018); } ctx.stroke(); }

  tintWash(L);
}
function drawDown(x,baseY,h,M,L){ // a collapsed body on the floor
  ctx.save(); ctx.globalAlpha=0.98; const sg=ctx.createRadialGradient(x,baseY,0,x,baseY,h*0.5); sg.addColorStop(0,'rgba(0,0,0,0.4)'); sg.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=sg; ctx.beginPath(); ctx.ellipse(x,baseY,h*0.5,h*0.07,0,0,7); ctx.fill();
  ctx.fillStyle=rgb(M.cloth.shadow); ctx.lineCap='round'; ctx.strokeStyle=rgb(M.cloth.shadow); ctx.lineWidth=h*0.22; ctx.beginPath(); ctx.moveTo(x-h*0.42,baseY-h*0.04); ctx.lineTo(x+h*0.30,baseY-h*0.08); ctx.stroke();
  // light side
  const lc=mix(M.cloth.lit,L.c,0.28); ctx.strokeStyle=rgba(lc,0.5*L.i); ctx.lineWidth=h*0.12; ctx.beginPath(); ctx.moveTo(x-h*0.42,baseY-h*0.08); ctx.lineTo(x+h*0.30,baseY-h*0.12); ctx.stroke();
  // head
  const hx=x-h*0.5, hy=baseY-h*0.08, r=h*0.11; ctx.fillStyle=rgb(M.hair.shadow); ctx.beginPath(); ctx.arc(hx,hy,r*1.2,0,7); ctx.fill();
  ctx.fillStyle=rgb(M.skin.shadow); ctx.beginPath(); ctx.arc(hx-r*0.3,hy,r*0.8,0,7); ctx.fill();
  ctx.fillStyle=rgba(mix(M.skin.lit,L.c,0.28),0.5*L.i); ctx.beginPath(); ctx.arc(hx-r*0.5,hy-r*0.2,r*0.5,0,7); ctx.fill();
  ctx.restore();
}

function bgCar(p,el){
  const L=lightAt();
  const g=ctx.createLinearGradient(0,0,0,H*0.7); g.addColorStop(0,'#5a6a78'); g.addColorStop(0.6,'#b89a72'); g.addColorStop(1,'#d9a460'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H*0.72);
  const sg=ctx.createRadialGradient(L.x,L.y,0,L.x,L.y,H*0.8); sg.addColorStop(0,rgba(mix(L.c,[255,255,255],0.3),0.45)); sg.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);
  // hedge
  ctx.fillStyle='#3c4a2c'; ctx.fillRect(0,H*0.5,W,H*0.16);
  // ground
  ctx.fillStyle='#4a4030'; ctx.fillRect(0,H*0.66,W,H*0.34);
  // car (side)
  const cx=W*0.5, cy=H*0.66, cw=W*0.66, ch=H*0.14;
  ctx.fillStyle='#1c2228'; roundr(cx-cw/2,cy-ch,cw,ch,H*0.02); ctx.fill();
  roundr(cx-cw*0.28,cy-ch-H*0.07,cw*0.56,H*0.08,H*0.02); ctx.fill(); // cabin
  ctx.fillStyle=rgba(mix([150,175,190],L.c,0.3),0.6); roundr(cx-cw*0.25,cy-ch-H*0.06,cw*0.5,H*0.06,H*0.01); ctx.fill(); // windows
  ctx.fillStyle='#0a0c0e'; ctx.beginPath(); ctx.arc(cx-cw*0.3,cy,H*0.035,0,7); ctx.fill(); ctx.beginPath(); ctx.arc(cx+cw*0.3,cy,H*0.035,0,7); ctx.fill();
  // man at the car
  const floorY=H*0.82;
  if(p.man==='walk'){ person(W*0.5,floorY,H*0.30,'stand',{skin:MAT.manSkin,hair:MAT.manHair,cloth:MAT.manCoat},L,{dir:-1,el,bag:1}); }
  else if(p.man==='phone'){ person(W*0.5,floorY,H*0.30,'phone',{skin:MAT.manSkin,hair:MAT.manHair,cloth:MAT.manCoat},L,{dir:-1,el}); }
  else if(p.man==='bag'){ person(W*0.42,floorY,H*0.30,'reach',{skin:MAT.manSkin,hair:MAT.manHair,cloth:MAT.manCoat},L,{dir:-1,el,handTo:[W*0.56,floorY-H*0.04]});
    // open bag + gun on the ground
    ctx.fillStyle=rgb([54,44,34]); roundr(W*0.54,floorY-H*0.05,W*0.14,H*0.06,H*0.01); ctx.fill();
    if(p.gun){ gun(W*0.6,floorY-H*0.035,H*0.3,-0.1,L); const fg=ctx.createRadialGradient(W*0.6,floorY-H*0.035,0,W*0.6,floorY-H*0.035,H*0.06); fg.addColorStop(0,'rgba(180,200,220,0.25)'); fg.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(W*0.6,floorY-H*0.035,H*0.06,0,7); ctx.fill(); } }
  tintWash(L);
}

/* ---------- runner ---------- */
let idx=-1, sceneT0=0, prevTs=0, running=false, shakeEnd=0, finishing=false, toBlack=false, transStart=0, camDir=1;
let auto=true, paused=false, dwell=12; const progFill=$('progfill');
function calcDwell(s){ let w=0,n=0;
  const SKIP={k:1,cls:1,who:1,stage:1,set:1,sfx:1,slug:1};
  const walk=(x)=>{ if(typeof x==='string'){ w+=x.split(/\s+/).filter(Boolean).length; }
    else if(Array.isArray(x)){ x.forEach(walk); }
    else if(x&&typeof x==='object'){ for(const k in x){ if(!SKIP[k]) walk(x[k]); } } };
  (s.text||[]).forEach(b=>{ n+=(b.lines?b.lines.length:1); walk(b); });
  return Math.max(10, Math.min(19, 0.4 + n*0.36 + w*0.32 + 2.2)); }
function togglePause(){ if(idx<0||finishing) return; paused=!paused; document.body.classList.toggle('paused',paused);
  hint.textContent = paused? '\u25b6 tap to resume' : '\u23f8 tap to pause'; }
function renderText(s){ cap.innerHTML='';
  s.text.forEach((b,i)=>{ const el=document.createElement('div'); el.className='blk'; el.style.animationDelay=(0.15+i*0.5)+'s';
    if(b.k==='narr'){ const p=document.createElement('p'); p.className='narr'; p.textContent=b.s; el.appendChild(p); }
    else { const p=document.createElement('p'); p.className='line'+(b.cls?' '+b.cls:''); p.innerHTML='<span class="who">'+b.who+'</span>'+esc(b.s); el.appendChild(p); }
    cap.appendChild(el); }); }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setPhone(ph){ if(!ph){ phoneEl.classList.remove('show','ring','incoming'); return; }
  $('phstatus').textContent = ph.status; $('phcaller').textContent = ph.caller;
  phoneEl.classList.toggle('incoming', ph.kind==='in');
  $('phdot').textContent = ph.kind==='missed'?'⚠':(ph.kind==='out'?'📲':'📞');
  phoneEl.classList.add('show'); phoneEl.classList.toggle('ring', ph.kind==='in'); }
function enter(i){ idx=i; const s=SCENES[i];
  curSet=s.set; if(s.turn) turned=true; evening=!!s.p.evening;
  transStart=performance.now(); camDir=(i%2)?1:-1;
  slug.classList.remove('dim'); slug.innerHTML='<span class="no">'+s.slug[0]+'</span> · '+s.slug[1];
  renderText(s); setPhone(s.phone); sceneT0=performance.now();
  if(s.shake) shakeEnd=performance.now()+700;
  if(s.sfx){ ({pour:pourSound,door:doorSound,dial:dialSound,thud:thudSound,sting:stingSound,reveal:revealSound})[s.sfx]?.(); }
  if(s.turn) setTimeout(coldCue,180);
  if(i===0) setTimeout(()=>theme('open'),250);
  startBeds(s.bed||[]);
  hint.classList.remove('hide'); hint.classList.toggle('answer', !!s.answer);
  dwell=calcDwell(s); if(progFill) progFill.style.width='0%'; paused=false; document.body.classList.remove('paused');
  hint.textContent = '\u23f8 tap to pause'; }
function advance(){ if(finishing) return; if(idx>=SCENES.length-1){ finalSequence(); return; } enter(idx+1); }
function finalSequence(){ finishing=true; hint.classList.add('hide'); cap.innerHTML=''; slug.classList.add('dim'); setPhone(null);
  flashScreen(0.2); setTimeout(()=>{ toBlack=true; theme('close'); }, 240); setTimeout(()=>{ stopAllBeds(); $('endScr').classList.remove('hide'); }, 1300); }
function flashScreen(a){ flashEl.style.transition='none'; flashEl.style.opacity=a; requestAnimationFrame(()=>{ flashEl.style.transition='opacity .5s'; flashEl.style.opacity=0; }); }
function start(){ $('titleScr').classList.add('hide'); $('endScr').classList.add('hide'); audioInit(); if(AC&&AC.state==='suspended') AC.resume();
  turned=false; toBlack=false; finishing=false; enter(0); if(!running){ running=true; requestAnimationFrame(frame); } }

const BG={exterior:bgExterior,interior:bgInterior,car:bgCar};
function frame(ts){ if(!running) return;
  const dt = ts-(prevTs||ts); prevTs=ts;
  if(paused && idx>=0){ sceneT0+=dt; transStart+=dt; shakeEnd+=dt; }
  const el=(ts-sceneT0)/1000;
  if(auto && !paused && !finishing && idx>=0 && !toBlack){
    if(progFill) progFill.style.width=(Math.min(1,el/dwell)*100)+'%';
    if(el>=dwell) advance(); }
  ctx.save();
  // gentle camera push-in (only ever zooms in, so edges stay covered)
  if(!reduceMotion && !toBlack){ const z=1.012+Math.min(el,15)*0.0021; const pan=(z-1)*W*0.16*camDir;
    ctx.translate(W/2+pan,H/2+(z-1)*H*0.05); ctx.scale(z,z); ctx.translate(-W/2,-H/2); }
  if(ts<shakeEnd && !reduceMotion){ const k=(shakeEnd-ts)/700; const m=6*k; ctx.translate((Math.random()-0.5)*m,(Math.random()-0.5)*m); }
  if(toBlack){ ctx.fillStyle='#07080a'; ctx.fillRect(-60,-60,W+120,H+120); }
  else if(idx<0){ bgExterior({},el); }                 // establishing shot behind the title
  else { const s=SCENES[idx]; if(s)(BG[s.set]||bgInterior)(s.p,el); }
  ctx.restore();
  if(grainCv && !toBlack){ ctx.save(); ctx.globalAlpha=0.05; ctx.globalCompositeOperation='overlay'; const ox=reduceMotion?0:(Math.random()*150)|0, oy=reduceMotion?0:(Math.random()*150)|0;
    for(let yy=-oy; yy<H; yy+=150) for(let xx=-ox; xx<W; xx+=150) ctx.drawImage(grainCv,xx,yy); ctx.restore(); }
  if(!toBlack){ const tr=Math.max(0,1-(ts-transStart)/450); if(tr>0){ ctx.save(); ctx.globalAlpha=tr*tr; ctx.fillStyle='#0a0b0d'; ctx.fillRect(0,0,W,H); ctx.restore(); } }
  requestAnimationFrame(frame); }

app.addEventListener('click',(e)=>{ if(e.target.id==='mute'||e.target.id==='replayBtn') return;
  if(!$('titleScr').classList.contains('hide')){ start(); return; } if(!$('endScr').classList.contains('hide')) return; togglePause(); });
document.addEventListener('keydown',(e)=>{ if(e.code==='Space'||e.code==='Enter'){ e.preventDefault();
  if(!$('titleScr').classList.contains('hide')) start(); else if($('endScr').classList.contains('hide')) togglePause(); } });
$('replayBtn').addEventListener('click',(e)=>{ e.stopPropagation(); start(); });
$('mute').addEventListener('click',(e)=>{ e.stopPropagation(); muted=!muted; $('mute').textContent=muted?'🔇':'🔊'; if(master) master.gain.value=muted?0:0.9; if(!muted&&AC&&AC.state==='suspended') AC.resume(); });
resize();
curSet='exterior'; evening=false; turned=false; transStart=performance.now(); running=true; requestAnimationFrame(frame);
</script>
</body>
