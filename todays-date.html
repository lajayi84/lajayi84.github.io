/* ===== TODAY'S DATE — audio + runner (pass 4) ===== */
let AC=null,master=null,muted=false,beds={};
function audioInit(){if(AC)return;try{AC=new (window.AudioContext||window.webkitAudioContext)();master=AC.createGain();master.gain.value=0.85;master.connect(AC.destination);}catch(e){AC=null;}}
function now(){return AC?AC.currentTime:0;}
function nbuf(d){const sr=AC.sampleRate,b=AC.createBuffer(1,Math.floor(sr*d),sr),x=b.getChannelData(0);for(let i=0;i<x.length;i++)x[i]=Math.random()*2-1;return b;}
function tone(f,t,dur,amp,type){const o=AC.createOscillator();o.type=type||'sine';o.frequency.value=f;const g=AC.createGain();g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(amp,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g);g.connect(master);o.start(t);o.stop(t+dur+0.02);}
function popS(){if(!AC||muted)return;const t=now();const o=AC.createOscillator();o.type='sine';o.frequency.setValueAtTime(420,t);o.frequency.exponentialRampToValueAtTime(760,t+0.06);const g=AC.createGain();g.gain.setValueAtTime(0.14,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.14);o.connect(g);g.connect(master);o.start(t);o.stop(t+0.16);}
function sendS(){if(!AC||muted)return;const t=now();tone(660,t,0.1,0.1,'sine');tone(990,t+0.04,0.12,0.07,'sine');}
function chimeS(){if(!AC||muted)return;const t=now();[880,1320].forEach((f,i)=>tone(f,t+i*0.08,0.3,0.08,'sine'));}
function lockS(){if(!AC||muted)return;const t=now();tone(300,t,0.05,0.1,'square');const s=AC.createBufferSource();s.buffer=nbuf(0.08);const g=AC.createGain();g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.1);s.connect(g);g.connect(master);s.start(t);s.stop(t+0.1);}
function ringS(){if(!AC||muted)return;const t=now();for(let k=0;k<2;k++){const tt=t+k*0.5;[[440,0],[540,0.06]].forEach(([f,o])=>tone(f,tt+o,0.35,0.09,'triangle'));}}
function connectS(){if(!AC||muted)return;const t=now();[523,659,784,1047].forEach((f,i)=>tone(f,t+i*0.1,0.5,0.08,'sine'));}
function clapS(){ // one-shot applause burst layered with pots
  if(!AC||muted)return;const t=now();
  for(let i=0;i<20;i++){const tt=t+Math.random()*1.2;const s=AC.createBufferSource();s.buffer=nbuf(0.03);const bp=AC.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1800+Math.random()*1400;const g=AC.createGain();g.gain.setValueAtTime(0.05,tt);g.gain.exponentialRampToValueAtTime(0.0001,tt+0.06);s.connect(bp);bp.connect(g);g.connect(master);s.start(tt);s.stop(tt+0.07);}
  // pots and pans clangs
  for(let i=0;i<4;i++){const tt=t+0.2+i*0.35;tone(520+i*90,tt,0.4,0.06,'triangle');tone(1230+i*70,tt,0.3,0.04,'square');}}
const SFX={pop:popS,send:sendS,chime:chimeS,lock:lockS,ring:ringS,connect:connectS,clap:clapS};
function startBeds(list){Object.keys(beds).forEach(k=>{if(list.indexOf(k)<0)stopBed(k);});list.forEach(k=>{if(!beds[k])beds[k]=makeBed(k);});}
function stopBed(k){if(beds[k]){beds[k].stop();delete beds[k];}}
function stopAllBeds(){Object.keys(beds).forEach(stopBed);}
function makeBed(kind){let timer=null,alive=true,nodes=[];
  function pad(freqs,amp,type,lp){const g=AC.createGain();g.gain.value=0.0001;g.gain.linearRampToValueAtTime(muted?0.0001:amp,now()+1.4);const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=lp||800;freqs.forEach(fr=>{const o=AC.createOscillator();o.type=type||'sine';o.frequency.value=fr;o.connect(f);o.start();nodes.push(o);});f.connect(g);g.connect(master);nodes.push(g);}
  function pluck(interval,notes){let n=0;const step=()=>{if(!alive)return;if(AC&&!muted){const f=notes[n%notes.length];tone(f,now(),0.5,0.05,'triangle');n++;}timer=setTimeout(step,interval);};timer=setTimeout(step,interval);}
  if(kind==='morning'){pad([196,294],0.05,'sine',700);pluck(1400,[392,440,523,494]);}
  else if(kind==='home'){pad([220,330],0.045,'sine',600);pluck(1700,[330,392,440]);}
  else if(kind==='muted'){pad([160,240],0.05,'sine',400);}
  else if(kind==='flash'){pad([262,392],0.04,'sine',900);}
  else if(kind==='doubt'){pad([130,174,196],0.05,'sawtooth',300);}
  else if(kind==='warmup'){pad([262,392,494],0.045,'sine',900);pluck(900,[523,659,587]);}
  else if(kind==='love'){pad([294,440,554],0.05,'sine',1100);pluck(1100,[659,784,880,740]);}
  else if(kind==='clap'){/* handled by one-shot */}
  return {stop(){alive=false;if(timer)clearTimeout(timer);const t=now();nodes.forEach(n=>{try{if(n.gain)n.gain.linearRampToValueAtTime(0.0001,t+0.4);}catch(e){}});setTimeout(()=>{nodes.forEach(n=>{try{n.stop&&n.stop();}catch(e){}});},440);}};
}
/* ================= RUNNER (locked camera) ================= */
let idx=-1,sceneT0=0,running=false,finishing=false,toEnd=false,transStart=0;
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderText(s){cap.innerHTML='';s.text.forEach((b,i)=>{const el=document.createElement('div');el.className='blk';el.style.animationDelay=(0.12+i*0.55)+'s';
  if(b.k==='verse'){const p=document.createElement('p');p.className='verse';p.textContent=b.s;el.appendChild(p);}
  else{const p=document.createElement('p');p.className='line'+(b.cls?' '+b.cls:'');p.innerHTML='<span class="who">'+esc(b.who)+'</span>'+esc(b.s);el.appendChild(p);}
  cap.appendChild(el);});}
function enter(i){idx=i;const s=SCENES[i];transStart=performance.now();
  renderText(s);sceneT0=performance.now();
  if(s.sfx&&SFX[s.sfx])SFX[s.sfx]();
  if(s.bed&&s.bed.indexOf('clap')>=0){/* clap one-shot fired via sfx */}
  startBeds((s.bed||[]).filter(b=>b!=='clap'));
  hint.classList.remove('hide');hint.classList.toggle('gold',!!s.last);
  hint.textContent=s.last?'tap to end':'tap to send';}
function advance(){if(finishing)return;if(idx>=SCENES.length-1){finalSequence();return;}enter(idx+1);}
function finalSequence(){finishing=true;hint.classList.add('hide');cap.innerHTML='';
  // hold on the doorstep discovery, warm fade up to the cream end card
  setTimeout(()=>{toEnd=true;},1200);
  setTimeout(()=>{stopAllBeds();$('endScr').classList.remove('hide');},2400);}
function flashScreen(a){flashEl.style.transition='none';flashEl.style.opacity=a;requestAnimationFrame(()=>{flashEl.style.transition='opacity .6s';flashEl.style.opacity=0;});}
function start(){$('titleScr').classList.add('hide');$('endScr').classList.add('hide');audioInit();if(AC&&AC.state==='suspended')AC.resume();toEnd=false;finishing=false;enter(0);if(!running){running=true;requestAnimationFrame(frame);}}
function frame(ts){if(!running)return;const el=(ts-sceneT0)/1000;
  try{
    if(toEnd){const s=SCENES[idx];if(s&&BG[s.stage])BG[s.stage](s.p,el,lightAt());ctx.fillStyle='rgba(246,239,226,'+Math.min(1,(ts-transStart-1200)/900)+')';ctx.fillRect(0,0,W,H);}
    else if(idx<0){curLight='warm';flatBase(el);}
    else{const s=SCENES[idx];if(s&&BG[s.stage])BG[s.stage](s.p,el,lightAt());}
  }catch(e){}
  if(grainCv&&!toEnd){ctx.save();ctx.globalAlpha=0.04;ctx.globalCompositeOperation='overlay';const ox=reduceMotion?0:(Math.random()*140)|0,oy=reduceMotion?0:(Math.random()*140)|0;for(let yy=-oy;yy<H;yy+=140)for(let xx=-ox;xx<W;xx+=140)ctx.drawImage(grainCv,xx,yy);ctx.restore();}
  if(!toEnd){const tr=Math.max(0,1-(ts-transStart)/460);if(tr>0){ctx.save();ctx.globalAlpha=tr*tr;ctx.fillStyle='#241f30';ctx.fillRect(0,0,W,H);ctx.restore();}}
  requestAnimationFrame(frame);}
app.addEventListener('click',(e)=>{if(e.target.id==='mute'||e.target.id==='replayBtn')return;if(!$('titleScr').classList.contains('hide')){start();return;}if(!$('endScr').classList.contains('hide'))return;advance();});
document.addEventListener('keydown',(e)=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();if(!$('titleScr').classList.contains('hide'))start();else if($('endScr').classList.contains('hide'))advance();}});
$('replayBtn').addEventListener('click',(e)=>{e.preventDefault();e.stopPropagation();start();});
$('mute').addEventListener('click',(e)=>{e.stopPropagation();muted=!muted;$('mute').innerHTML=muted?'&#128263;':'&#128266;';if(master)master.gain.value=muted?0:0.85;if(!muted&&AC&&AC.state==='suspended')AC.resume();});
resize();transStart=performance.now();running=true;requestAnimationFrame(frame);
</script>
