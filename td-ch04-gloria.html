 pad=AC.createGain();pad.gain.value=0.0001;pad.gain.linearRampToValueAtTime(muted?0.0001:A.padAmp,now()+1.4);
 const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=A.lp;
 A.pad.forEach(fr=>{const o=AC.createOscillator();o.type=A.type;o.frequency.value=fr;o.connect(f);o.start();});
 f.connect(pad);pad.connect(master);
 drone=AC.createGain();drone.gain.value=0.0001;
 const df=AC.createBiquadFilter();df.type='lowpass';df.frequency.value=240;
 A.drone.forEach(fr=>{const o=AC.createOscillator();o.type='sawtooth';o.frequency.value=fr;o.connect(df);o.start();});
 df.connect(drone);drone.connect(master);
 if(A.motif&&A.motif.length){mAlive=true;let n=0;const step=()=>{if(!mAlive)return;
   /* the motif only survives while the world is still all right */
   if(AC&&!muted&&MOOD<0.45)tone(A.motif[n%A.motif.length],now(),A.motifDur,A.motifAmp,A.motifType);
   n++;motifTimer=setTimeout(step,A.motifInt);};motifTimer=setTimeout(step,A.motifInt);}}
function stopAudio(){mAlive=false;if(motifTimer)clearTimeout(motifTimer);
 if(AC){const t=now();[pad,drone].forEach(g=>{if(g)try{g.gain.linearRampToValueAtTime(0.0001,t+0.6);}catch(e){}});}}
function audioMood(){if(!AC||muted)return;const A=THEME.aud;
 try{if(pad)pad.gain.value=A.padAmp*(1-MOOD*0.45);
     if(drone)drone.gain.value=A.droneAmp*MOOD;}catch(e){}}
function blip(){if(!AC||muted)return;const A=THEME.aud;tone(A.blip,now(),0.1,0.045,'sine');}
/* ---------- runner ---------- */
let idx=-1,t0=0,running=false,fin=false,toEnd=false,trans=0,mFrom=0,mTo=0;
let auto=false,paused=false,dwell=12,prevTs=0;
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderText(s){cap.innerHTML='';let d=0.08;
 s.text.forEach(b=>{
  if(b.t==='v'||b.t==='w'){b.l.forEach(ln=>{const e=document.createElement('div');e.className='blk';e.style.animationDelay=d.toFixed(2)+'s';d+=0.34;const q=document.createElement('p');q.className=(b.t==='v'?'v':'w')+(b.big?' big':'');q.textContent=ln;e.appendChild(q);cap.appendChild(e);});}
  else{const e=document.createElement('div');e.className='blk';e.style.animationDelay=d.toFixed(2)+'s';d+=0.48;
   if(b.t==='p'){const q=document.createElement('p');q.className='prose';q.textContent=b.s;e.appendChild(q);}
   else{const q=document.createElement('p');q.className='line '+(b.cls||'');q.innerHTML='<span class="who">'+esc(b.who)+'</span>'+esc(b.s);e.appendChild(q);}
   cap.appendChild(e);}});}
function calcDwell(s){let w=0,n=0;s.text.forEach(b=>{if(b.l){b.l.forEach(l=>w+=l.split(/\s+/).filter(Boolean).length);n+=b.l.length;}else{w+=(b.s||'').split(/\s+/).filter(Boolean).length;n+=1;}});return Math.max(9,Math.min(18,0.4+n*0.36+w*0.32+2.1));}
function enter(i){idx=i;const s=SCENES[i];blip();trans=performance.now();mFrom=MOOD;mTo=(s.mood!==undefined?s.mood:MOOD);
 renderText(s);t0=performance.now();dwell=calcDwell(s);
 const pf=$('progfill');if(pf)pf.style.width='0%';paused=false;document.body.classList.remove('paused');
 hint.classList.remove('hide');hint.classList.toggle('last',!!s.last);
 hint.textContent=auto?'\u23f8 tap to pause':(s.last?'tap to end':THEME.hint);}
function advance(){if(fin)return;if(idx>=SCENES.length-1){finish();return;}enter(idx+1);}
function finish(){fin=true;hint.classList.add('hide');cap.innerHTML='';stopAudio();
 setTimeout(()=>{toEnd=true;},1300);setTimeout(()=>{$('endScr').classList.remove('hide');},2300);}
function start(a){$('titleScr').classList.add('hide');$('endScr').classList.add('hide');auto=!!a;audioInit();if(AC&&AC.state==='suspended')AC.resume();if(!pad)startAudio();toEnd=false;fin=false;MOOD=0;enter(0);if(!running){running=true;requestAnimationFrame(frame);}}
function togglePause(){if(idx<0||fin||!auto)return;paused=!paused;document.body.classList.toggle('paused',paused);hint.textContent=paused?'\u25b6 tap to resume':'\u23f8 tap to pause';}
function frame(ts){if(!running)return;const dt=ts-(prevTs||ts);prevTs=ts;
 if(paused&&idx>=0){t0+=dt;trans+=dt;}
 const el=(ts-t0)/1000;const k=Math.min(1,el/1.5);MOOD=mFrom+(mTo-mFrom)*(k*k*(3-2*k));audioMood();
 if(auto&&!paused&&!fin&&idx>=0&&!toEnd){const pf=$('progfill');if(pf)pf.style.width=(Math.min(1,el/dwell)*100)+'%';if(el>=dwell)advance();}
 try{if(toEnd){ctx.fillStyle=THEME.endBg;ctx.fillRect(0,0,W,H);}
  else if(idx<0){MOOD=0;stStreet({},el,lightAt());}
  else{const s=SCENES[idx];if(s&&STAGES[s.stage])STAGES[s.stage](s.p||{},el,lightAt());}}catch(e){}
 if(grainCv&&!toEnd){ctx.save();ctx.globalAlpha=0.04;ctx.globalCompositeOperation='overlay';const ox=reduceMotion?0:(Math.random()*140)|0,oy=reduceMotion?0:(Math.random()*140)|0;for(let y=-oy;y<H;y+=140)for(let x=-ox;x<W;x+=140)ctx.drawImage(grainCv,x,y);ctx.restore();}
 if(!toEnd){const tr=Math.max(0,1-(ts-trans)/440);if(tr>0){ctx.save();ctx.globalAlpha=tr*tr;ctx.fillStyle=THEME.fade;ctx.fillRect(0,0,W,H);ctx.restore();}}
 requestAnimationFrame(frame);}
app.addEventListener('click',e=>{const id=e.target.id;if(id==='btnWatch'||id==='btnAuto'||id==='replayBtn'||id==='mute')return;
 if(!$('titleScr').classList.contains('hide'))return;
 if(!$('endScr').classList.contains('hide'))return;
 if(auto)togglePause();else advance();});
$('btnWatch').addEventListener('click',e=>{e.stopPropagation();start(false);});
$('btnAuto').addEventListener('click',e=>{e.stopPropagation();start(true);});
$('replayBtn').addEventListener('click',e=>{e.stopPropagation();start(auto);});
$('mute').addEventListener('click',e=>{e.stopPropagation();muted=!muted;$('mute').innerHTML=muted?'&#128263;':'&#128266;';if(master)master.gain.value=muted?0:0.8;if(!muted&&AC&&AC.state==='suspended')AC.resume();});
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();if(!$('titleScr').classList.contains('hide'))start(false);else if($('endScr').classList.contains('hide')){if(auto)togglePause();else advance();}}});
resize();trans=performance.now();running=true;requestAnimationFrame(frame);

</script></body></html>
