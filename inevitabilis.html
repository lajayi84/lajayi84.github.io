<style>
  :root{--ink:#070809;--lamp:#cdd6e2;--warm:#e0a24a;--cold:#6f8aa8;--blood:#c22a1f;--green:#5fd08a;--bone:#e9e6df;--mut:#7e8390;--line:rgba(255,255,255,.1);}

  #cap{position:absolute;left:0;right:0;bottom:0;z-index:6;padding:0 26px calc(54px + env(safe-area-inset-bottom));display:flex;flex-direction:column;justify-content:flex-end;gap:10px;min-height:42%;background:linear-gradient(180deg,transparent,rgba(5,6,7,.5) 30%,rgba(5,6,7,.95));pointer-events:none;}

  @keyframes rise{to{opacity:1;transform:none;}}
  .narr{font-style:italic;font-size:17.5px;line-height:1.5;color:#d8d4ca;text-shadow:0 2px 16px rgba(0,0,0,.95);max-width:30em;}

  .sms{font-family:'Spline Sans Mono',monospace;font-size:14px;line-height:1.5;color:#cfe8d6;background:rgba(20,40,28,.6);border:1px solid rgba(95,208,138,.4);border-radius:9px;padding:10px 12px;max-width:23em;}
  .sms .h{font-size:9px;letter-spacing:2px;text-transform:uppercase;opacity:.6;display:block;margin-bottom:5px;}
  #hint{position:absolute;left:0;right:0;bottom:calc(20px + env(safe-area-inset-bottom));z-index:6;text-align:center;font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--mut);pointer-events:none;animation:hb 2.1s ease-in-out infinite;}
  @keyframes hb{0%,100%{opacity:.3;}50%{opacity:.78;}}
  #hint.hide{display:none;} #hint.knock{color:var(--warm);}
  #phone{position:absolute;left:50%;top:32%;transform:translate(-50%,-50%) scale(.92);z-index:6;width:140px;opacity:0;transition:opacity .5s,transform .5s;pointer-events:none;}
  #phone.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
  #phone.ring{animation:buzz .45s ease-in-out infinite;}
  @keyframes buzz{0%,100%{transform:translate(-50%,-50%) rotate(-1.4deg);}50%{transform:translate(-51%,-50%) rotate(1.4deg);}}
  .phbody{background:#0a0d10;border:1px solid rgba(255,255,255,.13);border-radius:18px;padding:15px 12px 13px;box-shadow:0 18px 50px rgba(0,0,0,.6);}

  .ttl{font-family:'Anton',sans-serif;font-size:clamp(50px,17vw,104px);line-height:.92;letter-spacing:1px;color:var(--bone);text-transform:uppercase;text-shadow:0 6px 40px rgba(0,0,0,.6);opacity:0;animation:rise 1s .2s forwards;}
  .sub{font-family:'Inter Tight',sans-serif;font-style:italic;font-size:16px;color:var(--mut);margin-top:6px;opacity:0;animation:rise .9s .7s forwards;}
  .by{font-family:'Spline Sans Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-top:24px;opacity:0;animation:rise .9s 1s forwards;} .by b{color:#c6bba6;font-weight:500;}
  .epi{font-style:italic;font-size:17px;color:#d4cabb;max-width:24em;margin-top:6px;line-height:1.5;opacity:0;animation:rise .9s .6s forwards;}
  .start{margin-top:30px;font-family:'Spline Sans Mono',monospace;font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--warm);opacity:0;animation:rise .9s 1.4s forwards;} .start .pulse{animation:hb 2.1s ease-in-out infinite;display:inline-block;}
  .replay{margin-top:26px;font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--mut);border:1px solid var(--line);border-radius:30px;padding:11px 22px;background:rgba(255,255,255,.03);pointer-events:auto;cursor:pointer;opacity:0;animation:rise .9s 1.6s forwards;}
  .replay:active{transform:scale(.97);}
  #mute{position:absolute;top:12px;right:14px;z-index:9;cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:14px;border-radius:50%;background:rgba(12,14,16,.7);border:1px solid var(--line);backdrop-filter:blur(5px);pointer-events:auto;}
  @media (prefers-reduced-motion: reduce){.blk,.kicker,.by,.epi,.sub,.start,.replay,.ttl{animation-duration:.01s;}#hint,.start .pulse,#phone.ring{animation:none;}}
  .line.vo{font-style:italic;color:#dcbcc4;} .line.vo .who{opacity:.6;}
</style>
</head>

let W=0,H=0,DPR=1;
function resize(){const r=app.getBoundingClientRect();W=r.width;H=r.height;DPR=Math.min(2,window.devicePixelRatio||1);cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);buildGrain();}
window.addEventListener('resize',resize);
let grainCv=null;
function buildGrain(){grainCv=document.createElement('canvas');grainCv.width=150;grainCv.height=150;const g=grainCv.getContext('2d');const im=g.createImageData(150,150);for(let i=0;i<im.data.length;i+=4){const v=128+(Math.random()*2-1)*56;im.data[i]=im.data[i+1]=im.data[i+2]=v;im.data[i+3]=255;}g.putImageData(im,0,0);}

const SMS=(s,h)=>({k:'sms',s,h});
const SCENES=[
 // ACT I — EVIE & SUZY
 {slug:['INT. LIVING ROOM','NIGHT'],set:'lr',p:{matt:'window'},bed:['night'],phone:{status:'Missed \u00d7 24',caller:'Unknown',kind:'unknown'},

        D("Matt","\u201cTurn it off.\u201d","matt"),D("Evie","\u201cMatt, I\u2014\u201d","evie"),D("Matt","\u201cAre you deaf? Turn it off.\u201d","matt")]},
 {slug:['INT. LIVING ROOM','NIGHT'],set:'lr',p:{matt:'stand',evie:'near'},bed:['night'],

 {slug:['INT. LIVING ROOM','NIGHT'],set:'lr',p:{matt:'stand',evie:'near'},bed:['night'],sfx:'buzz',

 {slug:['INT. LIVING ROOM','NIGHT'],set:'lr',p:{matt:'stand',evie:'near',evieSerious:1},bed:['night','unease'],

  text:[D("Suzy","\u201cLet\u2019s go to The Churchill. At least we\u2019ll get some light. He\u2019s not invited.\u201d","suzy"),D("Matt","\u201c(dry) Heartbroken.\u201d","matt"),

 {slug:['INT. HALLWAY','CONTINUOUS'],set:'hall',p:{matt:'door',cab:1},bed:['unease'],sfx:'horn',

 {slug:['INT. HALLWAY','CONTINUOUS'],set:'hall',p:{matt:'door',women:1},bed:['unease'],

 // ACT III — RUSS
 {slug:['INT. LIVING ROOM','NIGHT'],set:'lr',p:{matt:'window',russ:'stand',reflect:1},bed:['drone'],sfx:'reveal',shake:1,

 {slug:['INT. LIVING ROOM','NIGHT'],set:'lr',p:{matt:'stand',russ:'stand'},bed:['drone'],

 {slug:['INT. LIVING ROOM','NIGHT'],set:'lr',p:{matt:'gun',russ:'reach',doll:1,hole:1},bed:['drone'],sfx:'sting',

function startBeds(list){Object.keys(beds).forEach(k=>{if(list.indexOf(k)<0)stopBed(k);});list.forEach(k=>{if(!beds[k])beds[k]=makeBed(k);});}
function stopBed(k){if(beds[k]){beds[k].stop();delete beds[k];}}

function makeBed(kind){let timer=null,alive=true,nodes=null;
  function hiss(freq,amp){if(!AC)return;const s=AC.createBufferSource();s.buffer=nbuf(2);s.loop=true;const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=freq;const g=AC.createGain();g.gain.value=muted?0:amp;s.connect(lp);lp.connect(g);g.connect(master);s.start();nodes={s,g};}
  function drn(cold){if(!AC)return;const o=AC.createOscillator();o.type='sawtooth';o.frequency.value=cold?49:55;const o2=AC.createOscillator();o2.type='sine';o2.frequency.value=cold?98:82;const g=AC.createGain();g.gain.value=0.0001;g.gain.linearRampToValueAtTime(muted?0.0001:0.07,now()+1.5);const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=220;o.connect(lp);o2.connect(lp);lp.connect(g);g.connect(master);o.start();o2.start();nodes={o,o2,g};}

  function diesirae(){ if(!AC)return; // pounding stabs over a choir-ish drone (evoking Verdi, not the recording)
    const o=AC.createOscillator();o.type='sawtooth';o.frequency.value=55;const og=AC.createGain();og.gain.value=muted?0:0.05;const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=300;o.connect(lp);lp.connect(og);og.connect(master);o.start();nodes={o,g:og};
    const seq=[0,0,0,0, 0,0,0,0]; const notes=[110,110,110,98, 110,110,98,82]; let i=0;
    const step=()=>{ if(!alive)return; if(AC&&!muted){ const t=now(); const f=notes[i%notes.length]; thud(t,f,0.5); tone(f*2,t,0.18,0.06,'sawtooth'); } i++; timer=setTimeout(step,300); }; step(); }
  if(kind==='night'){hiss(360,0.02);}
  else if(kind==='street'){hiss(500,0.025);}

}

function rgb(c){return 'rgb('+(c[0]|0)+','+(c[1]|0)+','+(c[2]|0)+')';}
function rgba(c,a){return 'rgba('+(c[0]|0)+','+(c[1]|0)+','+(c[2]|0)+','+a+')';}
function mix(a,b,t){return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];}
let curSet='lr',lightOn=false;

const MM={matt:[MAT.mattSkin,MAT.mattHair,MAT.mattCloth],evie:[MAT.evieSkin,MAT.evieHair,MAT.evieCloth],suzy:[MAT.suzySkin,MAT.suzyHair,MAT.suzyCloth],russ:[MAT.russSkin,MAT.russHair,MAT.russCloth]};
function M3(k){return {skin:MM[k][0],hair:MM[k][1],cloth:MM[k][2]};}

function bgLR(p,el){const L=lightAt();
  // walls (mouldy)
  const g=ctx.createLinearGradient(0,0,0,H);if(lightOn){g.addColorStop(0,'#34302a');g.addColorStop(1,'#1c1a16');}else{g.addColorStop(0,'#10131a');g.addColorStop(1,'#070a0f');}ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  if(!lightOn){ctx.fillStyle='rgba(40,60,40,0.05)';for(let i=0;i<5;i++){ctx.beginPath();ctx.ellipse(W*(0.2+i*0.18),H*(0.2+(i%2)*0.5),W*0.12,H*0.14,0,0,7);ctx.fill();}}
  // window left with cold streetlamp + frosted glass
  const wx=W*0.05,wy=H*0.14,ww=W*0.26,wh=H*0.34;
  ctx.fillStyle=lightOn?'#1a1d24':'rgba(70,92,120,0.55)';ctx.fillRect(wx,wy,ww,wh);
  if(!lightOn){const sgl=ctx.createRadialGradient(wx+ww*0.5,wy+wh*0.4,0,wx+ww*0.5,wy+wh*0.4,ww*1.6);sgl.addColorStop(0,'rgba(150,175,205,0.4)');sgl.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=sgl;ctx.fillRect(0,0,W*0.6,H*0.7);}

  ctx.strokeStyle='#05070a';ctx.lineWidth=4;ctx.strokeRect(wx,wy,ww,wh);ctx.beginPath();ctx.moveTo(wx+ww/2,wy);ctx.lineTo(wx+ww/2,wy+wh);ctx.moveTo(wx,wy+wh/2);ctx.lineTo(wx+ww,wy+wh/2);ctx.stroke();
  // reflection of Russ in the glass
  if(p.reflect){ctx.save();ctx.beginPath();ctx.rect(wx,wy,ww,wh);ctx.clip();ctx.globalAlpha=0.4;person(wx+ww*0.6,wy+wh*1.5,wh*1.4,'stand',M3('russ'),{x:wx,y:wy,c:[150,170,200],i:0.4},{dir:-1,el,noShadow:true,eyeCol:[120,170,235]});ctx.restore();}
  // back wall items: poster, clock, certificate
  // Prodigy poster
  ctx.fillStyle=lightOn?'#15110d':'#0c0e12';ctx.fillRect(W*0.36,H*0.16,W*0.16,H*0.20);ctx.strokeStyle='rgba(200,40,40,0.5)';ctx.lineWidth=2;ctx.strokeRect(W*0.36,H*0.16,W*0.16,H*0.20);ctx.fillStyle=rgba([200,50,40],0.6);ctx.font='bold 10px monospace';ctx.fillText('THE',W*0.37,H*0.21);ctx.fillText('PRODIGY',W*0.37,H*0.235);
  // clock
  ctx.strokeStyle='rgba(180,180,180,0.4)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(W*0.60,H*0.20,W*0.035,0,7);ctx.stroke();ctx.beginPath();ctx.moveTo(W*0.60,H*0.20);ctx.lineTo(W*0.60,H*0.18);ctx.moveTo(W*0.60,H*0.20);ctx.lineTo(W*0.617,H*0.205);ctx.stroke();
  // certificate (or hole)
  if(p.hole){ctx.fillStyle='#000';ctx.fillRect(W*0.66,H*0.18,W*0.12,H*0.10);ctx.strokeStyle='rgba(60,40,30,0.6)';ctx.lineWidth=2;ctx.strokeRect(W*0.655,H*0.175,W*0.13,H*0.11);}
  else{ctx.fillStyle=rgba([225,215,190],lightOn?0.95:0.5);ctx.fillRect(W*0.66,H*0.18,W*0.12,H*0.10);ctx.strokeStyle=rgba([198,161,78],0.7);ctx.lineWidth=3;ctx.strokeRect(W*0.66,H*0.18,W*0.12,H*0.10);if(p.cert){ctx.fillStyle='rgba(40,30,20,0.6)';ctx.font='6px monospace';ctx.fillText('M. JENNINGS',W*0.665,H*0.235);}}
  // hallway doorway right with warm slice
  ctx.fillStyle='#05060a';ctx.fillRect(W*0.86,H*0.20,W*0.14,H*0.62);
  if(!lightOn){const dg=ctx.createLinearGradient(W*0.99,0,W*0.80,0);dg.addColorStop(0,'rgba(224,168,96,0.5)');dg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=dg;ctx.fillRect(W*0.78,H*0.20,W*0.22,H*0.7);}

  ctx.fillStyle='#15171d';roundr(W*0.04,H*0.62,W*0.32,H*0.16,8);ctx.fill();ctx.fillStyle='#1b1e25';roundr(W*0.04,H*0.56,W*0.32,H*0.08,8);ctx.fill();
  const deskY=H*0.64;ctx.fillStyle='#17120c';ctx.fillRect(W*0.74,deskY,W*0.24,H*0.04);ctx.fillStyle='#0f0b07';ctx.fillRect(W*0.74,deskY+H*0.04,W*0.24,H*0.14);

  if(p.item==='box'||p.item==='bible'){ctx.fillStyle=rgb([56,46,34]);roundr(W*0.78,deskY-H*0.05,W*0.10,H*0.05,3);ctx.fill();}

  if(p.suzy==='alone') person(W*0.5,floorY,H*0.40,'phone',M3('suzy'),L,{dir:-1,el});

  else if(p.evie==='near') person(W*0.62,floorY,H*0.40,'stand',M3('evie'),L,{dir:-1,el,ph:0.9});

  if(p.russ==='stand') person(W*0.66,floorY,H*0.42,'stand',M3('russ'),L,{dir:-1,el,eyeCol:[120,170,235]});
  if(p.russ==='reach') person(W*0.64,floorY,H*0.42,'reach',M3('russ'),L,{dir:-1,el,eyeCol:[120,170,235]});

    if(p.matt==='window') person(mx,floorY,h,'stand',M3('matt'),L,{dir:-1,el});

    else if(p.matt==='gun') person(mx,floorY,h,'gun',M3('matt'),L,{dir:1,el,shake:h*0.012});
    else if(p.matt==='cupboard'||p.matt==='cupboard2') person(mx,floorY,h,'reach',M3('matt'),L,{dir:1,el});
    else person(mx,floorY,h,'stand',M3('matt'),L,{dir:1,el});
  }

}
function lampGlowCold(L){const sg=ctx.createRadialGradient(L.x,L.y,0,L.x,L.y,H*0.9);sg.addColorStop(0,rgba(mix(L.c,[255,255,255],0.2),0.18*L.i));sg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);}
function vignetteFog(){}

function bgHall(p,el){const L=lightAt();const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#171008');g.addColorStop(1,'#0a0907');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // front door right with frosted glass

  // store cupboard left
  ctx.fillStyle='#120c06';ctx.fillRect(W*0.04,H*0.18,W*0.26,H*0.64);ctx.strokeStyle='#080503';ctx.lineWidth=3;ctx.strokeRect(W*0.04,H*0.18,W*0.26,H*0.64);
  if(p.cupboard||p.bolt){ctx.fillStyle='#000';ctx.fillRect(W*0.06,H*0.20,W*0.22,H*0.58);
    if(p.cupboard==='2'||p.matt==='cupboard2'){ // contents
      ctx.fillStyle=rgba([90,140,200],0.4);for(let i=0;i<6;i++)ctx.fillRect(W*0.08+(i%3)*W*0.05,H*0.70+(i<3?0:H*0.04),W*0.03,H*0.015);

  if(p.letter){ctx.fillStyle=rgba([225,218,200],0.9);ctx.save();ctx.translate(W*0.5,H*0.80);ctx.rotate(-0.1);ctx.fillRect(0,0,W*0.10,H*0.06);ctx.restore();}

    ctx.fillStyle='rgba(150,18,14,0.7)';ctx.beginPath();ctx.ellipse(dx-W*0.015,dy+dh*0.45,W*0.018,H*0.05,0.3,0,7);ctx.fill();
    for(let i=0;i<4;i++){ctx.fillStyle='rgba(150,18,14,'+(0.5-i*0.1)+')';ctx.beginPath();ctx.arc(dx-W*0.02-i*5,dy+dh*0.52+i*H*0.02,2,0,7);ctx.fill();}

  lampGlowCold(L);

function bgBox(p,el){const L=lightAt();const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0c0f16');g.addColorStop(1,'#06080c');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  ctx.strokeStyle='rgba(120,30,24,0.8)';ctx.lineWidth=4;ctx.strokeRect(W*0.32,H*0.22,W*0.36,H*0.62);

  // black cap silhouette
  ctx.fillStyle='#070809';ctx.beginPath();ctx.ellipse(W*0.50,H*0.38,W*0.05,H*0.03,0,0,7);ctx.fill();ctx.fillRect(W*0.50,H*0.37,W*0.05,H*0.01);
  lampGlowCold(L);
}
function bgExt(p,el){const L=lightAt();const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0e1320');g.addColorStop(1,'#070a10');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // distant road glow (right)
  const rg=ctx.createRadialGradient(W*0.9,H*0.5,0,W*0.9,H*0.5,W*0.6);rg.addColorStop(0,'rgba(180,160,120,0.25)');rg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
  // passing headlights as streaks
  if(!reduceMotion){for(let i=0;i<3;i++){const yy=H*(0.4+i*0.08);const xx=((el*60+i*200)%(W+200))-100;ctx.fillStyle='rgba(255,240,200,0.10)';ctx.fillRect(W-xx,yy,W*0.12,2);}}
  // a wall/hedge
  ctx.fillStyle='#0a0d0a';ctx.fillRect(0,H*0.56,W,H*0.10);
  ctx.fillStyle='#06080a';ctx.fillRect(0,H*0.80,W,H*0.20);
  lampGlowCold(L);
  const floorY=H*0.88;
  if(p.youth) person(W*0.66,floorY,H*0.34,'stand',{skin:MAT.mattSkin,hair:{lit:[40,40,44],shadow:[10,10,12]},cloth:{lit:[40,42,48],shadow:[12,12,16]}},L,{dir:-1,el});
  if(p.evie) person(W*0.40,floorY,H*0.40,p.evie==='deal'?'reach':'phone',M3('evie'),L,{dir:1,el,tears:p.evie==='deal'});
  if(p.matt==='leave') person(W*0.6,floorY,H*0.38,'stand',M3('matt'),L,{dir:1,el});
  if(p.suzy==='watch') person(W*0.28,floorY,H*0.38,'stand',M3('suzy'),L,{dir:1,el});
  if(p.suzy==='run') person(W*0.46,floorY,H*0.40,'reach',M3('suzy'),L,{dir:1,el,shake:H*0.012});
  if(p.cab==='far'||p.cab==='gun'){const cxp=p.cab==='gun'?W*0.86:W*0.70,cy=H*0.50;
    const hg=ctx.createRadialGradient(cxp+4,cy,0,cxp+4,cy,H*0.18);hg.addColorStop(0,'rgba(255,240,200,0.45)');hg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=hg;ctx.beginPath();ctx.arc(cxp+4,cy,H*0.18,0,7);ctx.fill();
    ctx.fillStyle='#0a0c10';roundr(cxp-H*0.06,cy-H*0.03,H*0.16,H*0.05,4);ctx.fill();
    ctx.fillStyle='rgba(255,240,200,0.95)';ctx.beginPath();ctx.arc(cxp,cy,2.6,0,7);ctx.fill();ctx.beginPath();ctx.arc(cxp+8,cy,2.6,0,7);ctx.fill();
    if(p.cab==='gun'&&!reduceMotion){ctx.strokeStyle='rgba(255,240,200,0.3)';ctx.lineWidth=2;for(let i=0;i<7;i++){ctx.beginPath();ctx.moveTo(cxp-H*0.06-i*W*0.05,cy);ctx.lineTo(cxp-H*0.06-i*W*0.05-W*0.035,cy);ctx.stroke();}}}
}
function drawFlame(x,y,el){const fl=reduceMotion?1:(0.8+0.2*Math.sin(el*12));ctx.save();const g=ctx.createRadialGradient(x,y,0,x,y,H*0.04*fl);g.addColorStop(0,'rgba(255,240,200,0.95)');g.addColorStop(0.4,'rgba(255,170,60,0.8)');g.addColorStop(1,'rgba(200,60,20,0)');ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(x,y,H*0.016*fl,H*0.028*fl,0,0,7);ctx.fill();const glow=ctx.createRadialGradient(x,y,0,x,y,H*0.12);glow.addColorStop(0,'rgba(255,180,90,0.22)');glow.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=glow;ctx.beginPath();ctx.arc(x,y,H*0.12,0,7);ctx.fill();ctx.restore();}
function bgTaxi(p,el){const L={x:W*0.5,y:H*0.1,c:[150,170,200],i:0.5};ctx.fillStyle='#06080c';ctx.fillRect(0,0,W,H);
  for(const wx of [W*0.02,W*0.80]){ctx.fillStyle='rgba(40,56,80,0.5)';ctx.fillRect(wx,H*0.12,W*0.18,H*0.36);if(!reduceMotion){for(let i=0;i<3;i++){const yy=H*0.16+i*H*0.1;const xx=((el*120+i*150)%(W*0.45));ctx.fillStyle='rgba(255,240,200,0.12)';ctx.fillRect(wx+(W*0.18)-xx*0.4,yy,W*0.07,2);}}ctx.strokeStyle='#04060a';ctx.lineWidth=4;ctx.strokeRect(wx,H*0.12,W*0.18,H*0.36);}
  const fg=ctx.createRadialGradient(W*0.5,H*0.26,0,W*0.5,H*0.26,H*0.3);fg.addColorStop(0,'rgba(150,160,180,0.22)');fg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=fg;ctx.fillRect(0,0,W,H*0.5);
  ctx.fillStyle='#0c0e12';roundr(W*0.18,H*0.40,W*0.24,H*0.34,10);ctx.fill();roundr(W*0.58,H*0.40,W*0.24,H*0.34,10);ctx.fill();
  ctx.fillStyle='#0a0c10';roundr(W*0.24,H*0.30,W*0.13,H*0.13,8);ctx.fill();roundr(W*0.63,H*0.30,W*0.13,H*0.13,8);ctx.fill();
  // rear-view mirror + eyes
  ctx.fillStyle='#05060a';roundr(W*0.42,H*0.10,W*0.16,H*0.045,4);ctx.fill();
  const reveal=p.stage!=='ride';ctx.fillStyle=rgba(reveal?[150,200,255]:[110,140,180],0.9);
  if(reveal){ctx.shadowColor='rgba(120,180,245,0.9)';ctx.shadowBlur=8;}
  ctx.beginPath();ctx.arc(W*0.47,H*0.123,2.4,0,7);ctx.fill();ctx.beginPath();ctx.arc(W*0.53,H*0.123,2.4,0,7);ctx.fill();ctx.shadowBlur=0;
  // smashed driver window
  if(reveal){ctx.strokeStyle='rgba(200,210,225,0.45)';ctx.lineWidth=1;const cx=W*0.10,cy=H*0.30;for(let i=0;i<8;i++){const a=i/8*6.283;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*W*0.08,cy+Math.sin(a)*H*0.11);ctx.stroke();}for(let r=1;r<3;r++){ctx.beginPath();for(let i=0;i<=8;i++){const a=i/8*6.283,xx=cx+Math.cos(a)*W*0.028*r,yy=cy+Math.sin(a)*H*0.038*r;i?ctx.lineTo(xx,yy):ctx.moveTo(xx,yy);}ctx.stroke();}}
  const floorY=H*0.98;
  if(p.russ){person(W*0.33,floorY,H*0.52,'reach',M3('russ'),{x:W*0.62,y:H*0.2,c:[150,175,210],i:0.55},{dir:1,el,eyeCol:[150,200,255]});
    ctx.fillStyle=rgba([150,20,16],0.8);ctx.beginPath();ctx.arc(W*0.30,floorY-H*0.40,H*0.012,0,7);ctx.fill();
    ctx.fillStyle=rgba([90,30,70],0.5);ctx.beginPath();ctx.arc(W*0.27,floorY-H*0.45,H*0.018,0,7);ctx.fill();
    ctx.strokeStyle='rgba(180,180,190,0.7)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W*0.44,floorY-H*0.33);ctx.quadraticCurveTo(W*0.49,floorY-H*0.29,W*0.47,floorY-H*0.25);ctx.stroke();
  } else {ctx.fillStyle='#080a0e';ctx.beginPath();ctx.arc(W*0.31,H*0.34,H*0.05,0,7);ctx.fill();}
  // Matt foreground silhouette
  ctx.fillStyle='#090b0f';ctx.beginPath();ctx.arc(W*0.52,H*1.04,H*0.17,0,7);ctx.fill();
  ctx.fillStyle=rgba([150,170,200],0.16);ctx.beginPath();ctx.arc(W*0.46,H*0.93,H*0.05,0,7);ctx.fill();
}
const BG={lr:bgLR,hall:bgHall,box:bgBox,ext:bgExt,taxi:bgTaxi};

/* ---------- runner ---------- */
let idx=-1,sceneT0=0,running=false,shakeEnd=0,shakeAmp=6,finishing=false,toBlack=false,transStart=0,camDir=1;
function renderText(s){cap.innerHTML='';s.text.forEach((b,i)=>{const el=document.createElement('div');el.className='blk';el.style.animationDelay=(0.15+i*0.5)+'s';
  if(b.k==='narr'){const p=document.createElement('p');p.className='narr';p.textContent=b.s;el.appendChild(p);}
  else if(b.k==='sms'){const d=document.createElement('div');d.className='sms';d.innerHTML=(b.h?'<span class="h">'+esc(b.h)+'</span>':'')+esc(b.s);el.appendChild(d);}
  else{const p=document.createElement('p');p.className='line'+(b.cls?' '+b.cls:'');p.innerHTML='<span class="who">'+esc(b.who)+'</span>'+esc(b.s);el.appendChild(p);}
  cap.appendChild(el);});}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setPhone(ph){if(!ph){phoneEl.classList.remove('show','ring','danger');return;}$('phstatus').textContent=ph.status;$('phcaller').textContent=ph.caller;phoneEl.classList.toggle('danger',ph.kind==='unknown');$('phdot').innerHTML=ph.kind==='unknown'?'&#9888;':'&#128222;';phoneEl.classList.add('show');phoneEl.classList.toggle('ring',ph.kind==='ring');}
function enter(i){idx=i;const s=SCENES[i];curSet=s.set;lightOn=!!s.p.lightOn;transStart=performance.now();camDir=(i%2)?1:-1;
  slug.classList.remove('dim');slug.innerHTML='<span class="no">'+s.slug[0]+'</span> &middot; '+s.slug[1];
  renderText(s);setPhone(s.phone);sceneT0=performance.now();
  if(s.shake){shakeEnd=performance.now()+(s.shake===2?1300:700);shakeAmp=s.shake===2?9:6;}
  if(s.sfx&&SFX[s.sfx])SFX[s.sfx]();
  startBeds(s.bed||[]);
  hint.classList.remove('hide');hint.textContent=s.last?'tap to end':'tap to continue';}
function advance(){if(finishing)return;if(idx>=SCENES.length-1){finalSequence();return;}enter(idx+1);}
function finalSequence(){finishing=true;hint.classList.add('hide');cap.innerHTML='';slug.classList.add('dim');setPhone(null);setTimeout(()=>{toBlack=true;stopAllBeds();},260);setTimeout(skidS,1100);setTimeout(gunshotS,1950);setTimeout(()=>{$('endScr').classList.remove('hide');},3100);}
function flashScreen(a){flashEl.style.transition='none';flashEl.style.opacity=a;requestAnimationFrame(()=>{flashEl.style.transition='opacity .5s';flashEl.style.opacity=0;});}
function start(){$('titleScr').classList.add('hide');$('endScr').classList.add('hide');audioInit();if(AC&&AC.state==='suspended')AC.resume();toBlack=false;finishing=false;enter(0);if(!running){running=true;requestAnimationFrame(frame);}}

function frame(ts){if(!running)return;const el=(ts-sceneT0)/1000;
  ctx.save();
  if(!reduceMotion&&!toBlack){const z=1.012+Math.min(el,15)*0.0019;const pan=(z-1)*W*0.16*camDir;ctx.translate(W/2+pan,H/2+(z-1)*H*0.05);ctx.scale(z,z);ctx.translate(-W/2,-H/2);}
  if(ts<shakeEnd&&!reduceMotion){const k=(shakeEnd-ts)/700;const m=shakeAmp*k;ctx.translate((Math.random()-0.5)*m,(Math.random()-0.5)*m);}
  if(toBlack){ctx.fillStyle='#050607';ctx.fillRect(-60,-60,W+120,H+120);}
  else if(idx<0){lightOn=false;curSet='lr';bgLR({matt:'window'},el);}
  else{const s=SCENES[idx];if(s)(BG[s.set]||bgLR)(s.p,el);}
  ctx.restore();
  if(grainCv&&!toBlack){ctx.save();ctx.globalAlpha=0.06;ctx.globalCompositeOperation='overlay';const ox=reduceMotion?0:(Math.random()*150)|0,oy=reduceMotion?0:(Math.random()*150)|0;for(let yy=-oy;yy<H;yy+=150)for(let xx=-ox;xx<W;xx+=150)ctx.drawImage(grainCv,xx,yy);ctx.restore();}
  if(!toBlack){const tr=Math.max(0,1-(ts-transStart)/450);if(tr>0){ctx.save();ctx.globalAlpha=tr*tr;ctx.fillStyle='#050607';ctx.fillRect(0,0,W,H);ctx.restore();}}
  requestAnimationFrame(frame);}

app.addEventListener('click',(e)=>{if(e.target.id==='mute'||e.target.id==='replayBtn')return;if(!$('titleScr').classList.contains('hide')){start();return;}if(!$('endScr').classList.contains('hide'))return;advance();});
document.addEventListener('keydown',(e)=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();if(!$('titleScr').classList.contains('hide'))start();else if($('endScr').classList.contains('hide'))advance();}});
$('replayBtn').addEventListener('click',(e)=>{e.stopPropagation();start();});
$('mute').addEventListener('click',(e)=>{e.stopPropagation();muted=!muted;$('mute').innerHTML=muted?'&#128263;':'&#128266;';if(master)master.gain.value=muted?0:0.9;if(!muted&&AC&&AC.state==='suspended')AC.resume();});
resize();curSet='lr';transStart=performance.now();running=true;requestAnimationFrame(frame);
</script>
